<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .title {
      font-size: 20px;
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-section {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
      min-height: 120px;
      resize: vertical;
    }
    .current-display {
      background: rgba(15, 52, 96, 0.3);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #a8b2d1;
      line-height: 1.6;
    }
    .current-display label {
      color: #64ffda;
      display: block;
      margin-bottom: 4px;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .bottom-bar {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title" id="pageTitle">👗 当前服装</div>
    <div class="form-section">
      <div class="current-display">
        <label>当前穿着</label>
        <div id="currentClothing">加载中...</div>
      </div>
      <div class="form-group">
        <label>修改服装</label>
        <textarea id="clothingInput" placeholder="描述角色当前的穿着，例如：白色护士服，黑色开档连裤袜，白色平底鞋..."></textarea>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-secondary" onclick="parentNode.parentNode.parentElement.parentElement.remove()" style="margin-right:10px;">取消</button>
      <button class="btn" onclick="saveClothing()">保存</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const npcId = urlParams.get('npc') || 'NPC1';

    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function initForm() {
      const data = getStatData();
      const npc = (data.NPC || {})[npcId] || {};
      document.getElementById('pageTitle').textContent = '👗 ' + (npc.名称 || npcId) + ' - 当前服装';
      document.getElementById('currentClothing').textContent = npc.服装 || '未设定';
      document.getElementById('clothingInput').value = npc.服装 || '';
    }
    function saveClothing() {
      const val = document.getElementById('clothingInput').value.trim();
      if (!val) { alert('请填写服装描述'); return; }
      sendToInput(`/更新服装 ${npcId}: ${val}`);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) { inputBox.value = text; inputBox.dispatchEvent(new Event('input', { bubbles: true })); }
    }
    initForm();
  </script>
</body>
</html>
