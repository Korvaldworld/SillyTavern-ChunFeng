<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .title {
      font-size: 20px;
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
    }
    .section {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .section h4 {
      color: #64ffda;
      margin-top: 0;
      font-size: 15px;
    }
    .info-row {
      display: flex;
      margin-bottom: 8px;
    }
    .info-row label {
      width: 80px;
      color: #64ffda;
      font-size: 13px;
    }
    .info-row value {
      color: #a8b2d1;
      font-size: 13px;
    }
    .location-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .location-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: rgba(15, 52, 96, 0.3);
      margin-bottom: 6px;
      border-radius: 4px;
    }
    .location-name {
      color: #64ffda;
      font-size: 13px;
    }
    .location-desc {
      color: #8892b0;
      font-size: 12px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .btn-danger {
      background: transparent;
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
    }
    .bottom-bar {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🌍 世界管理</div>

    <div class="section">
      <h4>📍 基础设定</h4>
      <div class="info-row"><label>城市</label><value>春风市</value></div>
      <div class="info-row"><label>年代</label><value>2005年</value></div>
    </div>

    <div class="section">
      <h4>⚙️ 自定义规则</h4>
      <div id="rulesList">加载中...</div>
      <div style="margin-top:12px;">
        <div class="form-group">
          <label>添加规则</label>
          <input type="text" id="ruleName" placeholder="规则名称" style="margin-bottom:6px;">
          <textarea id="ruleContent" rows="2" placeholder="规则内容..."></textarea>
        </div>
        <button class="btn" onclick="addRule()">添加规则</button>
      </div>
    </div>

    <div class="section">
      <h4>🏢 重要地点</h4>
      <ul class="location-list" id="locList">加载中...</ul>
      <div style="margin-top:12px;">
        <div class="form-group">
          <label>添加地点</label>
          <input type="text" id="locName" placeholder="地点名称" style="margin-bottom:6px;">
          <input type="text" id="locDesc" placeholder="地点描述" style="margin-bottom:6px;">
          <input type="text" id="locDist" placeholder="距离长乐公寓">
        </div>
        <button class="btn" onclick="addLocation()">添加地点</button>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="btn btn-secondary" onclick="parentNode.parentNode.parentElement.parentElement.remove()">关闭</button>
    </div>
  </div>

  <script>
    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function renderWorld() {
      const data = getStatData();
      const world = data.世界观 || {};

      // 规则
      const rules = world.用户自定义规则 || [];
      const rulesEl = document.getElementById('rulesList');
      if (rules.length === 0) {
        rulesEl.innerHTML = '<span style="color:#8892b0;font-size:13px;">暂无自定义规则</span>';
      } else {
        rulesEl.innerHTML = rules.map((r, i) => `
          <div class="location-item">
            <div>
              <div class="location-name">${escapeHtml(r.规则名)}</div>
              <div class="location-desc">${escapeHtml(r.规则内容)}</div>
            </div>
            <button class="btn btn-danger" onclick="removeRule(${i})">删除</button>
          </div>
        `).join('');
      }

      // 地点
      const locs = world.重要地点 || [];
      const locEl = document.getElementById('locList');
      if (locs.length === 0) {
        locEl.innerHTML = '<li style="color:#8892b0;font-size:13px;">暂无地点</li>';
      } else {
        locEl.innerHTML = locs.map((l, i) => `
          <li class="location-item">
            <div>
              <div class="location-name">${escapeHtml(l.名称)}</div>
              <div class="location-desc">${escapeHtml(l.描述)}${l.距离长乐公寓 ? ' · ' + escapeHtml(l.距离长乐公寓) : ''}</div>
            </div>
            <button class="btn btn-danger" onclick="removeLocation(${i})">删除</button>
          </li>
        `).join('');
      }
    }
    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function addRule() {
      const name = document.getElementById('ruleName').value.trim();
      const content = document.getElementById('ruleContent').value.trim();
      if (!name || !content) { alert('请填写完整'); return; }
      sendToInput(`/添加世界规则: 规则名=${name}, 规则内容=${content}`);
      document.getElementById('ruleName').value = '';
      document.getElementById('ruleContent').value = '';
    }
    function removeRule(index) {
      if (!confirm('确定删除这条规则吗？')) return;
      sendToInput(`/删除世界规则: 索引=${index}`);
    }
    function addLocation() {
      const name = document.getElementById('locName').value.trim();
      const desc = document.getElementById('locDesc').value.trim();
      const dist = document.getElementById('locDist').value.trim();
      if (!name || !desc) { alert('请填写名称和描述'); return; }
      sendToInput(`/添加地点: 名称=${name}, 描述=${desc}, 距离=${dist}`);
      document.getElementById('locName').value = '';
      document.getElementById('locDesc').value = '';
      document.getElementById('locDist').value = '';
    }
    function removeLocation(index) {
      if (!confirm('确定删除这个地点吗？')) return;
      sendToInput(`/删除地点: 索引=${index}`);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) { inputBox.value = text; inputBox.dispatchEvent(new Event('input', { bubbles: true })); }
    }
    renderWorld();
  </script>
</body>
</html>
