<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .title {
      font-size: 20px;
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
    }
    .event-list {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .event-item {
      background: rgba(15, 52, 96, 0.3);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border-left: 3px solid #64ffda;
    }
    .event-time {
      color: #64ffda;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .event-loc {
      color: #8892b0;
      font-size: 11px;
    }
    .event-desc {
      color: #a8b2d1;
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .add-form {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(15, 52, 96, 0.5);
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .empty-state {
      text-align: center;
      color: #8892b0;
      padding: 20px;
      font-style: italic;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .btn-danger {
      background: transparent;
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
    }
    .bottom-bar {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title" id="pageTitle">📜 事件记录</div>

    <div class="add-form">
      <h4 style="color:#64ffda;margin-top:0;">添加事件</h4>
      <div class="form-group">
        <label>时间</label>
        <input type="text" id="evtTime" placeholder="例如：2005年4月1日">
      </div>
      <div class="form-group">
        <label>地点</label>
        <input type="text" id="evtLoc" placeholder="例如：长乐公寓101室">
      </div>
      <div class="form-group">
        <label>简介</label>
        <textarea id="evtDesc" rows="2" placeholder="事件内容简述..."></textarea>
      </div>
      <button class="btn" onclick="addEvent()">添加事件</button>
    </div>

    <div class="event-list" id="eventList">
      <div class="empty-state">暂无事件记录</div>
    </div>

    <div class="bottom-bar">
      <button class="btn btn-secondary" onclick="parentNode.parentNode.parentElement.parentElement.remove()">关闭</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const npcId = urlParams.get('npc') || 'NPC1';

    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function renderEvents() {
      const data = getStatData();
      const npc = (data.NPC || {})[npcId] || {};
      document.getElementById('pageTitle').textContent = '📜 ' + (npc.名称 || npcId) + ' - 事件记录';
      const events = npc.事件记录 || [];
      const list = document.getElementById('eventList');
      if (events.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无事件记录</div>';
        return;
      }
      list.innerHTML = events.map((e, i) => `
        <div class="event-item">
          <div style="display:flex;justify-content:space-between;">
            <div>
              <div class="event-time">📅 ${escapeHtml(e.时间)}</div>
              <div class="event-loc">📍 ${escapeHtml(e.地点)}</div>
            </div>
            <button class="btn btn-danger" onclick="removeEvent(${i})">删除</button>
          </div>
          <div class="event-desc">${escapeHtml(e.简介)}</div>
        </div>
      `).join('');
    }
    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function addEvent() {
      const time = document.getElementById('evtTime').value.trim();
      const loc = document.getElementById('evtLoc').value.trim();
      const desc = document.getElementById('evtDesc').value.trim();
      if (!time || !loc || !desc) { alert('请填写完整信息'); return; }
      sendToInput(`/添加事件 ${npcId}: 时间=${time}, 地点=${loc}, 简介=${desc}`);
      document.getElementById('evtTime').value = '';
      document.getElementById('evtLoc').value = '';
      document.getElementById('evtDesc').value = '';
    }
    function removeEvent(index) {
      if (!confirm('确定删除这条事件记录吗？')) return;
      sendToInput(`/删除事件 ${npcId}: 索引=${index}`);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) { inputBox.value = text; inputBox.dispatchEvent(new Event('input', { bubbles: true })); }
    }
    renderEvents();
  </script>
</body>
</html>
