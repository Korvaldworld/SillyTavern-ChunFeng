<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: transparent;
  color: #eee;
  font-size: 13px;
  line-height: 1.5;
  padding: 10px;
}
.shell {
  border: 1px solid #233554;
  background: linear-gradient(180deg, #0a192f 0%, #112240 100%);
  border-radius: 8px;
  overflow: hidden;
  max-width: 900px;
  margin: 0 auto;
}
.header {
  background: rgba(15, 52, 96, 0.4);
  padding: 12px 16px;
  border-bottom: 1px solid #233554;
  text-align: center;
}
.header-title {
  font-size: 18px;
  color: #e94560;
  font-weight: bold;
  margin-bottom: 4px;
}
.header-sub {
  font-size: 12px;
  color: #8892b0;
}
.card {
  padding: 14px 16px;
  border-bottom: 1px solid #233554;
}
.card-title {
  font-size: 14px;
  color: #64ffda;
  font-weight: bold;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(15, 52, 96, 0.5);
}
.info-row {
  display: flex;
  margin-bottom: 6px;
  align-items: baseline;
}
.info-label {
  color: #64ffda;
  font-weight: bold;
  min-width: 80px;
  flex-shrink: 0;
  font-size: 12px;
}
.info-value {
  color: #ccd6f6;
  flex: 1;
  font-size: 13px;
}
.desc-text {
  color: #a8b2d1;
  font-size: 12px;
  line-height: 1.6;
}
textarea, input[type="text"], input[type="number"], select {
  width: 100%;
  padding: 8px;
  border-radius: 4px;
  border: 1px solid #0f3460;
  background: rgba(10, 25, 47, 0.6);
  color: #ccd6f6;
  font-family: inherit;
  font-size: 13px;
  resize: vertical;
}
textarea:focus, input:focus, select:focus {
  outline: none;
  border-color: #64ffda;
}
.btn {
  background: rgba(233, 69, 96, 0.15);
  border: 1px solid rgba(233, 69, 96, 0.3);
  color: #e94560;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.2s;
  display: inline-block;
}
.btn:hover {
  background: rgba(233, 69, 96, 0.3);
}
.btn-primary {
  background: #e94560;
  color: white;
  border-color: #e94560;
}
.btn-primary:hover {
  background: #c73e54;
}
.btn-secondary {
  background: transparent;
  border: 1px solid #0f3460;
  color: #64ffda;
}
.btn-secondary:hover {
  background: rgba(15, 52, 96, 0.3);
  border-color: #64ffda;
}
.bottom-bar {
  padding: 14px 16px;
  text-align: center;
  background: rgba(10, 25, 47, 0.4);
}
.section { display: none; }
.section.active { display: block; }
.nav-btns {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}
.form-group { margin-bottom: 10px; }
.form-group label {
  display: block;
  margin-bottom: 4px;
  color: #64ffda;
  font-size: 12px;
}
.char-form {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.char-form .form-group.full { grid-column: span 2; }
.mode-switch {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.mode-btn {
  flex: 1;
  padding: 8px;
  text-align: center;
  border: 1px solid #0f3460;
  background: rgba(10, 25, 47, 0.4);
  color: #a8b2d1;
  cursor: pointer;
  border-radius: 4px;
  font-family: inherit;
  font-size: 12px;
}
.mode-btn.active {
  background: rgba(15, 52, 96, 0.6);
  border-color: #64ffda;
  color: #64ffda;
}
@media (max-width: 600px) {
  .char-form { grid-template-columns: 1fr; }
  .char-form .form-group.full { grid-column: span 1; }
  .mode-switch { flex-direction: column; }
}
</style></head><body>
<div class="shell">
  <div class="header">
    <div class="header-title">🎮 模拟人生</div>
    <div class="header-sub">自定义世界观 · 创建主角 · 开启人生</div>
  </div>

  <!-- Step 1: 世界观 -->
  <div class="section active" id="step1">
    <div class="card">
      <div class="card-title">🌍 世界观设定</div>
      <div class="form-group full">
        <label>世界描述 <span style="color:#8892b0;font-weight:normal">（AI将基于此构建故事）</span></label>
        <textarea id="worldDesc" rows="6" placeholder="描述你的世界：时代背景、城市/地区、核心地点、社会规则等。例如：现代都市，繁华的天海市，主角住在老城区的一栋公寓里...">现代都市，繁华的天海市。主角住在老城区一栋名为"长乐公寓"的三层出租楼里，周边有便利店、医院、美容院等配套设施。社会节奏快，人情冷暖交织，平凡的生活中隐藏着无数相遇的可能。</textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚙️ 自定义规则（可选）</div>
      <button class="btn btn-secondary btn-sm" id="btnToggleRule">+ 添加规则</button>
      <div id="ruleForm" style="display:none; margin-top:10px;">
        <div class="form-group">
          <label>规则名称</label>
          <input type="text" id="ruleName" placeholder="规则名称">
        </div>
        <div class="form-group">
          <label>规则内容</label>
          <textarea id="ruleContent" rows="2" placeholder="规则内容"></textarea>
        </div>
        <div style="text-align:right;">
          <button class="btn btn-sm" id="btnCancelRule">取消</button>
          <button class="btn btn-primary btn-sm" id="btnAddRule" style="margin-left:6px;">添加</button>
        </div>
      </div>
      <div id="ruleList" style="margin-top:8px;"></div>
    </div>

    <div class="bottom-bar">
      <button class="btn btn-primary" id="btnGoS2">确认并继续 →</button>
    </div>
  </div>

  <!-- Step 2: 角色创建 -->
  <div class="section" id="step2">
    <div class="card">
      <div class="card-title">🎭 主角设定</div>
      <div class="char-form">
        <div class="form-group">
          <label>姓名 <span style="color:#e94560">*</span></label>
          <input type="text" id="cName" placeholder="主角姓名" value="张浩">
        </div>
        <div class="form-group">
          <label>性别 <span style="color:#e94560">*</span></label>
          <select id="cGender">
            <option value="男" selected>男</option>
            <option value="女">女</option>
            <option value="男娘">男娘</option>
            <option value="扶她">扶她</option>
          </select>
        </div>
        <div class="form-group">
          <label>年龄 <span style="color:#e94560">*</span></label>
          <input type="number" id="cAge" placeholder="年龄" value="19">
        </div>
        <div class="form-group">
          <label>当前地点</label>
          <input type="text" id="cLoc" placeholder="当前所在地点" value="长乐公寓101室">
        </div>
        <div class="form-group full">
          <label>外观描述</label>
          <input type="text" id="cApp" placeholder="外貌特征描述" value="肥胖但壮硕的体型，因长期健身而肌肉发达，但体脂率较高">
        </div>
        <div class="form-group full">
          <label>角色背景</label>
          <textarea id="cBg" rows="2" placeholder="身份、来历、社会关系...">天雄集团董事长张天雄的独子，被父亲安排管理长乐公寓。性格懒散但内心善良，对公寓中的租客们有着复杂的情感。</textarea>
        </div>
        <div class="form-group">
          <label>主导功能 <small style="color:#8892b0">(荣格八维)</small></label>
          <select id="cMbti1">
            <option value="" selected>--</option>
            <option value="Ti">Ti</option><option value="Te">Te</option><option value="Fi">Fi</option><option value="Fe">Fe</option>
            <option value="Ni">Ni</option><option value="Ne">Ne</option><option value="Si">Si</option><option value="Se">Se</option>
          </select>
        </div>
        <div class="form-group">
          <label>辅助功能</label>
          <select id="cMbti2">
            <option value="" selected>--</option>
            <option value="Ti">Ti</option><option value="Te">Te</option><option value="Fi">Fi</option><option value="Fe">Fe</option>
            <option value="Ni">Ni</option><option value="Ne">Ne</option><option value="Si">Si</option><option value="Se">Se</option>
          </select>
        </div>
        <div class="form-group">
          <label>第三功能</label>
          <select id="cMbti3">
            <option value="" selected>--</option>
            <option value="Ti">Ti</option><option value="Te">Te</option><option value="Fi">Fi</option><option value="Fe">Fe</option>
            <option value="Ni">Ni</option><option value="Ne">Ne</option><option value="Si">Si</option><option value="Se">Se</option>
          </select>
        </div>
        <div class="form-group">
          <label>劣势功能</label>
          <select id="cMbti4">
            <option value="" selected>--</option>
            <option value="Ti">Ti</option><option value="Te">Te</option><option value="Fi">Fi</option><option value="Fe">Fe</option>
            <option value="Ni">Ni</option><option value="Ne">Ne</option><option value="Si">Si</option><option value="Se">Se</option>
          </select>
        </div>
        <div class="form-group full">
          <label>性格核心特征</label>
          <input type="text" id="cTrait" placeholder="用一句话概括性格" value="理性、内敛、务实、自嘲式幽默">
        </div>
        <div class="form-group full">
          <label>隐藏秘密 <small style="color:#8892b0">（仅AI知晓，主角不自知或不愿提及）</small></label>
          <textarea id="cSecret" rows="2" placeholder="一个深藏心底的秘密..."></textarea>
        </div>
      </div>
    </div>

    <div class="nav-btns" style="padding:0 16px 14px;">
      <button class="btn btn-secondary" id="btnBackS1">← 返回修改</button>
      <button class="btn btn-primary" id="btnGoS3">确定开局 →</button>
    </div>
  </div>

  <!-- Step 3: 确认 -->
  <div class="section" id="step3">
    <div class="card">
      <div class="card-title">📋 开局确认</div>
      <div id="confirmContent" class="desc-text" style="white-space:pre-wrap;"></div>
    </div>
    <div class="card">
      <div class="card-title">🎬 开场剧情设定（可选）</div>
      <div class="desc-text" style="margin-bottom:8px">描述希望以什么样的剧情开场，留空则由AI自由发挥。</div>
      <textarea id="openingPlot" rows="3" placeholder="例如：主角在公寓楼下遇到了正在搬家的女性，主动帮忙..."></textarea>
    </div>
    <div class="nav-btns" style="padding:0 16px 14px;">
      <button class="btn btn-secondary" id="btnBackS2">← 返回修改</button>
      <button class="btn btn-primary" id="btnConfirm">🚀 开始游戏</button>
    </div>
  </div>
</div>

<script>
$(function() {
  var rules = [];

  function showStep(n) {
    $('.section').removeClass('active');
    $('#step' + n).addClass('active');
  }

  // Rules
  $('#btnToggleRule, #btnCancelRule').on('click', function() {
    var form = $('#ruleForm');
    var isHidden = !form.is(':visible');
    form.toggle(isHidden);
    $('#btnToggleRule').toggle(!isHidden);
    if (isHidden) $('#ruleName').focus();
  });

  $('#btnAddRule').on('click', function() {
    var name = $('#ruleName').val().trim();
    var content = $('#ruleContent').val().trim();
    if (!name || !content) { alert('请填写完整'); return; }
    rules.push({ 规则名: name, 规则内容: content });
    renderRules();
    $('#ruleName').val('');
    $('#ruleContent').val('');
    $('#ruleForm').hide();
    $('#btnToggleRule').show();
  });

  function renderRules() {
    var list = $('#ruleList');
    if (rules.length === 0) { list.html(''); return; }
    list.html(rules.map(function(r, i) {
      return '<div style="background:rgba(15,52,96,0.3);padding:8px 10px;margin-bottom:6px;border-radius:4px;border-left:2px solid #64ffda;font-size:12px;">' +
        '<div style="color:#64ffda;font-weight:bold;">' + esc(r.规则名) + '</div>' +
        '<div style="color:#a8b2d1;font-size:11px;">' + esc(r.规则内容) + '</div>' +
        '<button class="btn btn-sm" style="margin-top:4px;" onclick="delRule(' + i + ')">删除</button></div>';
    }).join(''));
  }
  window.delRule = function(idx) { rules.splice(idx, 1); renderRules(); };

  function esc(t) { return $('<div>').text(t).html(); }

  // Navigation
  $('#btnGoS2').on('click', function() { showStep(2); });
  $('#btnBackS1').on('click', function() { showStep(1); });
  $('#btnGoS3').on('click', function() { showStep(3); renderConfirm(); });
  $('#btnBackS2').on('click', function() { showStep(2); });

  function renderConfirm() {
    var wd = $('#worldDesc').val().trim();
    var c = {
      姓名: $('#cName').val().trim() || '未命名',
      性别: $('#cGender').val(),
      年龄: $('#cAge').val() || '--',
      当前地点: $('#cLoc').val().trim() || '--',
      外观: $('#cApp').val().trim() || '--',
      角色背景: $('#cBg').val().trim() || '--',
      主导: $('#cMbti1').val() || '--',
      辅助: $('#cMbti2').val() || '--',
      第三: $('#cMbti3').val() || '--',
      劣势: $('#cMbti4').val() || '--',
      核心特征: $('#cTrait').val().trim() || '--',
      隐藏秘密: $('#cSecret').val().trim() || '无'
    };

    var txt = '【世界观设定】\n\n' + wd + '\n\n';
    if (rules.length > 0) {
      txt += '【用户自定义规则】\n' + rules.map(function(r) {
        return '- ' + r.规则名 + ': ' + r.规则内容;
      }).join('\n') + '\n\n';
    }
    txt += '【主角信息】\n' +
      '- 姓名：' + c.姓名 + '\n' +
      '- 性别：' + c.性别 + '\n' +
      '- 年龄：' + c.年龄 + '\n' +
      '- 外观：' + c.外观 + '\n' +
      '- 角色背景：' + c.角色背景 + '\n' +
      '- 当前地点：' + c.当前地点 + '\n' +
      '- 性格（荣格八维）：主导=' + c.主导 + ' / 辅助=' + c.辅助 + ' / 第三=' + c.第三 + ' / 劣势=' + c.劣势 + '\n' +
      '- 核心特征：' + c.核心特征 + '\n\n';
    var plot = $('#openingPlot').val().trim();
    if (plot) {
      txt += '【开场剧情要求】\n' + plot + '\n\n';
    }
    $('#confirmContent').text(txt);
  }

  function writeVar(data) {
    try {
      var ctx = window.SillyTavern.getContext();
      ctx.chatMetadata.variables['stat_data'] = JSON.stringify(data);
      return true;
    } catch(e) { console.error('writeVar:', e); return false; }
  }

  function sendStackedCmd(text) {
    try {
      var current = '';
      try { current = window.parent.$('#send_textarea').val() || ''; } catch(e) {}
      var separator = current.trim() ? '\n\n==========\n\n' : '';
      var newText = current + separator + text;
      triggerSlash('/setinput ' + newText);
      if (typeof toastr !== 'undefined') toastr.success('已添加到输入框');
    } catch(e) {
      var el = document.createElement('div');
      el.className = 'cmd-box';
      el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#112240;border:1px solid #233554;padding:16px;z-index:99999;max-width:90%;max-height:80%;overflow:auto;border-radius:8px;color:#ccd6f6;';
      el.innerHTML = '<div style="color:#e94560;font-weight:bold;margin-bottom:8px;">请复制以下命令并发送：</div>' +
        '<textarea readonly style="width:100%;min-height:120px;background:#0a192f;border:1px solid #233554;color:#ccd6f6;padding:8px;font-family:inherit;font-size:12px;" onclick="this.select()">' + esc(text) + '</textarea>' +
        '<button class="btn btn-primary btn-sm" style="margin-top:8px;" id="btnCloseCmd">关闭</button>';
      document.body.appendChild(el);
      $(document).one('click', '#btnCloseCmd', function() { $(el).remove(); });
    }
  }

  $('#btnConfirm').on('click', function() {
    var c = {
      姓名: $('#cName').val().trim() || '未命名',
      性别: $('#cGender').val(),
      年龄: parseInt($('#cAge').val()) || 0,
      当前地点: $('#cLoc').val().trim() || '未知',
      外观: $('#cApp').val().trim() || '',
      角色背景: $('#cBg').val().trim() || '',
      性格: {
        荣格八维: {
          主导: $('#cMbti1').val() || null,
          辅助: $('#cMbti2').val() || null,
          第三: $('#cMbti3').val() || null,
          劣势: $('#cMbti4').val() || null
        },
        核心特征: $('#cTrait').val().trim() || null
      },
      隐藏秘密: $('#cSecret').val().trim() || null
    };
    var wd = $('#worldDesc').val().trim();
    var plot = $('#openingPlot').val().trim();

    var initData = {
      宿主: c,
      身体: {
        性别: c.性别,
        贞操状态: { 处女: c.性别 === '女' || c.性别 === '扶她' ? true : null, 口腔处女: true, 肛门处女: true, 阴茎处男: c.性别 === '男' || c.性别 === '扶她' ? true : null },
        穿着: { 上衣: null, 下装: null, 足部: null, 内衣: null, 内裤: null },
        即时状态: { 小穴: null, 子宫: null, 屁穴: null, 体液: null, 阴茎: null, 前列腺: null, 尿道: null, 精液: null }
      },
      堕落计数: {},
      心理: { 对系统态度: '好奇期待', 羁绊值: 0 },
      任务: {
        主线: { 标题: '待发布', 描述: '暂无', 条件: '暂无', 失败惩罚: null, 时间限制: null, 奖励: { 积分: 0, 物品: {} }, 完成: false },
        支线: {},
        持续: { 标题: '待发布', 描述: '暂无', 条件: '暂无', 失败惩罚: null, 时间限制: null, 奖励: { 积分: 0, 物品: {} }, 完成次数: 0, 启用: false }
      },
      系统: { 积分: 0, 当前日期: '未知', 当前时间: '未知', 羁绊完成人数: 0 },
      商城: { 在售: {}, 背包: {}, 抽奖: { 允许AI更新: false, 槽位: Array.from({length:10},()=>({名称:null,概率:0,描述:null})) } },
      宿主能力: null,
      NPC: null
    };

    writeVar(initData);

    var cmdText = '【世界观设定】\n\n' + wd + '\n\n';
    if (rules.length > 0) {
      cmdText += '【用户自定义规则】\n' + rules.map(function(r) { return '- ' + r.规则名 + ': ' + r.规则内容; }).join('\n') + '\n\n';
    }
    cmdText += '【主角信息】\n' +
      '- 姓名：' + c.姓名 + '\n' +
      '- 性别：' + c.性别 + '\n' +
      '- 年龄：' + c.年龄 + '\n' +
      '- 外观：' + c.外观 + '\n' +
      '- 角色背景：' + c.角色背景 + '\n' +
      '- 当前地点：' + c.当前地点 + '\n' +
      '- 性格（荣格八维）：主导=' + (c.性格.荣格八维.主导||'--') + ' / 辅助=' + (c.性格.荣格八维.辅助||'--') + ' / 第三=' + (c.性格.荣格八维.第三||'--') + ' / 劣势=' + (c.性格.荣格八维.劣势||'--') + '\n' +
      '- 核心特征：' + (c.性格.核心特征||'--') + '\n\n';
    if (plot) {
      cmdText += '【开场剧情要求】\n' + plot + '\n\n';
    }
    cmdText += '请基于以上设定开始游戏，输出一段开场剧情。在回复末尾输出 <StatusPlaceHolderImpl/>';

    sendStackedCmd(cmdText);
    if (typeof toastr !== 'undefined') toastr.success('游戏已初始化，变量已保存');
  });
});
</script>
</body></html>
