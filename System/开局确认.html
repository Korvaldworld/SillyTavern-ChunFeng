<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .title {
      font-size: 24px;
      color: #e94560;
      text-align: center;
      margin-bottom: 24px;
    }
    .summary-card {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .summary-card h3 {
      color: #64ffda;
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #0f3460;
      padding-bottom: 8px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .info-item {
      background: rgba(15, 52, 96, 0.3);
      padding: 10px;
      border-radius: 6px;
    }
    .info-item label {
      color: #64ffda;
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }
    .info-item value {
      color: #ccd6f6;
      font-size: 14px;
    }
    .rules-list {
      margin: 0;
      padding-left: 16px;
      color: #a8b2d1;
      font-size: 13px;
    }
    .rules-list li {
      margin-bottom: 6px;
    }
    .empty-text {
      color: #8892b0;
      font-style: italic;
      font-size: 13px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 14px;
    }
    .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: #c73e54;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
    }
    .bottom-bar {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(15, 52, 96, 0.5);
    }
    .character-preview {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
    }
    .character-preview h4 {
      color: #e94560;
      margin-top: 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">✅ 开局确认</div>

    <div class="summary-card">
      <h3>🌍 世界观信息</h3>
      <div class="info-grid">
        <div class="info-item"><label>城市</label><value>春风市</value></div>
        <div class="info-item"><label>年代</label><value>2005年</value></div>
      </div>
      <div style="margin-top: 12px;">
        <label style="color:#64ffda;font-size:12px;">自定义规则</label>
        <div id="customRules">加载中...</div>
      </div>
    </div>

    <div class="summary-card">
      <h3>👤 角色信息</h3>
      <div id="playerInfo">加载中...</div>
    </div>

    <div class="summary-card">
      <h3>🎭 选择开局角色（可选）</h3>
      <p style="color:#a8b2d1;font-size:13px;margin-top:0;">选择一位主要女性角色作为开局交互对象，不选则让 AI 自由安排。</p>
      <div class="form-group">
        <select id="openingCharacter">
          <option value="">不指定，让 AI 自由安排</option>
          <option value="施美玉">施美玉（天雄集团总经理，37岁）</option>
          <option value="梁惠">梁惠（美容院按摩师，36岁）</option>
          <option value="雪婉">雪婉（失业前白领，33岁）</option>
          <option value="雪柔">雪柔（医院护士，31岁）</option>
          <option value="颜媚">颜媚（公司采购职员，30岁）</option>
          <option value="茵曼">茵曼（离家出走中，32岁）</option>
        </select>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="btn" onclick="confirmStart()">🚀 确定开局</button>
    </div>
  </div>

  <script>
    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function renderSummary() {
      const data = getStatData();
      const world = data.世界观 || {};
      const player = data.玩家 || {};

      // 渲染自定义规则
      const rules = world.用户自定义规则 || [];
      const rulesEl = document.getElementById('customRules');
      if (rules.length === 0) {
        rulesEl.innerHTML = '<span class="empty-text">未添加自定义规则</span>';
      } else {
        rulesEl.innerHTML = '<ul class="rules-list">' + rules.map(r => `<li><strong>${r.规则名}</strong>: ${r.规则内容}</li>`).join('') + '</ul>';
      }

      // 渲染角色信息
      const infoEl = document.getElementById('playerInfo');
      if (!player.名称) {
        infoEl.innerHTML = '<span class="empty-text">未获取到角色信息</span>';
        return;
      }
      infoEl.innerHTML = `
        <div class="info-grid">
          <div class="info-item"><label>名称</label><value>${player.名称}</value></div>
          <div class="info-item"><label>年龄</label><value>${player.年龄}</value></div>
          <div class="info-item"><label>身高</label><value>${player.身高 || '未知'}</value></div>
          <div class="info-item"><label>当前地点</label><value>${player.当前地点 || '未知'}</value></div>
        </div>
        <div class="character-preview">
          <h4>角色设定</h4>
          <div style="font-size:13px;color:#a8b2d1;line-height:1.6;">
            <p><strong style="color:#64ffda;">外观：</strong>${player.外观 || '未知'}</p>
            <p><strong style="color:#64ffda;">背景：</strong>${player.角色背景 || '未知'}</p>
            <p><strong style="color:#64ffda;">性能力：</strong>${player.性能力 || '未知'}</p>
            <p><strong style="color:#64ffda;">性癖：</strong>${player.性癖 || '未知'}</p>
          </div>
        </div>
      `;
    }
    function confirmStart() {
      const data = getStatData();
      const player = data.玩家 || {};
      const world = data.世界观 || {};
      const selectedChar = document.getElementById('openingCharacter').value;

      let promptText = `【开局设定】\n\n`;
      promptText += `世界观：2005年春风市\n`;
      const rules = world.用户自定义规则 || [];
      if (rules.length > 0) {
        promptText += `自定义规则：\n` + rules.map(r => `- ${r.规则名}: ${r.规则内容}`).join('\n') + '\n';
      }
      promptText += `\n主角信息：\n`;
      promptText += `- 名称：${player.名称}\n`;
      promptText += `- 年龄：${player.年龄}\n`;
      promptText += `- 身高：${player.身高 || '未知'}\n`;
      promptText += `- 外观：${player.外观 || '未知'}\n`;
      promptText += `- 角色背景：${player.角色背景 || '未知'}\n`;
      promptText += `- 当前地点：${player.当前地点 || '未知'}\n`;
      if (selectedChar) {
        promptText += `\n开局交互角色：${selectedChar}\n`;
      }
      promptText += `\n请开始叙事，设置环境变量（时间、地点、天气、当前交互角色），并输出 JSON-Patch 更新指令。`;

      sendToInput(promptText);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) {
        inputBox.value = text;
        inputBox.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }
    renderSummary();
  </script>
</body>
</html>
