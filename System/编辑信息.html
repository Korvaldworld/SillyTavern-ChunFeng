<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .title {
      font-size: 20px;
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-section {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .form-group input:disabled,
    .form-group textarea:disabled {
      background: rgba(15, 52, 96, 0.3);
      color: #8892b0;
      cursor: not-allowed;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #64ffda;
    }
    .lock-hint {
      font-size: 11px;
      color: #e94560;
      margin-top: 4px;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #c73e54;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .bottom-bar {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">✏️ 编辑玩家信息</div>
    <div class="form-section">
      <div class="form-group">
        <label>名称 <span style="color:#e94560">🔒 已锁定</span></label>
        <input type="text" id="editName" disabled>
        <div class="lock-hint">开场创建后不可修改</div>
      </div>
      <div class="form-group">
        <label>年龄 <span style="color:#e94560">🔒 已锁定</span></label>
        <input type="number" id="editAge" disabled>
        <div class="lock-hint">开场创建后不可修改</div>
      </div>
      <div class="form-group">
        <label>身高</label>
        <input type="text" id="editHeight" placeholder="例如：193cm">
      </div>
      <div class="form-group">
        <label>外观</label>
        <textarea id="editAppearance" rows="2" placeholder="描述外貌特征..."></textarea>
      </div>
      <div class="form-group">
        <label>角色背景</label>
        <textarea id="editBackground" rows="3" placeholder="描述身份、来历、社会关系..."></textarea>
      </div>
      <div class="form-group">
        <label>性能力</label>
        <input type="text" id="editAbility" placeholder="性能力描述">
      </div>
      <div class="form-group">
        <label>性癖</label>
        <input type="text" id="editFetish" placeholder="性癖偏好">
      </div>
      <div class="form-group">
        <label>当前地点</label>
        <input type="text" id="editLocation" placeholder="当前所在地点">
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-secondary" onclick="parentNode.parentNode.parentElement.parentElement.remove()" style="margin-right:10px;">取消</button>
      <button class="btn" onclick="saveEdit()">保存修改</button>
    </div>
  </div>

  <script>
    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function initForm() {
      const data = getStatData();
      const p = data.玩家 || {};
      document.getElementById('editName').value = p.名称 || '';
      document.getElementById('editAge').value = p.年龄 || '';
      document.getElementById('editHeight').value = p.身高 || '';
      document.getElementById('editAppearance').value = p.外观 || '';
      document.getElementById('editBackground').value = p.角色背景 || '';
      document.getElementById('editAbility').value = p.性能力 || '';
      document.getElementById('editFetish').value = p.性癖 || '';
      document.getElementById('editLocation').value = p.当前地点 || '';
    }
    function saveEdit() {
      const height = document.getElementById('editHeight').value.trim();
      const appearance = document.getElementById('editAppearance').value.trim();
      const background = document.getElementById('editBackground').value.trim();
      const ability = document.getElementById('editAbility').value.trim();
      const fetish = document.getElementById('editFetish').value.trim();
      const location = document.getElementById('editLocation').value.trim();

      let text = '/更新玩家:';
      if (height) text += ` 身高=${height},`;
      if (appearance) text += ` 外观=${appearance},`;
      if (background) text += ` 角色背景=${background},`;
      if (ability) text += ` 性能力=${ability},`;
      if (fetish) text += ` 性癖=${fetish},`;
      if (location) text += ` 当前地点=${location},`;
      text = text.replace(/,$/, '');

      sendToInput(text);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) {
        inputBox.value = text;
        inputBox.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }
    initForm();
  </script>
</body>
</html>
