<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: transparent;
  color: #ccd6f6;
  font-size: 11px;
  line-height: 1.3;
  padding: 2px;
}
.status-bar {
  background: linear-gradient(180deg, #0a192f 0%, #112240 100%);
  border: 1px solid #233554;
  border-radius: 4px;
  overflow: hidden;
}
.env-bar {
  background: rgba(15, 52, 96, 0.3);
  padding: 4px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  border-bottom: 1px solid #233554;
  font-size: 11px;
}
.env-item { color: #8892b0; }
.env-item strong { color: #64ffda; font-weight: normal; }

.tabs {
  display: flex;
  gap: 1px;
  background: #0a192f;
  border-bottom: 1px solid #233554;
}
.tab {
  flex: 1;
  padding: 5px 2px;
  background: rgba(15, 52, 96, 0.2);
  border: none;
  color: #8892b0;
  cursor: pointer;
  font-size: 10px;
  font-family: inherit;
  text-align: center;
  transition: all 0.15s;
}
.tab:hover { background: rgba(15, 52, 96, 0.4); }
.tab.active {
  background: rgba(15, 52, 96, 0.6);
  color: #64ffda;
  border-bottom: 1px solid #64ffda;
}

.tab-content { display: none; padding: 6px 8px; max-height: 320px; overflow: auto; }
.tab-content.active { display: block; }

.section-title {
  color: #64ffda;
  font-size: 11px;
  font-weight: bold;
  margin: 6px 0 4px;
  padding-bottom: 3px;
  border-bottom: 1px solid rgba(15, 52, 96, 0.5);
}
.section-title:first-child { margin-top: 0; }

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px;
}
.info-item {
  background: rgba(15, 52, 96, 0.2);
  padding: 4px 6px;
  border-radius: 3px;
  font-size: 10px;
}
.info-item label {
  color: #64ffda;
  font-size: 9px;
  display: block;
  margin-bottom: 1px;
}
.info-item .value { color: #ccd6f6; }

.affinity-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.affinity-item {
  background: rgba(10, 25, 47, 0.5);
  padding: 3px 6px;
  border-radius: 3px;
  text-align: center;
  min-width: 40px;
}
.affinity-value {
  font-size: 12px;
  font-weight: bold;
}
.affinity-label {
  font-size: 9px;
  color: #8892b0;
}

.npc-card {
  background: rgba(15, 52, 96, 0.2);
  border: 1px solid rgba(35, 53, 84, 0.5);
  border-radius: 4px;
  padding: 6px;
  margin-bottom: 5px;
}
.npc-name {
  color: #e94560;
  font-weight: bold;
  font-size: 12px;
  margin-bottom: 2px;
}
.npc-sub {
  color: #8892b0;
  font-size: 10px;
  margin-bottom: 4px;
}

.btn {
  background: rgba(233, 69, 96, 0.15);
  border: 1px solid rgba(233, 69, 96, 0.25);
  color: #e94560;
  padding: 2px 8px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 10px;
  font-family: inherit;
}
.btn:hover { background: rgba(233, 69, 96, 0.3); }
.btn-sm { padding: 1px 5px; font-size: 9px; }
.btn-primary { background: #e94560; color: white; border-color: #e94560; }
.btn-secondary {
  background: rgba(15, 52, 96, 0.3);
  border: 1px solid #0f3460;
  color: #64ffda;
}
.btn-secondary:hover { border-color: #64ffda; }

.empty-state {
  text-align: center;
  color: #8892b0;
  padding: 8px;
  font-size: 10px;
  font-style: italic;
}

.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 6px;
  background: rgba(15, 52, 96, 0.15);
  border-radius: 3px;
  margin-bottom: 3px;
}
.item-name { color: #64ffda; font-size: 10px; }
.item-desc { color: #8892b0; font-size: 9px; }

.progress-bar {
  height: 4px;
  background: #0f3460;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 2px;
}
.progress-fill {
  height: 100%;
  border-radius: 2px;
}

.mood-badge {
  background: rgba(100, 255, 218, 0.12);
  color: #64ffda;
  padding: 1px 5px;
  border-radius: 8px;
  font-size: 9px;
}

.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
}
.popup-panel {
  background: #112240;
  border: 1px solid #233554;
  border-radius: 6px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
}
.popup-header {
  padding: 8px 12px;
  border-bottom: 1px solid #233554;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.popup-title { color: #64ffda; font-size: 13px; font-weight: bold; }
.popup-close { background: transparent; border: none; color: #e94560; font-size: 18px; cursor: pointer; }
.popup-content { padding: 10px 12px; overflow: auto; flex: 1; }

.form-row { margin-bottom: 6px; }
.form-row label { display: block; color: #64ffda; font-size: 10px; margin-bottom: 2px; }
.form-input, .form-textarea {
  width: 100%;
  padding: 4px 6px;
  background: rgba(10, 25, 47, 0.6);
  border: 1px solid #0f3460;
  color: #ccd6f6;
  border-radius: 3px;
  font-family: inherit;
  font-size: 11px;
}
.form-textarea { min-height: 40px; resize: vertical; }
.field-wrap { display: flex; gap: 6px; align-items: center; }

@media (max-width: 600px) {
  .info-grid { grid-template-columns: 1fr; }
  .tab { font-size: 9px; padding: 4px 1px; }
}
</style></head><body>
<div class="status-bar">
  <div class="env-bar">
    <div class="env-item">📅<strong id="eDate">--</strong></div>
    <div class="env-item">🕐<strong id="eTime">--</strong></div>
    <div class="env-item">📍<strong id="eLoc">--</strong></div>
    <div class="env-item">💰<strong id="ePoints">0</strong></div>
    <div class="env-item">❤️<strong id="eBond">0</strong></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="host">主角</button>
    <button class="tab" data-tab="body">身体</button>
    <button class="tab" data-tab="tasks">任务</button>
    <button class="tab" data-tab="npcs">角色</button>
    <button class="tab" data-tab="shop">商城</button>
    <button class="tab" data-tab="ability">能力</button>
  </div>

  <!-- 主角 -->
  <div class="tab-content active" id="tab-host">
    <div class="section-title">👤 基本信息</div>
    <div class="info-grid" id="hostInfo">
      <div class="empty-state">加载中...</div>
    </div>
    <div class="section-title">🧠 心理状态</div>
    <div id="hostMental">
      <div class="empty-state">加载中...</div>
    </div>
  </div>

  <!-- 身体 -->
  <div class="tab-content" id="tab-body">
    <div class="section-title">👕 穿着</div>
    <div id="bodyCloth"></div>
    <div class="section-title">🔒 贞操状态</div>
    <div id="bodyVirgin"></div>
    <div class="section-title">⚡ 即时状态</div>
    <div id="bodyInstant"></div>
  </div>

  <!-- 任务 -->
  <div class="tab-content" id="tab-tasks">
    <div class="section-title">📌 主线任务</div>
    <div id="taskMain"></div>
    <div class="section-title">📋 支线任务</div>
    <div id="taskSide"></div>
    <div class="section-title">🔄 持续任务</div>
    <div id="taskDaily"></div>
  </div>

  <!-- NPC -->
  <div class="tab-content" id="tab-npcs">
    <div id="npcList">
      <div class="empty-state">暂无角色</div>
    </div>
  </div>

  <!-- 商城 -->
  <div class="tab-content" id="tab-shop">
    <div class="section-title">🎒 背包</div>
    <div id="shopBag"></div>
    <div class="section-title">🏪 在售商品</div>
    <div id="shopSale"></div>
  </div>

  <!-- 能力 -->
  <div class="tab-content" id="tab-ability">
    <div class="section-title">📊 属性点</div>
    <div id="abiStats"></div>
    <div class="section-title">✨ 能力列表</div>
    <div id="abiList"></div>
  </div>
</div>

<div id="popupOverlay" style="display:none"></div>

<script>
$(function() {
  // === API ===
  function readVar() {
    try {
      var c = window.SillyTavern.getContext();
      var r = c.chatMetadata.variables['stat_data'];
      if (r) return typeof r === 'string' ? JSON.parse(r) : r;
    } catch(e) {}
    return {};
  }
  function writeVar(data) {
    try {
      var ctx = window.SillyTavern.getContext();
      ctx.chatMetadata.variables['stat_data'] = JSON.stringify(data);
      return true;
    } catch(e) { return false; }
  }
  function updateVar(path, value) {
    var data = readVar();
    var keys = path.split('.');
    var obj = data;
    for (var i = 0; i < keys.length - 1; i++) {
      if (!obj[keys[i]]) obj[keys[i]] = {};
      obj = obj[keys[i]];
    }
    obj[keys[keys.length - 1]] = value;
    return writeVar(data);
  }
  function getVal(path, def) {
    var data = readVar();
    var keys = path.split('.');
    var obj = data;
    for (var i = 0; i < keys.length; i++) {
      if (obj == null) return def;
      obj = obj[keys[i]];
    }
    return obj !== undefined ? obj : def;
  }
  function sendCmd(text) {
    try {
      var cur = '';
      try { cur = window.parent.$('#send_textarea').val() || ''; } catch(e) {}
      var sep = cur.trim() ? '\n\n---\n\n' : '';
      triggerSlash('/setinput ' + cur + sep + text);
    } catch(e) {}
  }
  function esc(t) { return $('<div>').text(t || '').html(); }

  // === Popup ===
  function openPopup(tt, html) {
    $('#popupOverlay').html(
      '<div class="popup-overlay"><div class="popup-panel">' +
      '<div class="popup-header"><span class="popup-title">' + esc(tt) + '</span><button class="popup-close" data-act="close">&times;</button></div>' +
      '<div class="popup-content">' + html + '</div></div></div>'
    ).show();
  }
  function closePopup() { $('#popupOverlay').hide().empty(); }
  $(document).on('click', '[data-act="close"]', closePopup);

  // === Tab Switch ===
  $(document).on('click', '.tab', function() {
    $('.tab').removeClass('active');
    $(this).addClass('active');
    $('.tab-content').removeClass('active');
    $('#tab-' + $(this).data('tab')).addClass('active');
  });

  // === Render Host ===
  function renderHost() {
    var h = getVal('宿主', {});
    var mental = getVal('心理', {});
    var sys = getVal('系统', {});
    $('#eDate').text(sys.当前日期 || '--');
    $('#eTime').text(sys.当前时间 || '--');
    $('#eLoc').text(h.当前地点 || '--');
    $('#ePoints').text(sys.积分 || 0);
    $('#eBond').text(mental.羁绊值 || 0);

    var mbti = h.性格 && h.性格.荣格八维 ? h.性格.荣格八维 : {};
    var info =
      '<div class="info-item"><label>姓名</label><div class="value">' + esc(h.姓名) + '</div></div>' +
      '<div class="info-item"><label>性别</label><div class="value">' + esc(h.性别) + '</div></div>' +
      '<div class="info-item"><label>年龄</label><div class="value">' + (h.年龄 || '--') + '</div></div>' +
      '<div class="info-item"><label>地点</label><div class="value">' + esc(h.当前地点) + '</div></div>' +
      '<div class="info-item"><label>主导</label><div class="value">' + esc(mbti.主导) + '</div></div>' +
      '<div class="info-item"><label>辅助</label><div class="value">' + esc(mbti.辅助) + '</div></div>' +
      '<div class="info-item"><label>第三</label><div class="value">' + esc(mbti.第三) + '</div></div>' +
      '<div class="info-item"><label>劣势</label><div class="value">' + esc(mbti.劣势) + '</div></div>';
    $('#hostInfo').html(info);

    var bond = mental.羁绊值 || 0;
    var bondColor = bond < 30 ? '#e94560' : bond < 70 ? '#ffd93d' : '#64ffda';
    $('#hostMental').html(
      '<div class="info-grid">' +
      '<div class="info-item"><label>对系统态度</label><div class="value">' + esc(mental.对系统态度 || '--') + '</div></div>' +
      '<div class="info-item"><label>羁绊值</label><div class="value" style="color:' + bondColor + '">' + bond + '/100</div></div>' +
      '</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + bond + '%;background:' + bondColor + '"></div></div>'
    );
  }

  // === Render Body ===
  function renderBody() {
    var b = getVal('身体', {});
    var v = b.贞操状态 || {};
    var c = b.穿着 || {};
    var i = b.即时状态 || {};

    var cloth =
      '<div class="info-grid">' +
      '<div class="info-item"><label>上衣</label><div class="value">' + esc(c.上衣 || '无') + '</div></div>' +
      '<div class="info-item"><label>下装</label><div class="value">' + esc(c.下装 || '无') + '</div></div>' +
      '<div class="info-item"><label>足部</label><div class="value">' + esc(c.足部 || '无') + '</div></div>' +
      '<div class="info-item"><label>内衣</label><div class="value">' + esc(c.内衣 || '无') + '</div></div>' +
      '<div class="info-item"><label>内裤</label><div class="value">' + esc(c.内裤 || '无') + '</div></div>' +
      '</div>';
    $('#bodyCloth').html(cloth);

    var virginItems = '';
    if (v.处女 !== null && v.处女 !== undefined) virginItems += '<div class="info-item"><label>处女</label><div class="value">' + (v.处女 ? '是' : '否') + '</div></div>';
    if (v.口腔处女 !== null && v.口腔处女 !== undefined) virginItems += '<div class="info-item"><label>口腔处女</label><div class="value">' + (v.口腔处女 ? '是' : '否') + '</div></div>';
    if (v.肛门处女 !== null && v.肛门处女 !== undefined) virginItems += '<div class="info-item"><label>肛门处女</label><div class="value">' + (v.肛门处女 ? '是' : '否') + '</div></div>';
    if (v.阴茎处男 !== null && v.阴茎处男 !== undefined) virginItems += '<div class="info-item"><label>阴茎处男</label><div class="value">' + (v.阴茎处男 ? '是' : '否') + '</div></div>';
    $('#bodyVirgin').html(virginItems || '<div class="empty-state">暂无数据</div>');

    var instantItems = '';
    if (i.小穴) instantItems += '<div class="info-item"><label>小穴</label><div class="value">' + esc(i.小穴) + '</div></div>';
    if (i.子宫) instantItems += '<div class="info-item"><label>子宫</label><div class="value">' + esc(i.子宫) + '</div></div>';
    if (i.屁穴) instantItems += '<div class="info-item"><label>屁穴</label><div class="value">' + esc(i.屁穴) + '</div></div>';
    if (i.体液) instantItems += '<div class="info-item"><label>体液</label><div class="value">' + esc(i.体液) + '</div></div>';
    if (i.阴茎) instantItems += '<div class="info-item"><label>阴茎</label><div class="value">' + esc(i.阴茎) + '</div></div>';
    if (i.前列腺) instantItems += '<div class="info-item"><label>前列腺</label><div class="value">' + esc(i.前列腺) + '</div></div>';
    if (i.尿道) instantItems += '<div class="info-item"><label>尿道</label><div class="value">' + esc(i.尿道) + '</div></div>';
    if (i.精液) instantItems += '<div class="info-item"><label>精液</label><div class="value">' + esc(i.精液) + '</div></div>';
    $('#bodyInstant').html(instantItems || '<div class="empty-state">暂无数据</div>');
  }

  // === Render Tasks ===
  function renderTasks() {
    var t = getVal('任务', {});
    var main = t.主线 || {};
    var side = t.支线 || {};
    var daily = t.持续 || {};

    var mainHtml = main.标题 && main.标题 !== '待发布' ?
      '<div class="npc-card">' +
      '<div style="color:#e94560;font-weight:bold;font-size:11px;">' + esc(main.标题) + (main.完成 ? ' <span style="color:#64ffda">[已完成]</span>' : '') + '</div>' +
      '<div style="color:#a8b2d1;font-size:10px;margin-top:2px;">' + esc(main.描述) + '</div>' +
      '<div style="color:#8892b0;font-size:9px;margin-top:2px;">条件: ' + esc(main.条件) + '</div>' +
      (main.奖励 && main.奖励.积分 ? '<div style="color:#ffd93d;font-size:9px;">奖励积分: ' + main.奖励.积分 + '</div>' : '') +
      '</div>' : '<div class="empty-state">暂无主线任务</div>';
    $('#taskMain').html(mainHtml);

    var sideKeys = Object.keys(side);
    if (sideKeys.length === 0) {
      $('#taskSide').html('<div class="empty-state">暂无支线任务</div>');
    } else {
      $('#taskSide').html(sideKeys.map(function(k) {
        var s = side[k];
        return '<div class="npc-card">' +
          '<div style="color:#e94560;font-weight:bold;font-size:11px;">' + esc(k) + ': ' + esc(s.标题) + (s.完成 ? ' <span style="color:#64ffda">[已完成]</span>' : '') + '</div>' +
          '<div style="color:#a8b2d1;font-size:10px;margin-top:2px;">' + esc(s.描述) + '</div>' +
          '</div>';
      }).join(''));
    }

    var dailyHtml = daily.标题 && daily.标题 !== '待发布' ?
      '<div class="npc-card">' +
      '<div style="color:#e94560;font-weight:bold;font-size:11px;">' + esc(daily.标题) + (!daily.启用 ? ' <span style="color:#8892b0">[未启用]</span>' : '') + '</div>' +
      '<div style="color:#a8b2d1;font-size:10px;margin-top:2px;">' + esc(daily.描述) + '</div>' +
      '<div style="color:#8892b0;font-size:9px;margin-top:2px;">完成次数: ' + (daily.完成次数 || 0) + '</div>' +
      '</div>' : '<div class="empty-state">暂无持续任务</div>';
    $('#taskDaily').html(dailyHtml);
  }

  // === Render NPCs ===
  function renderNPCs() {
    var npcs = getVal('NPC', {});
    var keys = Object.keys(npcs).filter(function(k) { return npcs[k] && npcs[k].名称; });
    if (keys.length === 0) {
      $('#npcList').html('<div class="empty-state">暂无交互角色</div>');
      return;
    }
    $('#npcList').html(keys.map(function(k) {
      var n = npcs[k];
      var fav = n.好感度 || 0;
      var hate = n.厌恶度 || 0;
      var cor = n.堕落度 || 0;
      var ple = n.快感 || 0;
      var mbti = n.角色 && n.角色.性格 && n.角色.性格.荣格八维 ? n.角色.性格.荣格八维 : {};
      return '<div class="npc-card">' +
        '<div class="npc-name">' + esc(n.名称) + ' <span style="color:#8892b0;font-size:10px;font-weight:normal">(' + esc(k) + ')</span></div>' +
        '<div class="npc-sub">' + (n.角色 && n.角色.年龄 ? n.角色.年龄 + '岁 · ' : '') + esc(n.关系 || n.角色 && n.角色.职业 || '未知') + '</div>' +
        '<div class="affinity-bar">' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#ff6b6b">' + fav + '</div><div class="affinity-label">好感</div></div>' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#ffd93d">' + hate + '</div><div class="affinity-label">厌恶</div></div>' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#c084fc">' + cor + '</div><div class="affinity-label">堕落</div></div>' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#ff9f43">' + ple + '</div><div class="affinity-label">快感</div></div>' +
        '<div style="margin-left:auto"><span class="mood-badge">' + esc(n.情绪状态 || '平静') + '</span></div>' +
        '<button class="btn btn-sm btn-edit-npc" data-npc="' + esc(k) + '">编辑</button>' +
        '</div>' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">' +
        '<button class="btn btn-secondary btn-sm btn-npc-detail" data-npc="' + esc(k) + '">📋详情</button>' +
        '<button class="btn btn-secondary btn-sm btn-npc-cloth" data-npc="' + esc(k) + '">👗服装</button>' +
        '<button class="btn btn-secondary btn-sm btn-npc-aff" data-npc="' + esc(k) + '">❤️好感</button>' +
        '</div></div>';
    }).join(''));
  }

  // === Render Shop ===
  function renderShop() {
    var shop = getVal('商城', {});
    var bag = shop.背包 || {};
    var sale = shop.在售 || {};

    var bagKeys = Object.keys(bag);
    if (bagKeys.length === 0) {
      $('#shopBag').html('<div class="empty-state">背包为空</div>');
    } else {
      $('#shopBag').html(bagKeys.map(function(k) {
        var item = bag[k];
        return '<div class="item-row">' +
          '<div><div class="item-name">' + esc(k) + '</div><div class="item-desc">' + esc(item.描述 || '') + ' · 来源:' + esc(item.来源 || '') + '</div></div>' +
          '<span style="color:#e94560;font-size:11px;">×' + (item.数量 || 0) + '</span>' +
          '</div>';
      }).join(''));
    }

    var saleKeys = Object.keys(sale);
    if (saleKeys.length === 0) {
      $('#shopSale').html('<div class="empty-state">暂无商品</div>');
    } else {
      $('#shopSale').html(saleKeys.map(function(k) {
        var item = sale[k];
        return '<div class="item-row">' +
          '<div><div class="item-name">' + esc(k) + '</div><div class="item-desc">' + esc(item.描述 || '') + '</div></div>' +
          '<span style="color:#ffd93d;font-size:11px;">💰' + (item.价格 || 0) + ' · 库存' + (item.库存 || 0) + '</span>' +
          '</div>';
      }).join(''));
    }
  }

  // === Render Ability ===
  function renderAbility() {
    var abi = getVal('宿主能力', {});
    if (!abi) {
      $('#abiStats').html('<div class="empty-state">能力系统未初始化</div>');
      $('#abiList').html('');
      return;
    }
    var stats = abi.属性点 || {};
    var abilities = abi.能力 || {};

    var statNames = ['力量', '敏捷', '体质', '智力', '感知', '魅力'];
    $('#abiStats').html('<div class="info-grid">' + statNames.map(function(s) {
      var val = stats[s];
      return '<div class="info-item"><label>' + s + '</label><div class="value">' + (val !== null && val !== undefined ? val : '--') + '/100</div></div>';
    }).join('') + '</div>');

    var abiKeys = Object.keys(abilities);
    if (abiKeys.length === 0) {
      $('#abiList').html('<div class="empty-state">暂无能力</div>');
    } else {
      $('#abiList').html(abiKeys.map(function(k) {
        return '<div class="item-row"><div class="item-name">' + esc(k) + '</div><div class="item-desc">' + esc(abilities[k] || '') + '</div></div>';
      }).join(''));
    }
  }

  // === NPC Detail Popup ===
  $(document).on('click', '.btn-npc-detail', function() {
    var id = $(this).data('npc');
    var n = getVal('NPC.' + id, {});
    var role = n.角色 || {};
    var mbti = role.性格 && role.性格.荣格八维 ? role.性格.荣格八维 : {};
    var v = role.贞操状态 || {};
    var html = '<div class="info-grid">' +
      '<div class="info-item"><label>姓名</label><div class="value">' + esc(role.姓名 || n.姓名) + '</div></div>' +
      '<div class="info-item"><label>性别</label><div class="value">' + esc(role.性别) + '</div></div>' +
      '<div class="info-item"><label>年龄</label><div class="value">' + (role.年龄 || '--') + '</div></div>' +
      '<div class="info-item"><label>关系</label><div class="value">' + esc(n.关系 || '--') + '</div></div>' +
      '</div>' +
      '<div class="section-title">性格</div>' +
      '<div class="info-grid">' +
      '<div class="info-item"><label>主导</label><div class="value">' + esc(mbti.主导) + '</div></div>' +
      '<div class="info-item"><label>辅助</label><div class="value">' + esc(mbti.辅助) + '</div></div>' +
      '<div class="info-item"><label>第三</label><div class="value">' + esc(mbti.第三) + '</div></div>' +
      '<div class="info-item"><label>劣势</label><div class="value">' + esc(mbti.劣势) + '</div></div>' +
      '</div>' +
      '<div style="margin-top:4px;color:#a8b2d1;font-size:10px;">核心特征: ' + esc(role.性格 && role.性格.核心特征 || '--') + '</div>' +
      '<div class="section-title">状态</div>' +
      '<div class="affinity-bar">' +
      '<div class="affinity-item"><div class="affinity-value" style="color:#ff6b6b">' + (n.好感度 || 0) + '</div><div class="affinity-label">好感</div></div>' +
      '<div class="affinity-item"><div class="affinity-value" style="color:#ffd93d">' + (n.厌恶度 || 0) + '</div><div class="affinity-label">厌恶</div></div>' +
      '<div class="affinity-item"><div class="affinity-value" style="color:#c084fc">' + (n.堕落度 || 0) + '</div><div class="affinity-label">堕落</div></div>' +
      '<div class="affinity-item"><div class="affinity-value" style="color:#ff9f43">' + (n.快感 || 0) + '</div><div class="affinity-label">快感</div></div>' +
      '</div>' +
      '<div style="margin-top:4px;color:#a8b2d1;font-size:10px;">情绪: ' + esc(n.情绪状态 || '平静') + '</div>';
    openPopup('角色详情: ' + esc(n.名称 || id), html);
  });

  // === NPC Clothing Popup ===
  $(document).on('click', '.btn-npc-cloth', function() {
    var id = $(this).data('npc');
    var n = getVal('NPC.' + id, {});
    var html = '<div class="form-row"><label>当前服装</label><textarea class="form-textarea" id="npcClothInput">' + esc(n.服装 || '') + '</textarea></div>' +
      '<button class="btn btn-primary btn-sm" id="btnSaveNpcCloth" data-npc="' + esc(id) + '">更新服装</button>';
    openPopup('服装: ' + esc(n.名称 || id), html);
  });
  $(document).on('click', '#btnSaveNpcCloth', function() {
    var id = $(this).data('npc');
    var val = $('#npcClothInput').val();
    updateVar('NPC.' + id + '.服装', val);
    sendCmd('【服装更新】已更新 ' + id + ' 的服装');
    render(); closePopup();
  });

  // === NPC Affinity Popup ===
  $(document).on('click', '.btn-npc-aff', function() {
    var id = $(this).data('npc');
    var n = getVal('NPC.' + id, {});
    var html = '<div class="info-grid">' +
      '<div class="form-row"><label>好感度</label><input class="form-input" id="affFav" type="number" value="' + (n.好感度 || 0) + '"></div>' +
      '<div class="form-row"><label>厌恶度</label><input class="form-input" id="affHate" type="number" value="' + (n.厌恶度 || 0) + '"></div>' +
      '<div class="form-row"><label>堕落度</label><input class="form-input" id="affCor" type="number" value="' + (n.堕落度 || 0) + '"></div>' +
      '<div class="form-row"><label>快感</label><input class="form-input" id="affPle" type="number" value="' + (n.快感 || 0) + '"></div>' +
      '</div>' +
      '<div class="form-row" style="margin-top:6px;"><label>情绪状态</label><input class="form-input" id="affMood" value="' + esc(n.情绪状态 || '平静') + '"></div>' +
      '<button class="btn btn-primary btn-sm" style="margin-top:8px;" id="btnSaveAff" data-npc="' + esc(id) + '">保存</button>';
    openPopup('好感度: ' + esc(n.名称 || id), html);
  });
  $(document).on('click', '#btnSaveAff', function() {
    var id = $(this).data('npc');
    updateVar('NPC.' + id + '.好感度', parseInt($('#affFav').val()) || 0);
    updateVar('NPC.' + id + '.厌恶度', parseInt($('#affHate').val()) || 0);
    updateVar('NPC.' + id + '.堕落度', parseInt($('#affCor').val()) || 0);
    updateVar('NPC.' + id + '.快感', parseInt($('#affPle').val()) || 0);
    updateVar('NPC.' + id + '.情绪状态', $('#affMood').val());
    sendCmd('【好感度更新】已更新 ' + id + ' 的好感度');
    render(); closePopup();
  });

  // === NPC Editor ===
  $(document).on('click', '.btn-edit-npc', function() {
    var id = $(this).data('npc');
    var n = getVal('NPC.' + id, {});
    var role = n.角色 || {};
    var html = '<div class="form-row"><label>名称</label><input class="form-input" id="enName" value="' + esc(role.姓名 || n.姓名 || '') + '"></div>' +
      '<div class="form-row"><label>关系</label><input class="form-input" id="enRel" value="' + esc(n.关系 || '') + '"></div>' +
      '<div class="form-row"><label>外貌</label><textarea class="form-textarea" id="enLook">' + esc(n.外貌 || '') + '</textarea></div>' +
      '<div class="form-row"><label>身材</label><textarea class="form-textarea" id="enBody">' + esc(n.身材 || '') + '</textarea></div>' +
      '<div class="form-row"><label>性格</label><textarea class="form-textarea" id="enPerson">' + esc(n.性格 || '') + '</textarea></div>' +
      '<button class="btn btn-primary btn-sm" style="margin-top:8px;" id="btnSaveNpcEdit" data-npc="' + esc(id) + '">保存</button>';
    openPopup('编辑: ' + esc(n.名称 || id), html);
  });
  $(document).on('click', '#btnSaveNpcEdit', function() {
    var id = $(this).data('npc');
    updateVar('NPC.' + id + '.角色.姓名', $('#enName').val());
    updateVar('NPC.' + id + '.关系', $('#enRel').val());
    updateVar('NPC.' + id + '.外貌', $('#enLook').val());
    updateVar('NPC.' + id + '.身材', $('#enBody').val());
    updateVar('NPC.' + id + '.性格', $('#enPerson').val());
    sendCmd('【角色更新】已更新 ' + id + ' 的信息');
    render(); closePopup();
  });

  // === Main Render ===
  function render() {
    renderHost();
    renderBody();
    renderTasks();
    renderNPCs();
    renderShop();
    renderAbility();
  }
  render();

  // === Show only latest ===
  (function showOnlyLatest() {
    try {
      var parentDoc = window.parent.document;
      var allBars = parentDoc.querySelectorAll('.status-bar');
      if (allBars.length <= 1) return;
      var thisBar = document.querySelector('.status-bar');
      var myIndex = -1;
      for (var i = 0; i < allBars.length; i++) { if (allBars[i] === thisBar) { myIndex = i; break; } }
      if (myIndex >= 0 && myIndex < allBars.length - 1) {
        var container = thisBar.closest('.mes,.mes_text,.chat-row,.message-row,div[class*="mes"]');
        if (container) container.style.display = 'none';
      }
    } catch(e) {}
  })();
});
</script>
</body></html>
