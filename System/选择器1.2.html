<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>主角选择器</title>
<style>
:root {
  --bg-paper: #f0f0f0;
  --bg-window: #e2e2e2;
  --bg-panel: #f7f7f7;
  --bg-inset: #dcdcdc;
  --ink: #0c0c0c;
  --ink-soft: #2b2b2b;
  --ink-dim: #6a6a6a;
  --border: #000000;
  --border-light: #ffffff;
  --shadow-hard: 2px 2px 0 #000000;
  --shadow-soft: 1px 1px 0 #000000;
  --accent: #000000;
  --accent-rainbow: linear-gradient(90deg, #ff3b30, #ff9500, #ffcc00, #34c759, #5ac8fa, #007aff, #5856d6);
  --font-ui: 'Chicago', 'Geneva', 'Pixelated MS Sans Serif', 'MS Sans Serif', 'Courier New', monospace;
}

:root[data-theme='dark'] {
  --bg-paper: #1b1b1b;
  --bg-window: #242424;
  --bg-panel: #2a2a2a;
  --bg-inset: #141414;
  --ink: #d2d2d2;
  --ink-soft: #b0b0b0;
  --ink-dim: #8a8a8a;
  --border: #4a4a4a;
  --border-light: #2f2f2f;
  --shadow-hard: 1px 1px 0 #0a0a0a;
  --shadow-soft: 0 0 0 #000000;
  --accent: #dcdcdc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ui);
  background: transparent;
  color: var(--ink);
  font-size: 13px;
  line-height: 1.4;
}

#app { width: 100%; max-width: none; padding: 10px; }

.shell {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 10px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(0,0,0,0.06), transparent 55%), linear-gradient(0deg, var(--bg-window), var(--bg-paper));
  box-shadow: var(--shadow-hard);
}

.toast {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  box-shadow: var(--shadow-soft);
  font-size: .75rem;
  display: none;
  z-index: 100;
}
.toast.show { display: block; }

.top-bar {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  align-items: end;
  padding: 10px 12px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-soft);
  position: relative;
}
.top-bar::before {
  content: "";
  position: absolute;
  right: 10px;
  top: 8px;
  width: 36px;
  height: 6px;
  background: var(--accent-rainbow);
  border: 1px solid var(--border);
}

.title { font-size: 1rem; font-weight: 700; color: var(--ink); }
.subtitle { grid-column: 1/-1; font-size: .75rem; color: var(--ink-dim); }

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.mode-switch { display: flex; gap: 8px; flex-wrap: wrap; }

.btn {
  border: 1px solid var(--border);
  background: var(--bg-panel);
  box-shadow: var(--shadow-hard);
  padding: 6px 10px;
  font-size: .75rem;
  cursor: pointer;
  font-family: var(--font-ui);
  color: var(--ink);
  transition: transform .1s ease, box-shadow .1s ease, background .2s ease;
}
.btn:active { transform: translate(1px, 1px); box-shadow: var(--shadow-soft); }
.btn[disabled] { opacity: .5; cursor: not-allowed; pointer-events: none; }
.btn.confirm { background: var(--bg-inset); }

.mode-btn.is-active, .theme-btn.is-active { background: var(--bg-inset); box-shadow: var(--shadow-hard); }

.body {
  display: grid;
  grid-template-columns: minmax(160px, 220px) minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}

.main { display: flex; flex-direction: column; gap: 12px; }

.nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-soft);
}
.nav-title { font-size: .75rem; color: var(--ink-soft); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.nav-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border: 1px solid var(--border);
  background: var(--bg-paper);
  font-size: .75rem;
  cursor: pointer;
  text-align: left;
  font-family: var(--font-ui);
  color: var(--ink);
}
.nav-item.active { background: var(--bg-inset); font-weight: 700; }
.nav-index { font-family: 'Courier New', monospace; font-size: .7rem; }
.nav-check { font-size: .7rem; }
.nav-progress { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.progress-bar { width: 100%; height: 4px; background: var(--bg-inset); border: 1px solid var(--border); }
.progress-fill { height: 100%; background: var(--accent-rainbow); }
.progress-text { font-size: .7rem; color: var(--ink-dim); }

.step-header {
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  box-shadow: var(--shadow-soft);
  transform: translateX(4px);
}
.step-title { font-size: .95rem; font-weight: 700; color: var(--ink); }
.step-desc { font-size: .75rem; color: var(--ink-dim); margin-top: 4px; }

.options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }

.option {
  padding: 10px;
  border: 1px solid var(--border);
  background: var(--bg-paper);
  box-shadow: var(--shadow-soft);
  text-align: left;
  cursor: pointer;
  font-family: var(--font-ui);
  color: var(--ink);
  transition: transform .12s ease, box-shadow .12s ease;
}
.option.wide { grid-column: span 2; }
.option.skip { border-style: dashed; opacity: .7; }
.option.selected { background: var(--bg-inset); transform: translateX(4px); box-shadow: var(--shadow-hard); opacity: 1; }
.option.custom { display: flex; flex-direction: column; gap: 6px; }
.opt-label { font-size: .85rem; font-weight: 700; }
.opt-hint { font-size: .7rem; color: var(--ink-dim); }

.custom-input, .text-input, .textarea-input {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg-window);
  border: 1px solid var(--border);
  font-family: var(--font-ui);
  font-size: .75rem;
  color: var(--ink);
}
.textarea-input { min-height: 60px; resize: vertical; }

.multi-options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
.multi-option {
  padding: 6px 8px;
  border: 1px solid var(--border);
  background: var(--bg-paper);
  box-shadow: var(--shadow-soft);
  text-align: center;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: .72rem;
  color: var(--ink);
  transition: all .12s ease;
}
.multi-option.selected { background: var(--bg-inset); box-shadow: var(--shadow-hard); }
.multi-option:hover { background: var(--bg-inset); }

.text-step { display: flex; flex-direction: column; gap: 8px; }
.text-step label { font-size: .75rem; color: var(--ink-dim); }

.preview {
  margin-left: 16px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  box-shadow: var(--shadow-soft);
}
.preview-title { font-size: .75rem; color: var(--ink-soft); letter-spacing: 1px; text-transform: uppercase; }
.preview-lines { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; font-family: 'Courier New', monospace; font-size: .75rem; color: var(--ink); }
.preview-line::before { content: "> "; color: var(--ink-dim); }

.action-panel { display: flex; flex-direction: column; gap: 10px; }

.extra-row { display: flex; flex-direction: column; gap: 4px; }
.extra-row label { font-size: .7rem; color: var(--ink-dim); }
.extra-input, .extra-textarea {
  width: 100%;
  min-height: 60px;
  padding: 6px 8px;
  background: var(--bg-window);
  border: 1px solid var(--border);
  font-family: var(--font-ui);
  font-size: .75rem;
  color: var(--ink);
  resize: vertical;
}

.actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

.template-bar {
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg-window);
  box-shadow: var(--shadow-soft);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.template-bar label { font-size: .75rem; color: var(--ink-soft); }

.fan-body { display: grid; grid-template-columns: minmax(160px, 220px) minmax(0, 1fr); gap: 12px; align-items: start; }
.fan-side { display: flex; flex-direction: column; gap: 10px; }
.fan-main { display: flex; flex-direction: column; gap: 12px; }
.fan-box { padding: 10px 12px; border: 1px solid var(--border); background: var(--bg-panel); box-shadow: var(--shadow-soft); }
.fan-panel { padding: 10px 12px; border: 1px solid var(--border); background: var(--bg-panel); box-shadow: var(--shadow-soft); display: flex; flex-direction: column; gap: 8px; }
.fan-panel-title { font-size: .8rem; font-weight: 700; margin-bottom: 8px; }
.fan-fields { display: grid; grid-template-columns: minmax(160px, 1fr) minmax(200px, 1.4fr); gap: 10px; align-items: start; }
.fan-col { display: flex; flex-direction: column; gap: 8px; }
.fan-row { display: flex; flex-direction: column; gap: 4px; }
.fan-row label { font-size: .7rem; color: var(--ink-dim); }
.fan-input, .fan-textarea { width: 100%; padding: 6px 8px; background: var(--bg-window); border: 1px solid var(--border); font-family: var(--font-ui); font-size: .75rem; color: var(--ink); }
.fan-textarea { height: 160px; resize: vertical; }
.fan-row-actions { display: flex; justify-content: flex-end; margin-top: 4px; }
.fan-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

.fan-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 1000; }
.fan-overlay.active { display: flex; }
.fan-editor { width: min(720px, 96%); height: min(500px, 90%); background: var(--bg-paper); border: 1px solid var(--border); box-shadow: var(--shadow-hard); padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.fan-editor.notice { width: min(420px, 92%); height: auto; background: var(--bg-panel); }
.fan-editor.notice::before { content: ""; height: 6px; background: var(--accent-rainbow); border: 1px solid var(--border); }
.fan-editor textarea { flex: 1; width: 100%; padding: 8px; background: var(--bg-window); border: 1px solid var(--border); font-family: var(--font-ui); font-size: .8rem; color: var(--ink); resize: none; }
.fan-editor-title { font-size: .85rem; font-weight: 700; color: var(--ink); }
.fan-notice { font-size: .8rem; color: var(--ink-soft); line-height: 1.5; padding: 8px; border: 1px solid var(--border); background: var(--bg-window); }

.hidden { display: none; }

@media (max-width: 820px) {
  .body, .fan-body { grid-template-columns: 1fr; }
  .fan-fields { grid-template-columns: 1fr; }
  .options { grid-template-columns: 1fr; }
  .option.wide { grid-column: span 1; }
  .multi-options { grid-template-columns: repeat(2, 1fr); }
  .step-header { transform: none; }
  .preview { margin-left: 0; }
  .fan-row-actions { justify-content: flex-start; }
}
</style>
</head>
<body>

<div id="app">
<div class="shell">

<div class="toast" id="toast"></div>

<div class="top-bar">
  <div class="title">主角选择器</div>
  <div class="subtitle">用于新开局或主角定制，生成提示词后写入输入框</div>
  <div class="top-actions">
    <div class="mode-switch">
      <button class="btn mode-btn is-active" data-mode="normal">普通模式</button>
      <button class="btn mode-btn" data-mode="fan">同人模式</button>
    </div>
    <button class="btn theme-btn" id="btn-theme-toggle">夜间模式：关</button>
  </div>
</div>

<div id="normal-mode" class="mode-content">
  <div class="body">
    <aside class="nav" id="step-nav"></aside>
    <section class="main">
      <header class="step-header">
        <div class="step-title" id="step-title"></div>
        <div class="step-desc" id="step-desc"></div>
      </header>

      <div class="template-bar" id="templateBar" style="display:none;">
        <label>默认模板：</label>
        <button class="btn" id="btn-template-zhanghao" style="font-size:.7rem;">张浩</button>
        <button class="btn" id="btn-template-random" style="font-size:.7rem;">随机主角</button>
      </div>

      <div class="options" id="step-options"></div>

      <div class="preview">
        <div class="preview-title">输出预览</div>
        <div class="preview-lines" id="preview-lines"></div>
      </div>

      <div class="action-panel">
        <div class="extra-row">
          <label>开场剧情（可选）</label>
          <textarea class="extra-textarea" id="opening-plot" placeholder="描述你希望以什么样的剧情开场，例如：在公寓楼下遇到搬家的邻居..."></textarea>
        </div>
        <div class="extra-row">
          <label>补充信息（可选）</label>
          <textarea class="extra-input" id="extra-info" placeholder="可填写额外的世界观设定、主角背景细节等"></textarea>
        </div>
        <div class="actions">
          <button class="btn" id="btn-random">一键随机</button>
          <button class="btn" id="btn-reset">一键重置</button>
          <button class="btn" id="btn-prev" disabled>上一步</button>
          <button class="btn" id="btn-next">下一步</button>
          <button class="btn confirm" id="btn-generate" style="display:none">生成提示词</button>
        </div>
      </div>
    </section>
  </div>
</div>

<div id="fan-mode" class="mode-content" style="display:none">
  <div class="fan-body">
    <aside class="fan-side">
      <div class="fan-box">
        <div class="preview-title">输出预览</div>
        <div class="preview-lines" id="fan-preview-lines"></div>
      </div>
    </aside>
    <section class="fan-main">
      <div class="fan-panel">
        <div class="fan-panel-title">同人资料</div>
        <div class="fan-fields">
          <div class="fan-col">
            <div class="fan-row">
              <label>作品名字</label>
              <input class="fan-input" id="fan-work" placeholder="例如：作品名"/>
            </div>
            <div class="fan-row">
              <label>角色名字</label>
              <input class="fan-input" id="fan-role" placeholder="例如：角色名"/>
            </div>
          </div>
          <div class="fan-col">
            <div class="fan-row">
              <label>补充内容</label>
              <textarea class="fan-textarea" id="fan-extra" placeholder="可填写更多设定、剧情或细节"></textarea>
              <div class="fan-row-actions">
                <button class="btn fan-expand" id="btn-fan-expand">放大编辑</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="actions fan-actions">
        <button class="btn confirm" id="btn-fan-generate">生成提示词</button>
      </div>
    </section>
  </div>
</div>

</div>
</div>

<div class="fan-overlay" id="fan-overlay">
  <div class="fan-editor" id="fan-editor-panel">
    <div class="fan-editor-title">补充内容（全屏编辑）</div>
    <textarea id="fan-editor-textarea" placeholder="输入更多补充内容"></textarea>
    <div class="fan-actions">
      <button class="btn" id="btn-fan-cancel">取消</button>
      <button class="btn confirm" id="btn-fan-apply">完成</button>
    </div>
  </div>
  <div class="fan-editor notice" id="fan-notice-panel" style="display:none">
    <div class="fan-editor-title">同人条目已创建</div>
    <div class="fan-notice" id="fan-notice-text"></div>
    <div class="fan-actions">
      <button class="btn confirm" id="btn-fan-notice-close">知道了</button>
    </div>
  </div>
</div>

<script>
// ===================== 步骤配置 =====================
const steps = [
  {
    key: 'world',
    title: '世界观',
    desc: '选择故事基调与时代背景',
    type: 'select',
    required: false,
    options: [
      {label: '现代中国社会', hint: '', wide: true},
      {label: '90年代港台社会', hint: ''},
      {label: '修仙时代', hint: ''},
      {label: '古风时代', hint: ''}
    ]
  },
  {
    key: 'name',
    title: '主角名称',
    desc: '输入主角的名字',
    type: 'text',
    required: false,
    placeholder: '例如：张浩'
  },
  {
    key: 'gender',
    title: '性别',
    desc: '选择主角性别',
    type: 'select',
    required: false,
    options: [
      {label: '男', hint: ''},
      {label: '女', hint: ''}
    ]
  },
  {
    key: 'age',
    title: '年龄',
    desc: '主角年龄区间',
    type: 'select',
    required: false,
    options: [
      {label: '18-22', hint: ''},
      {label: '23-27', hint: '', wide: true},
      {label: '28-33', hint: ''},
      {label: '34-38', hint: '', wide: true},
      {label: '39-45', hint: ''},
      {label: '46+', hint: ''}
    ]
  },
  {
    key: 'personality',
    title: '性格',
    desc: '性格走向决定互动风格',
    type: 'select',
    required: false,
    options: [
      {label: '冷静理性', hint: ''},
      {label: '温柔顺从', hint: '', wide: true},
      {label: '强势掌控', hint: ''},
      {label: '好奇贪玩', hint: '', wide: true},
      {label: '高冷自律', hint: ''},
      {label: '外冷内热', hint: ''},
      {label: '敏感多思', hint: ''},
      {label: '反差魅惑', hint: '', wide: true}
    ]
  },
  {
    key: 'identity',
    title: '身份',
    desc: '社会身份或职业（可自由输入）',
    type: 'text',
    required: false,
    placeholder: '例如：房东、大学生、公司职员、站街女郎...'
  },
  {
    key: 'appearance',
    title: '外观',
    desc: '描述主角的外貌特征',
    type: 'textarea',
    required: false,
    placeholder: '例如：肥胖宅男、高大魁梧、身高198cm...',
    rows: 2
  },
  {
    key: 'kink',
    title: '性癖',
    desc: '选择性癖偏好（可多选）',
    type: 'multi',
    required: false,
    options: [
      {label: '丝袜癖', hint: ''},
      {label: '巨乳癖', hint: ''},
      {label: '少妇控', hint: ''},
      {label: '制服控', hint: ''},
      {label: '露出癖', hint: ''},
      {label: '足控', hint: ''},
      {label: '腿控', hint: ''},
      {label: '臀控', hint: ''},
      {label: '女仆控', hint: ''},
      {label: '御姐控', hint: ''},
      {label: '熟女控', hint: ''},
      {label: '眼镜控', hint: ''},
      {label: '黑丝控', hint: ''},
      {label: '白丝控', hint: ''},
      {label: '蕾丝控', hint: ''}
    ]
  },
  {
    key: 'ability',
    title: '能力',
    desc: '主角的特殊能力或体质',
    type: 'textarea',
    required: false,
    placeholder: '例如：射精恢复时间极短，每次射出量大于500ml...',
    rows: 2
  },
  {
    key: 'background',
    title: '背景',
    desc: '主角的身世与经历',
    type: 'textarea',
    required: false,
    placeholder: '描述主角的身份背景、社会关系、过往经历...',
    rows: 3
  }
];

// ===================== 默认模板 =====================
const defaultTemplates = {
  zhanghao: {
    name: '张浩',
    gender: '男',
    age: '23-27',
    personality: '强势掌控',
    identity: '房东',
    appearance: '肥胖宅男，高大魁梧，身高198cm',
    kink: ['丝袜癖', '巨乳癖', '少妇控'],
    ability: '射精恢复时间极短，每次射出量大于500ml',
    background: '长乐公寓房东'
  }
};

// ===================== 状态 =====================
const state = {
  currentStep: 0,
  selections: {},
  customInputs: {},
  multiSelections: {}
};

const STORAGE_THEME = 'system-dark-mode';

// ===================== 主题 =====================
function isDark() { return localStorage.getItem(STORAGE_THEME) === 'true'; }
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = $('#btn-theme-toggle');
  btn.toggleClass('is-active', dark);
  btn.text(dark ? '夜间模式：开' : '夜间模式：关');
}

// ===================== 导航 =====================
function renderNav() {
  const nav = $('#step-nav');
  nav.empty();
  nav.append('<div class="nav-title">流程导航</div>');
  steps.forEach((step, idx) => {
    const active = state.currentStep === idx;
    const filled = !!state.selections[step.key] || (step.type === 'multi' && state.multiSelections[step.key] && state.multiSelections[step.key].length > 0);
    const item = $(`
      <button class="nav-item ${active ? 'active' : ''}">
        <span class="nav-index">${String(idx + 1).padStart(2, '0')}</span>
        <span class="nav-text">${step.title}</span>
        ${filled ? '<span class="nav-check">✓</span>' : ''}
      </button>
    `);
    item.on('click', () => { state.currentStep = idx; renderStep(); });
    nav.append(item);
  });
  const pct = ((state.currentStep + 1) / steps.length) * 100;
  nav.append(`
    <div class="nav-progress">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${state.currentStep + 1} / ${steps.length}</div>
    </div>
  `);
}

// ===================== 选项值文本 =====================
function getOptionText(step) {
  const val = state.selections[step.key];
  if (!val) return '';
  if (step.type === 'multi') {
    const arr = state.multiSelections[step.key] || [];
    if (arr.length === 0) return '';
    return arr.join('、');
  }
  const opt = step.options ? step.options.find(o => o.label === val) : null;
  return opt && opt.hint ? `${val}（${opt.hint}）` : val;
}

// ===================== 预览 =====================
function renderPreview() {
  const lines = $('#preview-lines');
  lines.empty();
  lines.append('<div class="preview-line">主角已创建，开始生成世界观与角色设定，资料如下：</div>');
  steps.forEach(step => {
    const txt = getOptionText(step);
    if (txt) lines.append(`<div class="preview-line">${step.title}：${txt}</div>`);
  });
  const extra = ($('#extra-info').val() || '').trim();
  if (extra) lines.append(`<div class="preview-line">补充信息：${extra}</div>`);
  const plot = ($('#opening-plot').val() || '').trim();
  if (plot) lines.append(`<div class="preview-line">开场剧情：${plot}</div>`);
}

// ===================== 步骤渲染 =====================
function renderStep() {
  renderNav();
  const step = steps[state.currentStep];
  $('#step-title').text(step.title);
  $('#step-desc').text(step.desc);

  // 显示/隐藏模板栏（在第2步名称处显示）
  $('#templateBar').toggle(state.currentStep === 1);

  const container = $('#step-options');
  container.empty();

  if (step.type === 'select') {
    // 跳过按钮
    const selectedVal = state.selections[step.key] || '';
    const skipBtn = $(`
      <button class="option skip ${!selectedVal ? 'selected' : ''}">
        <div class="opt-label">跳过此项</div>
        <div class="opt-hint">不设置该属性</div>
      </button>
    `);
    skipBtn.on('click', () => {
      delete state.selections[step.key];
      state.customInputs[step.key] = '';
      if (step.type === 'multi') state.multiSelections[step.key] = [];
      renderStep();
    });
    container.append(skipBtn);

    // 选项按钮
    step.options.forEach(opt => {
      const isSel = selectedVal === opt.label;
      const btn = $(`
        <button class="option ${opt.wide ? 'wide' : ''} ${isSel ? 'selected' : ''}">
          <div class="opt-label">${opt.label}</div>
          <div class="opt-hint">${opt.hint}</div>
        </button>
      `);
      btn.on('click', () => {
        state.selections[step.key] = opt.label;
        state.customInputs[step.key] = '';
        renderStep();
      });
      container.append(btn);
    });

    // 自定义输入
    const isCustom = selectedVal && !step.options.some(o => o.label === selectedVal);
    const customVal = state.customInputs[step.key] || '';
    const customBox = $(`
      <div class="option custom wide ${isCustom ? 'selected' : ''}">
        <div class="opt-label">自定义</div>
        <div class="opt-hint">输入更符合你的设定</div>
        <input class="custom-input" type="text" placeholder="请输入自定义内容" value="${customVal}" />
      </div>
    `);
    customBox.find('.custom-input').on('input', function() {
      const v = $(this).val();
      state.customInputs[step.key] = v;
      state.selections[step.key] = v.trim();
      renderNav();
      renderPreview();
    });
    customBox.on('click', function(e) {
      if (!$(e.target).is('input')) $(this).find('input').trigger('focus');
    });
    container.append(customBox);

  } else if (step.type === 'text') {
    const val = state.selections[step.key] || '';
    const box = $(`
      <div class="text-step">
        <label>${step.desc}</label>
        <input class="text-input" type="text" placeholder="${step.placeholder || ''}" value="${val}" />
      </div>
    `);
    box.find('.text-input').on('input', function() {
      state.selections[step.key] = $(this).val();
      renderNav();
      renderPreview();
    });
    container.append(box);

  } else if (step.type === 'textarea') {
    const val = state.selections[step.key] || '';
    const box = $(`
      <div class="text-step">
        <label>${step.desc}</label>
        <textarea class="textarea-input" rows="${step.rows || 3}" placeholder="${step.placeholder || ''}">${val}</textarea>
      </div>
    `);
    box.find('.textarea-input').on('input', function() {
      state.selections[step.key] = $(this).val();
      renderNav();
      renderPreview();
    });
    container.append(box);

  } else if (step.type === 'multi') {
    const selectedArr = state.multiSelections[step.key] || [];
    const grid = $('<div class="multi-options"></div>');
    step.options.forEach(opt => {
      const isSel = selectedArr.includes(opt.label);
      const btn = $(`<button class="multi-option ${isSel ? 'selected' : ''}">${opt.label}</button>`);
      btn.on('click', () => {
        let arr = state.multiSelections[step.key] || [];
        if (arr.includes(opt.label)) {
          arr = arr.filter(x => x !== opt.label);
        } else {
          arr.push(opt.label);
        }
        state.multiSelections[step.key] = arr;
        state.selections[step.key] = arr.join('、');
        renderStep();
      });
      grid.append(btn);
    });
    container.append(grid);

    // 自定义输入
    const customVal = state.customInputs[step.key] || '';
    const customBox = $(`
      <div class="text-step" style="margin-top:8px;">
        <label>自定义补充（用逗号分隔）</label>
        <input class="text-input" type="text" placeholder="输入额外性癖，用逗号分隔" value="${customVal}" />
      </div>
    `);
    customBox.find('.text-input').on('input', function() {
      const v = $(this).val();
      state.customInputs[step.key] = v;
      const arr = state.multiSelections[step.key] || [];
      const customArr = v.split(/[,，]/).map(s => s.trim()).filter(s => s);
      state.selections[step.key] = [...arr, ...customArr].join('、');
      renderNav();
      renderPreview();
    });
    container.append(customBox);
  }

  renderPreview();

  // 按钮状态
  const isFirst = state.currentStep === 0;
  const isLast = state.currentStep === steps.length - 1;
  $('#btn-prev').prop('disabled', isFirst);
  $('#btn-next').toggle(!isLast);
  $('#btn-generate').toggle(isLast);
}

// ===================== 一键随机 =====================
function randomAll() {
  steps.forEach(step => {
    if (step.type === 'select' && step.options) {
      const opts = step.options.map(o => o.label);
      const pick = opts[Math.floor(Math.random() * opts.length)];
      state.selections[step.key] = pick;
      state.customInputs[step.key] = '';
    } else if (step.type === 'multi' && step.options) {
      const opts = step.options.map(o => o.label);
      const count = Math.floor(Math.random() * 3) + 1;
      const shuffled = opts.sort(() => 0.5 - Math.random());
      const picked = shuffled.slice(0, count);
      state.multiSelections[step.key] = picked;
      state.selections[step.key] = picked.join('、');
    } else if (step.type === 'text' || step.type === 'textarea') {
      // 文本字段不随机，留空
      delete state.selections[step.key];
    }
  });
  state.currentStep = steps.length - 1;
  renderStep();
  toastr.success('已随机选择并跳转');
}

// ===================== 一键重置 =====================
function resetAll() {
  state.selections = {};
  state.customInputs = {};
  state.multiSelections = {};
  state.currentStep = 0;
  $('#extra-info').val('');
  $('#opening-plot').val('');
  renderStep();
  toastr.info('已重置');
}

// ===================== 应用模板 =====================
function applyTemplate(name) {
  const t = defaultTemplates[name];
  if (!t) return;
  state.selections = {
    world: '',
    name: t.name || '',
    gender: t.gender || '',
    age: t.age || '',
    personality: t.personality || '',
    identity: t.identity || '',
    appearance: t.appearance || '',
    kink: (t.kink || []).join('、'),
    ability: t.ability || '',
    background: t.background || ''
  };
  state.customInputs = {};
  state.multiSelections = { kink: t.kink || [] };
  state.currentStep = steps.length - 1;
  renderStep();
  toastr.success(`已应用「${t.name}」模板`);
}

// ===================== 生成提示词 =====================
function generatePrompt() {
  const lines = [];
  lines.push('主角已创建，开始生成世界观与角色设定，资料如下：');
  steps.forEach(step => {
    const txt = getOptionText(step);
    if (txt) lines.push(`${step.title}：${txt}`);
  });
  const extra = ($('#extra-info').val() || '').trim();
  if (extra) lines.push(`补充信息：${extra}`);
  const plot = ($('#opening-plot').val() || '').trim();
  if (plot) lines.push(`开场剧情：${plot}`);

  const promptText = lines.join('；');
  triggerSlash(`/setinput ${promptText}`);
  toastr.success('已写入输入框');
}

// ===================== 同人模式 =====================
function renderFanPreview() {
  const el = $('#fan-preview-lines');
  el.empty();
  el.append('<div class="preview-line">主角已选定，开始生成世界观，资料如下：</div>');
  const work = ($('#fan-work').val() || '').trim();
  const role = ($('#fan-role').val() || '').trim();
  const extra = ($('#fan-extra').val() || '').trim();
  if (work) el.append(`<div class="preview-line">作品名字：${work}</div>`);
  if (role) el.append(`<div class="preview-line">角色名字：${role}</div>`);
  if (extra) el.append(`<div class="preview-line">补充内容：${extra}</div>`);
}

async function generateFanPrompt() {
  const work = ($('#fan-work').val() || '').trim();
  const role = ($('#fan-role').val() || '').trim();
  if (!work || !role) {
    toastr.warning('同人模式需填写作品名字与角色名字');
    return;
  }
  const extra = ($('#fan-extra').val() || '').trim();
  const lines = [`作品名字：${work}`, `角色名字：${role}`];
  if (extra) lines.push(`补充内容：${extra}`);
  const promptText = `主角已选定，开始生成世界观，资料如下：${lines.join('；')}`;
  triggerSlash(`/setinput ${promptText}`);
  toastr.success('已写入输入框');
}

// ===================== 初始化 =====================
$(() => {
  setTheme(isDark());

  $('#btn-theme-toggle').on('click', () => {
    const next = !isDark();
    localStorage.setItem(STORAGE_THEME, String(next));
    setTheme(next);
  });
  window.addEventListener('storage', e => {
    if (e.key === STORAGE_THEME) setTheme(e.newValue === 'true');
  });

  $('.mode-btn').on('click', function() {
    const mode = $(this).data('mode');
    $('.mode-btn').removeClass('is-active');
    $(this).addClass('is-active');
    if (mode === 'normal') {
      $('#normal-mode').show();
      $('#fan-mode').hide();
    } else {
      $('#normal-mode').hide();
      $('#fan-mode').show();
    }
  });

  $('#btn-prev').on('click', () => {
    if (state.currentStep > 0) {
      state.currentStep--;
      renderStep();
    }
  });

  $('#btn-next').on('click', () => {
    const step = steps[state.currentStep];
    if (!step.required || state.selections[step.key]) {
      if (state.currentStep < steps.length - 1) {
        state.currentStep++;
        renderStep();
      }
    } else {
      toastr.warning(`请先选择${step.title}`);
    }
  });

  $('#btn-random').on('click', randomAll);
  $('#btn-reset').on('click', resetAll);
  $('#btn-generate').on('click', generatePrompt);

  $('#btn-template-zhanghao').on('click', () => applyTemplate('zhanghao'));
  $('#btn-template-random').on('click', randomAll);

  $('#extra-info, #opening-plot').on('input', renderPreview);

  $('#fan-work, #fan-role, #fan-extra').on('input', renderFanPreview);
  $('#btn-fan-expand').on('click', () => {
    $('#fan-editor-textarea').val($('#fan-extra').val());
    $('#fan-editor-panel').show();
    $('#fan-notice-panel').hide();
    $('#fan-overlay').addClass('active');
  });
  $('#btn-fan-cancel').on('click', () => $('#fan-overlay').removeClass('active'));
  $('#btn-fan-apply').on('click', () => {
    $('#fan-extra').val($('#fan-editor-textarea').val());
    $('#fan-overlay').removeClass('active');
    renderFanPreview();
  });
  $('#btn-fan-notice-close').on('click', () => $('#fan-overlay').removeClass('active'));
  $('#btn-fan-generate').on('click', generateFanPrompt);

  renderStep();
  renderFanPreview();
});
</script>
