<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .title {
      font-size: 20px;
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-section {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .form-group input:disabled,
    .form-group textarea:disabled {
      background: rgba(15, 52, 96, 0.3);
      color: #8892b0;
      cursor: not-allowed;
    }
    .form-row {
      display: flex;
      gap: 12px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .bottom-bar {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title" id="pageTitle">📋 角色信息</div>
    <div class="form-section">
      <div class="form-row">
        <div class="form-group">
          <label>名称</label>
          <input type="text" id="npcName" disabled>
        </div>
        <div class="form-group">
          <label>年龄</label>
          <input type="number" id="npcAge" disabled>
        </div>
      </div>
      <div class="form-group">
        <label>外貌</label>
        <textarea id="npcAppearance" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>身材</label>
        <textarea id="npcBody" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>性格</label>
        <textarea id="npcPersonality" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>职业</label>
        <input type="text" id="npcJob">
      </div>
      <div class="form-group">
        <label>收入</label>
        <input type="text" id="npcIncome">
      </div>
      <div class="form-group">
        <label>存款</label>
        <input type="number" id="npcSavings">
      </div>
      <div class="form-group">
        <label>背景介绍</label>
        <textarea id="npcBackground" rows="3"></textarea>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-secondary" onclick="parentNode.parentNode.parentElement.parentElement.remove()" style="margin-right:10px;">取消</button>
      <button class="btn" onclick="saveNPC()">保存修改</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const npcId = urlParams.get('npc') || 'NPC1';

    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function initForm() {
      const data = getStatData();
      const npc = (data.NPC || {})[npcId] || {};
      document.getElementById('pageTitle').textContent = '📋 ' + (npc.名称 || npcId) + ' - 角色信息';
      document.getElementById('npcName').value = npc.名称 || '';
      document.getElementById('npcAge').value = npc.年龄 || '';
      document.getElementById('npcAppearance').value = npc.外貌 || '';
      document.getElementById('npcBody').value = npc.身材 || '';
      document.getElementById('npcPersonality').value = npc.性格 || '';
      document.getElementById('npcJob').value = npc.职业 || '';
      document.getElementById('npcIncome').value = npc.收入 || '';
      document.getElementById('npcSavings').value = npc.存款 || '';
      document.getElementById('npcBackground').value = npc.背景介绍 || '';
    }
    function saveNPC() {
      const fields = {
        外貌: document.getElementById('npcAppearance').value.trim(),
        身材: document.getElementById('npcBody').value.trim(),
        性格: document.getElementById('npcPersonality').value.trim(),
        职业: document.getElementById('npcJob').value.trim(),
        收入: document.getElementById('npcIncome').value.trim(),
        存款: document.getElementById('npcSavings').value,
        背景介绍: document.getElementById('npcBackground').value.trim()
      };
      let text = `/更新NPC ${npcId}:`;
      Object.entries(fields).forEach(([k, v]) => { if (v) text += ` ${k}=${v},`; });
      text = text.replace(/,$/, '');
      sendToInput(text);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) { inputBox.value = text; inputBox.dispatchEvent(new Event('input', { bubbles: true })); }
    }
    initForm();
  </script>
</body>
</html>
