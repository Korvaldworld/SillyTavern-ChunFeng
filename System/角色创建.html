<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    .title {
      font-size: 24px;
      color: #e94560;
      text-align: center;
      margin-bottom: 24px;
    }
    .mode-selector {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .mode-card {
      flex: 1;
      background: rgba(22, 33, 62, 0.9);
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
    }
    .mode-card:hover {
      border-color: #64ffda;
      transform: translateY(-2px);
    }
    .mode-card.active {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.1);
    }
    .mode-card h4 {
      color: #64ffda;
      margin-top: 0;
      font-size: 16px;
    }
    .mode-card p {
      color: #a8b2d1;
      font-size: 13px;
      margin-bottom: 0;
      line-height: 1.6;
    }
    .form-section {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group label .required {
      color: #e94560;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #64ffda;
    }
    .form-group input:disabled,
    .form-group textarea:disabled {
      background: rgba(15, 52, 96, 0.3);
      color: #8892b0;
      cursor: not-allowed;
    }
    .form-row {
      display: flex;
      gap: 16px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .hint {
      font-size: 12px;
      color: #8892b0;
      margin-top: 4px;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background: #c73e54;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .btn-secondary:hover {
      background: rgba(233, 69, 96, 0.1);
    }
    .bottom-bar {
      text-align: center;
      margin-top: 24px;
    }
    .lock-notice {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #e94560;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🎭 创建你的角色</div>

    <div class="mode-selector">
      <div class="mode-card active" id="modeDefault" onclick="selectMode('default')">
        <h4>👤 使用默认角色</h4>
        <p>张浩<br>19岁 · 长乐公寓房东<br>193cm / 110kg</p>
      </div>
      <div class="mode-card" id="modeCustom" onclick="selectMode('custom')">
        <h4>✨ 自定义角色</h4>
        <p>创建属于你的独特角色<br>自由设定身份背景</p>
      </div>
    </div>

    <div class="lock-notice">
      🔒 <strong>重要提示：</strong>角色创建完成后，「名称」和「年龄」将被永久锁定，后续无法修改。请谨慎填写。
    </div>

    <div class="form-section">
      <div class="form-row">
        <div class="form-group">
          <label>名称 <span class="required">*</span></label>
          <input type="text" id="charName" placeholder="角色名称" value="张浩">
        </div>
        <div class="form-group">
          <label>年龄 <span class="required">*</span></label>
          <input type="number" id="charAge" placeholder="年龄" value="19">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>身高</label>
          <input type="text" id="charHeight" placeholder="例如：193cm" value="193cm">
        </div>
        <div class="form-group">
          <label>当前地点</label>
          <input type="text" id="charLocation" placeholder="当前所在地点" value="长乐公寓101室">
        </div>
      </div>
      <div class="form-group">
        <label>外观</label>
        <textarea id="charAppearance" rows="2" placeholder="描述角色的外貌特征...">肥胖但壮硕的体型，因长期健身而肌肉发达，但体脂率较高</textarea>
      </div>
      <div class="form-group">
        <label>角色背景</label>
        <textarea id="charBackground" rows="3" placeholder="描述角色的身份、来历、社会关系...">天雄集团董事长张天雄的独子，被父亲安排管理长乐公寓。性格懒散但内心善良，对公寓中的租客们有着复杂的情感。</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>性能力</label>
          <input type="text" id="charAbility" placeholder="性能力描述" value="正常">
        </div>
        <div class="form-group">
          <label>性癖</label>
          <input type="text" id="charFetish" placeholder="性癖偏好" value="巨乳熟女">
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="btn" onclick="confirmCharacter()">确认角色 →</button>
    </div>
  </div>

  <script>
    let mode = 'default';
    const defaultData = {
      名称: '张浩', 年龄: 19, 身高: '193cm', 当前地点: '长乐公寓101室',
      外观: '肥胖但壮硕的体型，因长期健身而肌肉发达，但体脂率较高',
      角色背景: '天雄集团董事长张天雄的独子，被父亲安排管理长乐公寓。性格懒散但内心善良，对公寓中的租客们有着复杂的情感。',
      性能力: '正常', 性癖: '巨乳熟女'
    };
    function selectMode(m) {
      mode = m;
      document.getElementById('modeDefault').classList.toggle('active', m === 'default');
      document.getElementById('modeCustom').classList.toggle('active', m === 'custom');
      if (m === 'default') {
        document.getElementById('charName').value = defaultData.名称;
        document.getElementById('charAge').value = defaultData.年龄;
        document.getElementById('charHeight').value = defaultData.身高;
        document.getElementById('charLocation').value = defaultData.当前地点;
        document.getElementById('charAppearance').value = defaultData.外观;
        document.getElementById('charBackground').value = defaultData.角色背景;
        document.getElementById('charAbility').value = defaultData.性能力;
        document.getElementById('charFetish').value = defaultData.性癖;
      } else {
        ['charName','charAge','charHeight','charLocation','charAppearance','charBackground','charAbility','charFetish'].forEach(id => {
          document.getElementById(id).value = '';
        });
        document.getElementById('charName').focus();
      }
    }
    function confirmCharacter() {
      const name = document.getElementById('charName').value.trim();
      const age = parseInt(document.getElementById('charAge').value);
      if (!name) { alert('请填写角色名称'); return; }
      if (!age || age < 1) { alert('请填写有效的年龄'); return; }
      const height = document.getElementById('charHeight').value.trim() || '未知';
      const location = document.getElementById('charLocation').value.trim() || '未知';
      const appearance = document.getElementById('charAppearance').value.trim() || '未知';
      const background = document.getElementById('charBackground').value.trim() || '未知';
      const ability = document.getElementById('charAbility').value.trim() || '未知';
      const fetish = document.getElementById('charFetish').value.trim() || '未知';
      const isDefault = mode === 'default';
      const promptText = `/创建角色: 名称=${name}, 年龄=${age}, 身高=${height}, 外观=${appearance}, 角色背景=${background}, 性能力=${ability}, 性癖=${fetish}, 是否默认角色=${isDefault}, 当前地点=${location}`;
      sendToInput(promptText);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) {
        inputBox.value = text;
        inputBox.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }
  </script>
</body>
</html>
