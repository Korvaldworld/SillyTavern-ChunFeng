<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 16px;
    }
    .options-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .option-btn {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.3);
      color: #e94560;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .option-btn:hover {
      background: rgba(233, 69, 96, 0.3);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="options-container" id="optionsContainer">
    <span style="color:#8892b0;font-size:12px;">选项加载中...</span>
  </div>
  <script>
    // 解析 options 标签内容并渲染为按钮
    (function() {
      const scripts = document.querySelectorAll('script');
      // 从 SillyTavern 上下文中获取原始 options 文本
      // 由于正则已经替换，这里仅作为备用样式容器
      const container = document.getElementById('optionsContainer');
      container.innerHTML = '<span style="color:#8892b0;font-size:12px;">请在对话中输入选项内容</span>';
    })();
  </script>
</body>
</html>
