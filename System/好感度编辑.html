<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
      color: #ccd6f6;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
    }
    .title {
      font-size: 20px;
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
    }
    .form-section {
      background: rgba(22, 33, 62, 0.9);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(15, 52, 96, 0.5);
    }
    .stat-row {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }
    .stat-label {
      width: 60px;
      color: #64ffda;
      font-size: 14px;
    }
    .stat-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #0f3460;
      outline: none;
    }
    .stat-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
    }
    .stat-value {
      width: 40px;
      text-align: center;
      color: #e94560;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #64ffda;
      font-size: 13px;
    }
    .form-group select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: rgba(10, 25, 47, 0.6);
      color: #ccd6f6;
      font-family: inherit;
      font-size: 14px;
    }
    .btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }
    .bottom-bar {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title" id="pageTitle">❤️ 好感度编辑</div>
    <div class="form-section">
      <div class="stat-row">
        <span class="stat-label">好感</span>
        <input type="range" class="stat-slider" id="affLike" min="0" max="100" value="0" oninput="document.getElementById('valLike').textContent=this.value">
        <span class="stat-value" id="valLike">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">厌恶</span>
        <input type="range" class="stat-slider" id="affHate" min="0" max="100" value="0" oninput="document.getElementById('valHate').textContent=this.value">
        <span class="stat-value" id="valHate">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">堕落</span>
        <input type="range" class="stat-slider" id="affDegrade" min="0" max="100" value="0" oninput="document.getElementById('valDegrade').textContent=this.value">
        <span class="stat-value" id="valDegrade">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">快感</span>
        <input type="range" class="stat-slider" id="affPleasure" min="0" max="100" value="0" oninput="document.getElementById('valPleasure').textContent=this.value">
        <span class="stat-value" id="valPleasure">0</span>
      </div>
      <div class="form-group">
        <label>情绪状态</label>
        <select id="moodSelect">
          <option value="平静">平静</option>
          <option value="开心">开心</option>
          <option value="焦虑">焦虑</option>
          <option value="愤怒">愤怒</option>
          <option value="悲伤">悲伤</option>
          <option value="恐惧">恐惧</option>
          <option value="兴奋">兴奋</option>
          <option value="羞耻">羞耻</option>
        </select>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-secondary" onclick="parentNode.parentNode.parentElement.parentElement.remove()" style="margin-right:10px;">取消</button>
      <button class="btn" onclick="saveAffinity()">保存</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const npcId = urlParams.get('npc') || 'NPC1';

    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }
    function initForm() {
      const data = getStatData();
      const npc = (data.NPC || {})[npcId] || {};
      document.getElementById('pageTitle').textContent = '❤️ ' + (npc.名称 || npcId) + ' - 好感度';
      document.getElementById('affLike').value = npc.好感度 || 0;
      document.getElementById('valLike').textContent = npc.好感度 || 0;
      document.getElementById('affHate').value = npc.厌恶度 || 0;
      document.getElementById('valHate').textContent = npc.厌恶度 || 0;
      document.getElementById('affDegrade').value = npc.堕落度 || 0;
      document.getElementById('valDegrade').textContent = npc.堕落度 || 0;
      document.getElementById('affPleasure').value = npc.快感 || 0;
      document.getElementById('valPleasure').textContent = npc.快感 || 0;
      document.getElementById('moodSelect').value = npc.情绪状态 || '平静';
    }
    function saveAffinity() {
      const like = document.getElementById('affLike').value;
      const hate = document.getElementById('affHate').value;
      const degrade = document.getElementById('affDegrade').value;
      const pleasure = document.getElementById('affPleasure').value;
      const mood = document.getElementById('moodSelect').value;
      sendToInput(`/更新好感 ${npcId}: 好感度=${like}, 厌恶度=${hate}, 堕落度=${degrade}, 快感=${pleasure}, 情绪状态=${mood}`);
    }
    function sendToInput(text) {
      const inputBox = document.querySelector('#send_textarea');
      if (inputBox) { inputBox.value = text; inputBox.dispatchEvent(new Event('input', { bubbles: true })); }
    }
    initForm();
  </script>
</body>
</html>
