<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: transparent;
    color: #ccd6f6;
    font-size: 12px;
    line-height: 1.4;
    padding: 4px;
  }

  /* зҠ¶жҖҒж Ҹ */
  .status-bar {
    background: linear-gradient(180deg, #0a192f 0%, #112240 100%);
    border: 1px solid #233554;
    border-radius: 6px;
    overflow: hidden;
  }

  /* зҺҜеўғж Ҹ */
  .env-bar {
    background: rgba(15, 52, 96, 0.3);
    padding: 6px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    border-bottom: 1px solid #233554;
  }
  .env-item {
    font-size: 12px;
    color: #8892b0;
  }
  .env-item strong {
    color: #64ffda;
    font-weight: normal;
  }

  /* зҺ©е®¶ж Ҹ */
  .player-section {
    padding: 10px;
    border-bottom: 1px solid #233554;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e94560, #0f3460);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .player-info {
    flex: 1;
    min-width: 0;
  }
  .player-name {
    font-size: 14px;
    color: #e94560;
    font-weight: bold;
    margin-bottom: 3px;
  }
  .player-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 4px;
  }
  .tag {
    background: rgba(15, 52, 96, 0.4);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    color: #a8b2d1;
  }
  .player-desc {
    font-size: 11px;
    color: #8892b0;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .player-actions {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  /* NPC ж Ҹ */
  .npc-section {
    padding: 10px;
    border-bottom: 1px solid #233554;
  }
  .npc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .npc-title {
    font-size: 12px;
    color: #64ffda;
  }
  .npc-card {
    background: rgba(15, 52, 96, 0.15);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 8px;
    border: 1px solid rgba(35, 53, 84, 0.4);
  }
  .npc-top {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
  }
  .npc-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #64ffda, #0f3460);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .npc-basic {
    flex: 1;
    min-width: 0;
  }
  .npc-name {
    font-size: 13px;
    color: #e94560;
    font-weight: bold;
  }
  .npc-sub {
    font-size: 11px;
    color: #8892b0;
  }
  .npc-details {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 4px;
    margin-bottom: 8px;
  }
  .npc-detail {
    font-size: 11px;
    color: #a8b2d1;
  }
  .npc-detail label {
    color: #64ffda;
    font-size: 10px;
    display: block;
  }
  .affinity-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
    background: rgba(10, 25, 47, 0.4);
    padding: 6px;
    border-radius: 4px;
  }
  .affinity-item {
    text-align: center;
  }
  .affinity-value {
    font-size: 14px;
    font-weight: bold;
    color: #e94560;
  }
  .affinity-label {
    font-size: 9px;
    color: #8892b0;
  }
  .mood-badge {
    background: rgba(100, 255, 218, 0.12);
    color: #64ffda;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
  }
  .npc-actions {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  /* жҢүй’® */
  .btn {
    background: rgba(233, 69, 96, 0.12);
    border: 1px solid rgba(233, 69, 96, 0.25);
    color: #e94560;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn:hover {
    background: rgba(233, 69, 96, 0.25);
  }
  .btn-sm {
    padding: 2px 6px;
    font-size: 10px;
  }
  .btn-secondary {
    background: rgba(15, 52, 96, 0.3);
    border: 1px solid #0f3460;
    color: #64ffda;
  }
  .btn-secondary:hover {
    background: rgba(15, 52, 96, 0.5);
    border-color: #64ffda;
  }
  .btn-success {
    background: rgba(100, 255, 218, 0.12);
    border: 1px solid rgba(100, 255, 218, 0.25);
    color: #64ffda;
  }
  .btn-success:hover {
    background: rgba(100, 255, 218, 0.25);
  }
  .btn-danger {
    background: rgba(233, 69, 96, 0.12);
    border: 1px solid rgba(233, 69, 96, 0.25);
    color: #e94560;
  }
  .btn-danger:hover {
    background: rgba(233, 69, 96, 0.25);
  }

  /* еә•йғЁе…ЁеұҖжҢүй’® */
  .global-actions {
    padding: 8px 10px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    background: rgba(10, 25, 47, 0.3);
  }
  .global-btn {
    background: rgba(15, 52, 96, 0.3);
    border: 1px solid #0f3460;
    color: #64ffda;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .global-btn:hover {
    background: rgba(15, 52, 96, 0.5);
    border-color: #64ffda;
  }

  .empty-state {
    text-align: center;
    color: #8892b0;
    padding: 12px;
    font-size: 11px;
    font-style: italic;
  }

  /* ===== еј№еҮәзј–иҫ‘йқўжқҝ ===== */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .popup-overlay.active {
    display: flex;
  }
  .popup-panel {
    background: #112240;
    border: 1px solid #233554;
    border-radius: 8px;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow: auto;
  }
  .popup-header {
    padding: 12px 16px;
    border-bottom: 1px solid #233554;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .popup-title {
    color: #64ffda;
    font-size: 14px;
    font-weight: bold;
  }
  .popup-close {
    background: transparent;
    border: none;
    color: #e94560;
    font-size: 18px;
    cursor: pointer;
  }
  .popup-content {
    padding: 16px;
  }
  .popup-footer {
    padding: 12px 16px;
    border-top: 1px solid #233554;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* иЎЁеҚ• */
  .form-row {
    margin-bottom: 10px;
  }
  .form-row label {
    display: block;
    color: #64ffda;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .form-input,
  .form-textarea {
    width: 100%;
    padding: 8px;
    background: rgba(10, 25, 47, 0.6);
    border: 1px solid #0f3460;
    color: #ccd6f6;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus,
  .form-textarea:focus {
    border-color: #64ffda;
  }
  .form-textarea {
    min-height: 80px;
    resize: vertical;
  }

  /* зү©е“ҒеҚЎзүҮ */
  .item-card {
    background: rgba(15, 52, 96, 0.3);
    border: 1px solid #233554;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  /* ж ҮзӯҫйЎө */
  .tab-btn {
    opacity: 0.6;
  }
  .tab-btn.active {
    opacity: 1;
    border-color: #64ffda;
    color: #64ffda;
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }

  /* и§’иүІеҚЎзүҮ */
  .char-card {
    background: rgba(15, 52, 96, 0.15);
    border: 1px solid rgba(35, 53, 84, 0.4);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<script>
$(function() {
  // ===== й»ҳи®ӨеҖј =====
  var defaults = {
    зҺҜеўғ: {
      еҪ“еүҚж—Ҙжңҹ: '2005е№ҙ4жңҲ1ж—Ҙ',
      еҪ“еүҚж—¶й—ҙ: '08:00',
      еӨ©ж°”: 'жҷҙ',
      ең°зӮ№: 'й•ҝд№җе…¬еҜ“101е®Ө',
      еҪ“еүҚдәӨдә’и§’иүІID: ''
    },
    зҺ©е®¶: {
      еҗҚз§°: '',
      е№ҙйҫ„: 19,
      иә«й«ҳ: '193cm',
      еӨ–и§Ӯ: '',
      и§’иүІиғҢжҷҜ: '',
      жҖ§иғҪеҠӣ: 'жӯЈеёё',
      жҖ§зҷ–: '',
      жҳҜеҗҰй»ҳи®Өи§’иүІ: true,
      жҢҒжңүйҮ‘й’ұ: 0,
      еҪ“еүҚең°зӮ№: 'й•ҝд№җе…¬еҜ“101е®Ө',
      зү©е“Ғж Ҹ: []
    },
    еү§жғ…: { жңӘжқҘдәӢд»¶: [] },
    NPC: {},
    дё–з•Ң: { ең°зӮ№дҝЎжҒҜ: [], и§„еҲҷдҝЎжҒҜ: [], дәӢд»¶дҝЎжҒҜ: [] }
  };

  // ===== ж•°жҚ®иҜ»еҸ– =====
  function readVar() {
    try {
      var ctx = window.SillyTavern.getContext();
      var raw = ctx.chatMetadata.variables['stat_data'];
      return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
    } catch (e) {
      return {};
    }
  }

  // ===== е‘Ҫд»ӨеҸ‘йҖҒ =====
  function sendStackedCmd(text) {
    try {
      var current = window.parent.$('#send_textarea').val() || '';
      var sep = current ? '\n\n' : '';
      var combined = current + sep + text;
      triggerSlash('/setinput ' + combined);
      if (typeof toastr !== 'undefined') toastr.success('е·ІиҝҪеҠ еҲ°иҫ“е…ҘжЎҶ');
    } catch (e) {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#112240;border:1px solid #233554;padding:16px;z-index:99999;max-width:90%;max-height:80%;overflow:auto;border-radius:8px;color:#ccd6f6;';
      el.innerHTML = '<div style="color:#e94560;font-weight:bold;margin-bottom:8px;">иҜ·еӨҚеҲ¶д»ҘдёӢе‘Ҫд»Өе№¶еҸ‘йҖҒпјҡ</div>' +
        '<textarea readonly style="width:100%;min-height:100px;background:#0a192f;border:1px solid #233554;color:#ccd6f6;padding:8px;font-family:inherit;font-size:12px;" onclick="this.select()">' + $('<div>').text(text).html() + '</textarea>' +
        '<button class="btn" style="margin-top:8px;" id="fallbackCloseBtn">е…ій—ӯ</button>';
      document.body.appendChild(el);
      $('#fallbackCloseBtn').on('click', function() { el.remove(); });
    }
  }

  // ===== еј№еҮәйқўжқҝ =====
  var $overlay = $('#popupOverlay');
  var $content = $('#popupContent');
  var $title = $('#popupTitle');
  var $footer = $('#popupFooter');

  function openPopup(title, html, onSave) {
    $title.text(title);
    $content.html(html);
    $overlay.addClass('active');

    if (onSave) {
      $footer.html('<button class="btn btn-danger" data-action="close">еҸ–ж¶Ҳ</button><button class="btn btn-success" data-action="save">дҝқеӯҳ</button>');
      $footer.off('click.popup-save');
      $footer.on('click.popup-save', '[data-action="save"]', function() {
        var text = onSave();
        if (text) {
          sendStackedCmd(text);
          closePopup();
        }
      });
    } else {
      $footer.empty();
    }

    $footer.off('click.popup-close');
    $footer.on('click.popup-close', '[data-action="close"]', closePopup);
  }

  function closePopup() {
    $overlay.removeClass('active');
    $content.empty();
    $footer.empty();
  }

  $('#popupClose').on('click', closePopup);
  $overlay.on('click', function(e) {
    if (e.target === this) closePopup();
  });

  // ===== иЎЁеҚ•е·Ҙе…· =====
  function esc(t) { return $('<div>').text(t || '').html(); }

  function makeInput(label, name, value, opts) {
    opts = opts || {};
    var type = opts.type || 'text';
    var id = 'field_' + name;
    var val = esc(value !== undefined && value !== null ? value : '');
    if (type === 'textarea') {
      return '<div class="form-row"><label for="' + id + '">' + esc(label) + '</label><textarea class="form-textarea" id="' + id + '" data-field="' + esc(name) + '">' + val + '</textarea></div>';
    }
    return '<div class="form-row"><label for="' + id + '">' + esc(label) + '</label><input type="' + type + '" class="form-input" id="' + id + '" data-field="' + esc(name) + '" value="' + val + '"></div>';
  }

  function getField(name) {
    return $content.find('[data-field="' + name + '"]').val().trim();
  }

  function getFieldNum(name) {
    var v = parseFloat(getField(name));
    return isNaN(v) ? 0 : v;
  }

  // ===== 1. зј–иҫ‘зҺ©е®¶дҝЎжҒҜ =====
  function popupEditPlayer() {
    var d = readVar();
    var p = $.extend({}, defaults.зҺ©е®¶, d.зҺ©е®¶ || {});
    var html =
      makeInput('еҗҚз§°', 'еҗҚз§°', p.еҗҚз§°) +
      makeInput('е№ҙйҫ„', 'е№ҙйҫ„', p.е№ҙйҫ„, {type: 'number'}) +
      makeInput('иә«й«ҳ', 'иә«й«ҳ', p.иә«й«ҳ) +
      makeInput('жҢҒжңүйҮ‘й’ұ', 'жҢҒжңүйҮ‘й’ұ', p.жҢҒжңүйҮ‘й’ұ, {type: 'number'}) +
      makeInput('еҪ“еүҚең°зӮ№', 'еҪ“еүҚең°зӮ№', p.еҪ“еүҚең°зӮ№) +
      makeInput('еӨ–и§Ӯ', 'еӨ–и§Ӯ', p.еӨ–и§Ӯ) +
      makeInput('и§’иүІиғҢжҷҜ', 'и§’иүІиғҢжҷҜ', p.и§’иүІиғҢжҷҜ, {type: 'textarea'}) +
      makeInput('жҖ§иғҪеҠӣ', 'жҖ§иғҪеҠӣ', p.жҖ§иғҪеҠӣ) +
      makeInput('жҖ§зҷ–', 'жҖ§зҷ–', p.жҖ§зҷ–);

    openPopup('зј–иҫ‘зҺ©е®¶дҝЎжҒҜ', html, function() {
      return 'гҖҗзј–иҫ‘зҺ©е®¶дҝЎжҒҜгҖ‘\n' +
        '- еҗҚз§°пјҡ' + getField('еҗҚз§°') + '\n' +
        '- е№ҙйҫ„пјҡ' + getFieldNum('е№ҙйҫ„') + '\n' +
        '- иә«й«ҳпјҡ' + getField('иә«й«ҳ') + '\n' +
        '- жҢҒжңүйҮ‘й’ұпјҡ' + getFieldNum('жҢҒжңүйҮ‘й’ұ') + '\n' +
        '- еҪ“еүҚең°зӮ№пјҡ' + getField('еҪ“еүҚең°зӮ№') + '\n' +
        '- еӨ–и§Ӯпјҡ' + getField('еӨ–и§Ӯ') + '\n' +
        '- и§’иүІиғҢжҷҜпјҡ' + getField('и§’иүІиғҢжҷҜ') + '\n' +
        '- жҖ§иғҪеҠӣпјҡ' + getField('жҖ§иғҪеҠӣ') + '\n' +
        '- жҖ§зҷ–пјҡ' + getField('жҖ§зҷ–') + '\n\n' +
        'иҜ·иҫ“еҮәжӣҙж–°зҺ©е®¶дҝЎжҒҜзҡ„ JSON-Patch';
    });
  }

  // ===== 2. зү©е“Ғж Ҹ =====
  function popupEditInv() {
    var d = readVar();
    var p = $.extend({}, defaults.зҺ©е®¶, d.зҺ©е®¶ || {});
    var items = p.зү©е“Ғж Ҹ || [];
    if (!Array.isArray(items)) items = [];

    var html = '<div id="invItemList"></div>' +
      '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #233554;">' +
      '<div class="form-row"><label>ж·»еҠ зү©е“Ғ</label></div>' +
      makeInput('еҗҚз§°', 'item_name', '') +
      makeInput('жҸҸиҝ°', 'item_desc', '') +
      makeInput('ж•°йҮҸ', 'item_qty', 1, {type: 'number'}) +
      '<button class="btn btn-success" id="btnAddItem" style="margin-top:4px;">ж·»еҠ </button></div>';

    openPopup('зү©е“Ғж Ҹ', html, function() {
      var lines = items.map(function(it) {

  // ===== 6. еү§жғ…зј–иҫ‘ =====
  function popupPlot() {
    var d = readVar();
    var plot = d.еү§жғ… || {};
    var events = [];
    if (typeof plot === 'object' && plot !== null) {
      events = plot.жңӘжқҘдәӢд»¶ || [];
    }
    if (!Array.isArray(events)) events = [];

    var html = '<div id="plotEventList"></div>' +
      '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #233554;">' +
      '<div style="color:#64ffda;font-weight:bold;margin-bottom:8px;">ж·»еҠ дәӢд»¶</div>' +
      makeInput('ж—¶й—ҙ', 'plot_time', '') +
      makeInput('ең°зӮ№', 'plot_loc', '') +
      makeInput('и§’иүІ', 'plot_chars', '') +
      makeInput('еҶ…е®№', 'plot_content', '', {type: 'textarea'}) +
      '<button class="btn btn-success" id="btnAddPlotEvent" style="margin-top:4px;">ж·»еҠ </button></div>';

    openPopup('еү§жғ…зј–иҫ‘', html, function() {
      var cmd = 'гҖҗеү§жғ…зј–иҫ‘гҖ‘\nжңӘжқҘдәӢд»¶пјҡ\n';
      if (events.length) {
        cmd += events.map(function(e) {
          return '- ж—¶й—ҙпјҡ' + (e.ж—¶й—ҙ || '') + '\n  ең°зӮ№пјҡ' + (e.ең°зӮ№ || '') + '\n  и§’иүІпјҡ' + (e.и§’иүІ || '') + '\n  еҶ…е®№пјҡ' + (e.еҶ…е®№ || '');
        }).join('\n\n');
      } else {
        cmd += 'пјҲж— пјү';
      }
      cmd += '\n\nиҜ·иҫ“еҮәжӣҙж–°еү§жғ…дҝЎжҒҜзҡ„ JSON-Patch';
      return cmd;
    });

    function renderPlotEvents() {
      var $list = $content.find('#plotEventList');
      if (!events.length) { $list.html('<div class="empty-state">жҡӮж— жңӘжқҘдәӢд»¶</div>'); return; }
      $list.html(events.map(function(e, i) {
        return '<div class="item-card"><div>' +
          '<div style="color:#64ffda;font-weight:bold;">' + esc(e.ж—¶й—ҙ || '') + ' @ ' + esc(e.ең°зӮ№ || '') + '</div>' +
          '<div style="color:#8892b0;font-size:11px;">и§’иүІпјҡ' + esc(e.и§’иүІ || '') + '</div>' +
          '<div style="color:#ccd6f6;font-size:12px;margin-top:2px;">' + esc(e.еҶ…е®№ || '') + '</div></div>' +
          '<button class="btn btn-danger btn-sm btn-del-plot" data-idx="' + i + '">еҲ йҷӨ</button></div>';
      }).join(''));
      $list.find('.btn-del-plot').on('click', function() { events.splice($(this).data('idx'), 1); renderPlotEvents(); });
    }

    renderPlotEvents();

    $content.find('#btnAddPlotEvent').on('click', function() {
      events.push({
        ж—¶й—ҙ: getField('plot_time'),
        ең°зӮ№: getField('plot_loc'),
        и§’иүІ: getField('plot_chars'),
        еҶ…е®№: getField('plot_content')
      });
      $content.find('[data-field="plot_time"]').val('');
      $content.find('[data-field="plot_loc"]').val('');
      $content.find('[data-field="plot_chars"]').val('');
      $content.find('[data-field="plot_content"]').val('');
      renderPlotEvents();
    });
  }

  // ===== 7. зј–иҫ‘еҘҪж„ҹеәҰ =====
  function popupEditAff(npcId) {
    var d = readVar();

        getField('дәӢд»¶и®°еҪ•') + '\n\n' +

  // ===== жёІжҹ“зҠ¶жҖҒж Ҹ =====
  function render() {
    var d = readVar();
    var env = $.extend({}, defaults.зҺҜеўғ, d.зҺҜеўғ || {});
    var plr = $.extend({}, defaults.зҺ©е®¶, d.зҺ©е®¶ || {});
    var npcs = d.NPC || {};

    $('#eDate').text(env.еҪ“еүҚж—Ҙжңҹ);
    $('#eTime').text(env.еҪ“еүҚж—¶й—ҙ);
    $('#eWeather').text(env.еӨ©ж°”);
    $('#eLoc').text(env.ең°зӮ№);

    var charName = 'ж— ';
    var aid = env.еҪ“еүҚдәӨдә’и§’иүІID;
    if (aid && npcs[aid] && npcs[aid].еҗҚз§°) charName = npcs[aid].еҗҚз§°;
    $('#eChar').text(charName);

    $('#pName').text(plr.еҗҚз§° || 'жңӘе‘ҪеҗҚ');
    $('#pAge').text((plr.е№ҙйҫ„ !== undefined ? plr.е№ҙйҫ„ : defaults.зҺ©е®¶.е№ҙйҫ„) + 'еІҒ');
    $('#pMoney').text('рҹ’° ' + (plr.жҢҒжңүйҮ‘й’ұ !== undefined ? plr.жҢҒжңүйҮ‘й’ұ : defaults.зҺ©е®¶.жҢҒжңүйҮ‘й’ұ));
    $('#pLoc').text('рҹ“Қ ' + (plr.еҪ“еүҚең°зӮ№ || defaults.зҺ©е®¶.еҪ“еүҚең°зӮ№));
    $('#pDesc').text(plr.и§’иүІиғҢжҷҜ || defaults.зҺ©е®¶.и§’иүІиғҢжҷҜ);

    renderNPCs(npcs);
  }

  function trunc(t) {
    if (!t) return '--';
    return t.length > 20 ? t.substring(0, 20) + '...' : t;
  }

  function renderNPCs(npcs) {
    var container = $('#npcContainer');
    var hasNPC = false;

    $.each(npcs, function(key, npc) {
      if (!npc || !npc.еҗҚз§°) return;

      html += '<div class="npc-card">' +

        '<div class="npc-basic"><div class="npc-name">' + esc(npc.еҗҚз§°) + '</div>' +
        '<div class="npc-sub">' + (npc.е№ҙйҫ„ !== undefined ? npc.е№ҙйҫ„ : '--') + 'еІҒ В· ' + (npc.иҒҢдёҡ || 'жңӘзҹҘиҒҢдёҡ') + '</div></div></div>' +
        '<div class="npc-details">' +
        '<div class="npc-detail"><label>еӨ–иІҢ</label>' + trunc(npc.еӨ–иІҢ) + '</div>' +
        '<div class="npc-detail"><label>иә«жқҗ</label>' + trunc(npc.иә«жқҗ) + '</div>' +
        '<div class="npc-detail"><label>жңҚиЈ…</label>' + trunc(npc.жңҚиЈ…) + '</div>' +
        '<div class="npc-detail"><label>жҖ§ж ј</label>' + trunc(npc.жҖ§ж ј) + '</div></div>' +
        '<div class="affinity-bar">' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#ff6b6b">' + (npc.еҘҪж„ҹеәҰ !== undefined ? npc.еҘҪж„ҹеәҰ : 0) + '</div><div class="affinity-label">еҘҪж„ҹ</div></div>' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#ffd93d">' + (npc.еҺҢжҒ¶еәҰ !== undefined ? npc.еҺҢжҒ¶еәҰ : 0) + '</div><div class="affinity-label">еҺҢжҒ¶</div></div>' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#c084fc">' + (npc.е •иҗҪеәҰ !== undefined ? npc.е •иҗҪеәҰ : 0) + '</div><div class="affinity-label">е •иҗҪ</div></div>' +
        '<div class="affinity-item"><div class="affinity-value" style="color:#ff9f43">' + (npc.еҝ«ж„ҹ !== undefined ? npc.еҝ«ж„ҹ : 0) + '</div><div class="affinity-label">еҝ«ж„ҹ</div></div>' +
        '<div style="margin-left:auto;"><span class="mood-badge">' + esc(npc.жғ…з»ӘзҠ¶жҖҒ || 'е№ійқҷ') + '</span></div>' +
        '<button class="btn btn-sm btn-edit-npc" data-npc="' + key + '" data-cmd="edit-aff">зј–иҫ‘</button></div>' +
        '<div class="npc-actions">' +
        '<button class="btn btn-secondary btn-sm btn-edit-npc" data-npc="' + key + '" data-cmd="npc-info">рҹ“Ӣ и§’иүІдҝЎжҒҜ</button>' +
        '<button class="btn btn-secondary btn-sm btn-edit-npc" data-npc="' + key + '" data-cmd="npc-cloth">рҹ‘— еҪ“еүҚжңҚиЈ…</button>' +
        '<button class="btn btn-secondary btn-sm btn-edit-npc" data-npc="' + key + '" data-cmd="npc-event">рҹ“ң дәӢд»¶и®°еҪ•</button></div></div>';
    });

    container.html(hasNPC ? html : '<div class="empty-state">жҡӮж— дәӨдә’дёӯзҡ„и§’иүІ</div>');
  }

  // ===== жҢүй’®дәӢд»¶з»‘е®ҡ =====
  $(document).on('click', '[data-cmd="edit-player"]', popupEditPlayer);

  // еҲқе§ӢеҢ–жёІжҹ“
