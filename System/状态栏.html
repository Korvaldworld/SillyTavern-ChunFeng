<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: transparent;
    color: #ccd6f6;
    font-size: 12px;
    line-height: 1.4;
    padding: 4px;
  }
  .status-bar {
    background: linear-gradient(180deg, #0a192f 0%, #112240 100%);
    border: 1px solid #233554;
    border-radius: 6px;
    overflow: hidden;
  }
  .env-bar {
    background: rgba(15, 52, 96, 0.3);
    padding: 6px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    border-bottom: 1px solid #233554;
  }
  .env-item { font-size: 12px; color: #8892b0; }
  .env-item strong { color: #64ffda; font-weight: normal; }
  .player-section {
    padding: 10px;
    border-bottom: 1px solid #233554;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #e94560, #0f3460);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name { font-size: 14px; color: #e94560; font-weight: bold; margin-bottom: 3px; }
  .player-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .tag { background: rgba(15,52,96,0.4); padding: 1px 6px; border-radius: 3px; font-size: 11px; color: #a8b2d1; }
  .player-desc { font-size: 11px; color: #8892b0; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .player-actions { display: flex; gap: 4px; margin-top: 6px; }
  .npc-section { padding: 10px; border-bottom: 1px solid #233554; }
  .npc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .npc-title { font-size: 12px; color: #64ffda; }
  .npc-card {
    background: rgba(15,52,96,0.15); border-radius: 6px; padding: 10px;
    margin-bottom: 8px; border: 1px solid rgba(35,53,84,0.4);
  }
  .npc-top { display: flex; gap: 10px; margin-bottom: 8px; }
  .npc-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#64ffda,#0f3460); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .npc-name { font-size: 13px; color: #e94560; font-weight: bold; }
  .npc-sub { font-size: 11px; color: #8892b0; }
  .npc-details { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: 4px; margin-bottom: 8px; }
  .npc-detail { font-size: 11px; color: #a8b2d1; }
  .npc-detail label { color: #64ffda; font-size: 10px; display: block; }
  .affinity-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; background: rgba(10,25,47,0.4); padding: 6px; border-radius: 4px; }
  .affinity-item { text-align: center; }
  .affinity-value { font-size: 14px; font-weight: bold; color: #e94560; }
  .affinity-label { font-size: 9px; color: #8892b0; }
  .mood-badge { background: rgba(100,255,218,0.12); color: #64ffda; padding: 1px 6px; border-radius: 10px; font-size: 10px; }
  .npc-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .btn {
    background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.25);
    color: #e94560; padding: 4px 10px; border-radius: 3px; cursor: pointer;
    font-size: 11px; font-family: inherit; transition: all 0.2s;
  }
  .btn:hover { background: rgba(233,69,96,0.25); }
  .btn-sm { padding: 2px 6px; font-size: 10px; }
  .btn-primary { background: #e94560; color: white; border-color: #e94560; }
  .btn-primary:hover { background: #c73e54; }
  .btn-secondary { background: rgba(15,52,96,0.3); border: 1px solid #0f3460; color: #64ffda; }
  .btn-secondary:hover { background: rgba(15,52,96,0.5); border-color: #64ffda; }
  .global-actions { padding: 8px 10px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; background: rgba(10,25,47,0.3); }
  .global-btn { background: rgba(15,52,96,0.3); border: 1px solid #0f3460; color: #64ffda; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
  .global-btn:hover { background: rgba(15,52,96,0.5); border-color: #64ffda; }
  .empty-state { text-align: center; color: #8892b0; padding: 12px; font-size: 11px; font-style: italic; }

  /* Popup */
  .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .popup-panel { background: #112240; border: 1px solid #233554; border-radius: 8px; width: 100%; max-width: 720px; max-height: 92vh; overflow: auto; }
  .popup-header { padding: 12px 16px; border-bottom: 1px solid #233554; display: flex; justify-content: space-between; align-items: center; }
  .popup-title { color: #64ffda; font-size: 14px; font-weight: bold; }
  .popup-close { background: transparent; border: none; color: #e94560; font-size: 18px; cursor: pointer; }
  .popup-content { padding: 16px; }
  .form-row { margin-bottom: 8px; }
  .form-row label { display: block; color: #64ffda; font-size: 11px; margin-bottom: 3px; }
  .form-input, .form-textarea { width: 100%; padding: 6px 8px; background: rgba(10,25,47,0.6); border: 1px solid #0f3460; color: #ccd6f6; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .form-textarea { min-height: 60px; resize: vertical; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: #64ffda; }
  .item-row { display: grid; grid-template-columns: 1fr 2fr 60px auto auto; gap: 6px; align-items: center; margin-bottom: 6px; }
  .item-card { background: rgba(15,52,96,0.3); border: 1px solid #233554; padding: 8px; margin-bottom: 6px; border-radius: 4px; }
  .item-card-title { color: #64ffda; font-weight: bold; font-size: 12px; margin-bottom: 2px; }
  .item-card-desc { color: #a8b2d1; font-size: 11px; }
  .item-card-qty { color: #e94560; font-size: 11px; }
  .list-item { background: rgba(15,52,96,0.25); border: 1px solid #233554; padding: 8px; margin-bottom: 6px; border-radius: 4px; }
  .list-item-title { color: #64ffda; font-weight: bold; font-size: 12px; }
  .list-item-desc { color: #a8b2d1; font-size: 11px; margin-top: 2px; }
  .inline-form { background: rgba(10,25,47,0.5); border: 1px solid #0f3460; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #233554; padding-bottom: 8px; }
  .tab { padding: 6px 12px; background: transparent; border: 1px solid #0f3460; color: #a8b2d1; cursor: pointer; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .tab.active { background: rgba(15,52,96,0.5); border-color: #64ffda; color: #64ffda; }
  .section-title { color: #e94560; font-size: 12px; font-weight: bold; margin: 12px 0 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(233,69,96,0.2); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .char-card { background: rgba(15,52,96,0.3); border: 1px solid #233554; padding: 10px; margin-bottom: 8px; border-radius: 4px; }
  .char-card-title { color: #64ffda; font-weight: bold; font-size: 13px; margin-bottom: 4px; }
  .char-card-info { color: #a8b2d1; font-size: 11px; line-height: 1.5; }
  .hint { color: #8892b0; font-size: 11px; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="status-bar">
    <div class="env-bar">
      <div class="env-item">📅 <strong id="eDate">--</strong></div>
      <div class="env-item">🕐 <strong id="eTime">--</strong></div>
      <div class="env-item">🌤 <strong id="eWeather">--</strong></div>
      <div class="env-item">📍 <strong id="eLoc">--</strong></div>
      <div class="env-item">👥 <strong id="eChar">--</strong></div>
    </div>
    <div class="player-section">
      <div class="avatar">👤</div>
      <div class="player-info">
        <div class="player-name" id="pName">加载中...</div>
        <div class="player-tags">
          <span class="tag" id="pAge">--</span>
          <span class="tag" id="pMoney">--</span>
          <span class="tag" id="pLoc">--</span>
        </div>
        <div class="player-desc" id="pDesc">加载中...</div>
        <div class="player-actions">
          <button class="btn" data-cmd="edit-player">✏️ 编辑信息</button>
          <button class="btn" data-cmd="edit-inv">🎒 物品</button>
        </div>
      </div>
    </div>
    <div class="npc-section">
      <div class="npc-header"><span class="npc-title">🎭 交互角色</span></div>
      <div id="npcContainer"><div class="empty-state">暂无交互中的主要角色</div></div>
    </div>
    <div class="global-actions">
      <button class="global-btn" data-cmd="char-mgr">👥 角色</button>
      <button class="global-btn" data-cmd="world-mgr">🌍 世界</button>
      <button class="global-btn" data-cmd="plot">📖 剧情</button>
    </div>
  </div>

  <div id="popupOverlay" style="display:none;"></div>

  <script>
  $(function() {
    // ========== VARIABLE READING ==========
    function readVar() {
      try {
        // Method 1: direct context (older ST)
        var ctx = window.SillyTavern.getContext();
        var raw = ctx.chatMetadata.variables['stat_data'];
        if (raw) return typeof raw === 'string' ? JSON.parse(raw) : raw;
      } catch(e) {}
      try {
        // Method 2: getVariables API (newer ST)
        var msgId = getCurrentMessageId();
        var vars = getVariables({type:'message', message_id: msgId});
        var raw2 = vars['stat_data'];
        if (raw2) return typeof raw2 === 'string' ? JSON.parse(raw2) : raw2;
      } catch(e) {}
      return {};
    }

    function getPlayer() {
      var d = readVar();
      return $.extend({
        名称:'', 年龄:'', 身高:'', 外观:'', 角色背景:'',
        性能力:'', 性癖:'', 持有金钱:0, 当前地点:'', 物品栏:[]
      }, d.玩家 || {});
    }
    function getEnv() {
      var d = readVar();
      return $.extend({
        当前日期:'', 当前时间:'', 天气:'', 地点:'', 当前交互角色ID:''
      }, d.环境 || {});
    }
    function getNPCs() {
      var d = readVar();
      return d.NPC || {};
    }
    function getWorld() {
      var d = readVar();
      return $.extend({
        基础设定:{城市名:'',年代:'',默认规则:''},
        用户自定义规则:[],
        重要地点:[]
      }, d.世界观 || {});
    }
    function getPlot() {
      var d = readVar();
      return $.extend({未来事件:[]}, d.剧情 || {});
    }

    // ========== COMMAND STACKING ==========
    function sendCmd(text) {
      try {
        var current = '';
        try { current = window.parent.$('#send_textarea').val() || ''; } catch(e) {}
        var sep = current.trim() ? '\n\n---\n\n' : '';
        triggerSlash('/setinput ' + current + sep + text);
        if (typeof toastr !== 'undefined') toastr.success('已添加到输入框');
      } catch(e) {
        // Fallback
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#112240;border:1px solid #233554;padding:16px;z-index:99999;max-width:90%;max-height:80%;overflow:auto;border-radius:8px;color:#ccd6f6;';
        el.innerHTML = '<div style="color:#e94560;font-weight:bold;margin-bottom:8px;">请复制以下命令并发送：</div>' +
          '<textarea readonly style="width:100%;min-height:100px;background:#0a192f;border:1px solid #233554;color:#ccd6f6;padding:8px;font-family:inherit;font-size:12px;" onclick="this.select()">' + esc(text) + '</textarea>' +
          '<button class="btn btn-primary btn-sm" style="margin-top:8px;" id="fbClose">关闭</button>';
        document.body.appendChild(el);
        $(document).one('click', '#fbClose', function(){ $(el).remove(); });
      }
    }
    function esc(t){ return $('<div>').text(t||'').html(); }

    // ========== POPUP SYSTEM ==========
    function openPopup(title, html) {
      $('#popupOverlay').html(
        '<div class="popup-overlay"><div class="popup-panel">' +
        '<div class="popup-header"><span class="popup-title">' + esc(title) + '</span>' +
        '<button class="popup-close" data-act="close">&times;</button></div>' +
        '<div class="popup-content">' + html + '</div></div></div>'
      ).show();
    }
    function closePopup() { $('#popupOverlay').hide().empty(); }
    $(document).on('click', '[data-act="close"]', closePopup);

    // ========== RENDER STATUS BAR ==========
    function render() {
      var p = getPlayer();
      var env = getEnv();
      $('#eDate').text(env.当前日期 || '--');
      $('#eTime').text(env.当前时间 || '--');
      $('#eWeather').text(env.天气 || '--');
      $('#eLoc').text(env.地点 || '--');
      var cname = '无';
      var aid = env.当前交互角色ID;
      var npcs = getNPCs();
      if (aid && npcs[aid] && npcs[aid].名称) cname = npcs[aid].名称;
      $('#eChar').text(cname);
      $('#pName').text(p.名称 || '未命名');
      $('#pAge').text((p.年龄 || '--') + '岁');
      $('#pMoney').text('💰 ' + (p.持有金钱 !== undefined ? p.持有金钱 : 0));
      $('#pLoc').text('📍 ' + (p.当前地点 || '--'));
      $('#pDesc').text(p.角色背景 || '暂无描述');
      renderNPCs(npcs, aid);
    }
    function renderNPCs(npcs, activeId) {
      var c = $('#npcContainer'), h = '', has = false;
      var mains = {NPC1:'施美玉',NPC2:'梁惠',NPC3:'雪婉',NPC4:'雪柔',NPC5:'颜媚',NPC6:'茵曼'};
      $.each(mains, function(k, dn) {
        var n = npcs[k];
        if (!n || !n.名称) return;
        if (k !== activeId || !n.是否在场) return;
        has = true;
        h += '<div class="npc-card"><div class="npc-top"><div class="npc-avatar">👩</div>' +
          '<div class="player-info"><div class="npc-name">' + esc(n.名称) + '</div>' +
          '<div class="npc-sub">' + (n.年龄||'--') + '岁 · ' + (n.职业||'未知') + '</div></div></div>' +
          '<div class="npc-details">' +
          '<div class="npc-detail"><label>外貌</label>' + trunc(n.外貌) + '</div>' +
          '<div class="npc-detail"><label>身材</label>' + trunc(n.身材) + '</div>' +
          '<div class="npc-detail"><label>服装</label>' + trunc(n.服装) + '</div>' +
          '<div class="npc-detail"><label>性格</label>' + trunc(n.性格) + '</div></div>' +
          '<div class="affinity-bar">' +
          '<div class="affinity-item"><div class="affinity-value" style="color:#ff6b6b">'+(n.好感度||0)+'</div><div class="affinity-label">好感</div></div>' +
          '<div class="affinity-item"><div class="affinity-value" style="color:#ffd93d">'+(n.厌恶度||0)+'</div><div class="affinity-label">厌恶</div></div>' +
          '<div class="affinity-item"><div class="affinity-value" style="color:#c084fc">'+(n.堕落度||0)+'</div><div class="affinity-label">堕落</div></div>' +
          '<div class="affinity-item"><div class="affinity-value" style="color:#ff9f43">'+(n.快感||0)+'</div><div class="affinity-label">快感</div></div>' +
          '<div style="margin-left:auto"><span class="mood-badge">'+(n.情绪状态||'平静')+'</span></div>' +
          '<button class="btn btn-sm btn-edit-aff" data-npc="'+k+'">编辑</button></div>' +
          '<div class="npc-actions">' +
          '<button class="btn btn-secondary btn-sm btn-npc-info" data-npc="'+k+'">📋 信息</button>' +
          '<button class="btn btn-secondary btn-sm btn-npc-cloth" data-npc="'+k+'">👗 服装</button>' +
          '<button class="btn btn-secondary btn-sm btn-npc-event" data-npc="'+k+'">📜 事件</button></div></div>';
      });
      c.html(has ? h : '<div class="empty-state">暂无交互中的主要角色</div>');
    }
    function trunc(t){ return t ? (t.length>20?t.substring(0,20)+'...':t) : '--'; }

    // ========== EDIT PLAYER - popup with save-per-field ==========
    function popupEditPlayer() {
      var p = getPlayer();
      var html = '<div class="hint">修改字段后点击对应字段的「更新」按钮，可直接发送到输入框</div>' +
        fieldRow('名称', 'epName', p.名称) +
        fieldRow('年龄', 'epAge', p.年龄) +
        fieldRow('身高', 'epHeight', p.身高) +
        fieldRow('持有金钱', 'epMoney', p.持有金钱) +
        fieldRow('当前地点', 'epLoc', p.当前地点) +
        fieldRow('外观', 'epApp', p.外观) +
        fieldRow('角色背景', 'epBg', p.角色背景, true) +
        fieldRow('性能力', 'epAbi', p.性能力) +
        fieldRow('性癖', 'epFet', p.性癖);
      openPopup('编辑玩家信息', html);
    }
    function fieldRow(label, id, val, isTextarea) {
      var input = isTextarea
        ? '<textarea class="form-textarea" id="'+id+'">' + esc(val) + '</textarea>'
        : '<input class="form-input" id="'+id+'" value="' + esc(val) + '">';
      return '<div class="form-row"><label>' + label + '</label><div class="two-col">' + input +
        '<button class="btn btn-primary btn-update-field" data-field="'+label+'" data-id="'+id+'" style="align-self:start;">更新 ' + label + '</button></div></div>';
    }
    $(document).on('click', '.btn-update-field', function() {
      var field = $(this).data('field');
      var id = $(this).data('id');
      var val = $('#' + id).val();
      var cmd = '【编辑玩家信息】\n修改玩家「' + field + '」为：' + val + '\n请输出更新该字段的 JSON-Patch';
      sendCmd(cmd);
    });

    // ========== EDIT INVENTORY ==========
    function popupEditInv() {
      var p = getPlayer();
      var items = p.物品栏 || [];
      var html = '<div class="hint">当前物品列表，点击「删除」或修改后点击「更新」</div>';
      if (items.length === 0) html += '<div class="empty-state">物品栏为空</div>';
      items.forEach(function(it, i) {
        html += '<div class="inline-form" data-idx="'+i+'">' +
          '<div class="form-row"><label>物品名称</label><input class="form-input inv-name" value="'+esc(it.物品名||'')+'"></div>' +
          '<div class="form-row"><label>描述</label><input class="form-input inv-desc" value="'+esc(it.描述||'')+'"></div>' +
          '<div class="form-row"><label>数量</label><input class="form-input inv-qty" type="number" value="'+esc(it.数量||1)+'"></div>' +
          '<div style="display:flex;gap:6px;margin-top:6px;">' +
          '<button class="btn btn-primary btn-sm btn-upd-item" data-idx="'+i+'">更新</button>' +
          '<button class="btn btn-sm btn-del-item" data-idx="'+i+'">删除</button></div></div>';
      });
      html += '<div class="section-title">+ 添加新物品</div><div class="inline-form">' +
        '<div class="form-row"><label>物品名称</label><input class="form-input" id="newItemName"></div>' +
        '<div class="form-row"><label>描述</label><input class="form-input" id="newItemDesc"></div>' +
        '<div class="form-row"><label>数量</label><input class="form-input" id="newItemQty" type="number" value="1"></div>' +
        '<button class="btn btn-primary btn-sm" id="btnAddItem">添加物品</button></div>';
      openPopup('物品栏', html);
    }
    $(document).on('click', '.btn-upd-item', function() {
      var i = $(this).data('idx');
      var el = $(this).closest('.inline-form');
      var name = el.find('.inv-name').val();
      var desc = el.find('.inv-desc').val();
      var qty = el.find('.inv-qty').val();
      sendCmd('【编辑物品栏】\n修改物品 #' + (i+1) + '\n- 名称：' + name + '\n- 描述：' + desc + '\n- 数量：' + qty + '\n请输出 JSON-Patch 更新物品栏');
    });
    $(document).on('click', '.btn-del-item', function() {
      var i = $(this).data('idx');
      sendCmd('【编辑物品栏】\n删除物品 #' + (i+1) + '\n请输出 JSON-Patch 删除该物品');
    });
    $(document).on('click', '#btnAddItem', function() {
      var name = $('#newItemName').val().trim();
      var desc = $('#newItemDesc').val().trim();
      var qty = $('#newItemQty').val();
      if (!name) { alert('请输入物品名称'); return; }
      sendCmd('【编辑物品栏】\n添加新物品\n- 名称：' + name + '\n- 描述：' + desc + '\n- 数量：' + qty + '\n请输出 JSON-Patch 添加该物品');
    });

    // ========== CHARACTER MANAGER ==========
    function popupCharMgr() {
      var p = getPlayer();
      var npcs = getNPCs();
      var html = '<div class="section-title">👤 玩家（主角）</div>' +
        '<div class="char-card"><div class="char-card-title">' + esc(p.名称||'未命名') + '</div>' +
        '<div class="char-card-info">' + (p.年龄||'--') + '岁 · ' + (p.当前地点||'--') + '<br>' + trunc(p.角色背景, 60) + '</div>' +
        '<button class="btn btn-primary btn-sm" data-cmd="edit-player" style="margin-top:6px;">编辑玩家信息</button></div>';

      html += '<div class="section-title">🎭 NPC 角色</div>';
      var hasNPC = false;
      $.each(npcs, function(k, n) {
        if (!n || !n.名称) return;
        hasNPC = true;
        html += '<div class="char-card"><div class="char-card-title">' + esc(n.名称) + ' <span style="color:#8892b0;font-size:11px;">(' + k + ')</span></div>' +
          '<div class="char-card-info">' + (n.年龄||'--') + '岁 · ' + (n.职业||'未知') + ' · 好感' + (n.好感度||0) + '</div>' +
          '<div style="display:flex;gap:4px;margin-top:6px;">' +
          '<button class="btn btn-sm btn-edit-npc" data-npc="'+k+'">编辑</button>' +
          '<button class="btn btn-sm btn-secondary btn-npc-info" data-npc="'+k+'">信息</button>' +
          '<button class="btn btn-sm btn-secondary btn-npc-cloth" data-npc="'+k+'">服装</button>' +
          '<button class="btn btn-sm btn-secondary btn-npc-event" data-npc="'+k+'">事件</button>' +
          '<button class="btn btn-sm btn-secondary btn-edit-aff" data-npc="'+k+'">好感</button></div></div>';
      });
      if (!hasNPC) html += '<div class="empty-state">暂无NPC角色</div>';

      html += '<div class="section-title">+ 添加角色</div>' +
        '<div class="two-col">' +
        '<button class="btn btn-primary" id="btnAddMain">添加主要角色</button>' +
        '<button class="btn btn-secondary" id="btnAddMinor">添加次要角色</button></div>' +
        '<div id="addCharForm" style="display:none;margin-top:10px;"></div>';
      openPopup('角色管理', html);
    }

    // Add main character form
    $(document).on('click', '#btnAddMain', function() {
      $('#addCharForm').show().html(
        '<div class="inline-form"><div class="hint">主要角色需要填写更多信息</div>' +
        '<div class="two-col">' +
        '<div class="form-row"><label>NPC ID</label><input class="form-input" id="acId" placeholder="如 NPC1"></div>' +
        '<div class="form-row"><label>名称</label><input class="form-input" id="acName"></div></div>' +
        '<div class="two-col">' +
        '<div class="form-row"><label>年龄</label><input class="form-input" id="acAge" type="number"></div>' +
        '<div class="form-row"><label>职业</label><input class="form-input" id="acJob"></div></div>' +
        '<div class="form-row"><label>外貌</label><input class="form-input" id="acLook"></div>' +
        '<div class="form-row"><label>身材</label><input class="form-input" id="acBody"></div>' +
        '<div class="form-row"><label>服装</label><input class="form-input" id="acCloth"></div>' +
        '<div class="form-row"><label>性格</label><input class="form-input" id="acPerson"></div>' +
        '<div class="form-row"><label>角色背景</label><textarea class="form-textarea" id="acBg"></textarea></div>' +
        '<div style="display:flex;gap:6px;">' +
        '<button class="btn btn-primary btn-sm" id="btnDoAddMain">确认添加</button>' +
        '<button class="btn btn-sm" id="btnCancelAdd">取消</button></div></div>'
      );
    });
    $(document).on('click', '#btnDoAddMain', function() {
      var id = $('#acId').val().trim() || 'NPC1';
      var cmd = '【添加主要角色】\n' +
        'NPC ID：' + id + '\n' +
        '- 名称：' + $('#acName').val() + '\n' +
        '- 年龄：' + $('#acAge').val() + '\n' +
        '- 职业：' + $('#acJob').val() + '\n' +
        '- 外貌：' + $('#acLook').val() + '\n' +
        '- 身材：' + $('#acBody').val() + '\n' +
        '- 服装：' + $('#acCloth').val() + '\n' +
        '- 性格：' + $('#acPerson').val() + '\n' +
        '- 角色背景：' + $('#acBg').val() + '\n' +
        '请输出 JSON-Patch 添加该角色到 NPC.' + id;
      sendCmd(cmd);
      $('#addCharForm').hide();
    });

    // Add minor character form
    $(document).on('click', '#btnAddMinor', function() {
      $('#addCharForm').show().html(
        '<div class="inline-form"><div class="hint">次要角色只需填写基本信息</div>' +
        '<div class="two-col">' +
        '<div class="form-row"><label>NPC ID</label><input class="form-input" id="acId2" placeholder="如 NPC7"></div>' +
        '<div class="form-row"><label>名称</label><input class="form-input" id="acName2"></div></div>' +
        '<div class="form-row"><label>简介</label><textarea class="form-textarea" id="acDesc2" placeholder="一句话描述该角色"></textarea></div>' +
        '<div style="display:flex;gap:6px;">' +
        '<button class="btn btn-primary btn-sm" id="btnDoAddMinor">确认添加</button>' +
        '<button class="btn btn-sm" id="btnCancelAdd">取消</button></div></div>'
      );
    });
    $(document).on('click', '#btnDoAddMinor', function() {
      var id = $('#acId2').val().trim() || 'NPC7';
      var cmd = '【添加次要角色】\n' +
        'NPC ID：' + id + '\n' +
        '- 名称：' + $('#acName2').val() + '\n' +
        '- 简介：' + $('#acDesc2').val() + '\n' +
        '请输出 JSON-Patch 添加该角色到 NPC.' + id;
      sendCmd(cmd);
      $('#addCharForm').hide();
    });
    $(document).on('click', '#btnCancelAdd', function() { $('#addCharForm').hide(); });

    // NPC edit popup
    $(document).on('click', '.btn-edit-npc', function() {
      var id = $(this).data('npc');
      var npcs = getNPCs();
      var n = npcs[id] || {};
      var html = '<div class="hint">修改字段后点击「更新」发送</div>' +
        npcField('名称', 'nen', n.名称) + npcField('年龄', 'nea', n.年龄) +
        npcField('职业', 'nej', n.职业) + npcField('外貌', 'nel', n.外貌) +
        npcField('身材', 'neb', n.身材) + npcField('服装', 'nec', n.服装) +
        npcField('性格', 'nep', n.性格) + npcField('角色背景', 'nebg', n.角色背景, true) +
        '<button class="btn btn-primary" id="btnSaveNpc" data-npc="'+id+'">更新角色 ' + esc(n.名称||id) + '</button>';
      openPopup('编辑角色：' + esc(n.名称||id), html);
    });
    function npcField(label, id, val, ta) {
      var inp = ta ? '<textarea class="form-textarea" id="'+id+'">' + esc(val) + '</textarea>'
        : '<input class="form-input" id="'+id+'" value="' + esc(val) + '">';
      return '<div class="form-row"><label>' + label + '</label>' + inp + '</div>';
    }
    $(document).on('click', '#btnSaveNpc', function() {
      var id = $(this).data('npc');
      var cmd = '【编辑角色信息：' + id + '】\n' +
        '- 名称：' + $('#nen').val() + '\n' +
        '- 年龄：' + $('#nea').val() + '\n' +
        '- 职业：' + $('#nej').val() + '\n' +
        '- 外貌：' + $('#nel').val() + '\n' +
        '- 身材：' + $('#neb').val() + '\n' +
        '- 服装：' + $('#nec').val() + '\n' +
        '- 性格：' + $('#nep').val() + '\n' +
        '- 角色背景：' + $('#nebg').val() + '\n' +
        '请输出 JSON-Patch 更新 NPC.' + id;
      sendCmd(cmd);
    });

    // NPC affinity
    $(document).on('click', '.btn-edit-aff', function() {
      var id = $(this).data('npc');
      var npcs = getNPCs();
      var n = npcs[id] || {};
      var html = '<div class="hint">修改数值后点击「更新」</div>' +
        '<div class="two-col">' +
        '<div class="form-row"><label>好感度</label><input class="form-input" id="naFav" type="number" value="'+(n.好感度||0)+'"></div>' +
        '<div class="form-row"><label>厌恶度</label><input class="form-input" id="naHate" type="number" value="'+(n.厌恶度||0)+'"></div></div>' +
        '<div class="two-col">' +
        '<div class="form-row"><label>堕落度</label><input class="form-input" id="naCor" type="number" value="'+(n.堕落度||0)+'"></div>' +
        '<div class="form-row"><label>快感</label><input class="form-input" id="naPle" type="number" value="'+(n.快感||0)+'"></div></div>' +
        '<div class="form-row"><label>情绪状态</label><input class="form-input" id="naMood" value="'+(n.情绪状态||'平静')+'"></div>' +
        '<button class="btn btn-primary" id="btnSaveAff" data-npc="'+id+'">更新好感度</button>';
      openPopup('编辑好感度：' + esc(n.名称||id), html);
    });
    $(document).on('click', '#btnSaveAff', function() {
      var id = $(this).data('npc');
      sendCmd('【编辑好感度：' + id + '】\n' +
        '- 好感度：' + $('#naFav').val() + '\n' +
        '- 厌恶度：' + $('#naHate').val() + '\n' +
        '- 堕落度：' + $('#naCor').val() + '\n' +
        '- 快感：' + $('#naPle').val() + '\n' +
        '- 情绪状态：' + $('#naMood').val() + '\n' +
        '请输出 JSON-Patch 更新 NPC.' + id + ' 的好感度相关字段');
    });

    // NPC clothing
    $(document).on('click', '.btn-npc-cloth', function() {
      var id = $(this).data('npc');
      var npcs = getNPCs();
      var n = npcs[id] || {};
      var html = '<div class="form-row"><label>当前服装</label><textarea class="form-textarea" id="ncCloth">' + esc(n.服装||'') + '</textarea></div>' +
        '<button class="btn btn-primary" id="btnSaveCloth" data-npc="'+id+'">更新服装</button>';
      openPopup('编辑服装：' + esc(n.名称||id), html);
    });
    $(document).on('click', '#btnSaveCloth', function() {
      var id = $(this).data('npc');
      sendCmd('【编辑服装：' + id + '】\n当前服装：' + $('#ncCloth').val() + '\n请输出 JSON-Patch 更新 NPC.' + id + '.服装');
    });

    // NPC events
    $(document).on('click', '.btn-npc-event', function() {
      var id = $(this).data('npc');
      var npcs = getNPCs();
      var n = npcs[id] || {};
      var evs = n.事件记录 || [];
      var html = '<div class="hint">事件记录（每行一条）</div>' +
        '<textarea class="form-textarea" id="neEvents" rows="6">' + esc(Array.isArray(evs)?evs.join('\n'):evs) + '</textarea>' +
        '<button class="btn btn-primary" id="btnSaveEvents" data-npc="'+id+'">更新事件记录</button>';
      openPopup('事件记录：' + esc(n.名称||id), html);
    });
    $(document).on('click', '#btnSaveEvents', function() {
      var id = $(this).data('npc');
      sendCmd('【编辑事件记录：' + id + '】\n新的事件记录：\n' + $('#neEvents').val() + '\n请输出 JSON-Patch 更新 NPC.' + id + '.事件记录');
    });

    // NPC info
    $(document).on('click', '.btn-npc-info', function() {
      var id = $(this).data('npc');
      var npcs = getNPCs();
      var n = npcs[id] || {};
      var html = '<div class="char-card"><div class="char-card-title">' + esc(n.名称||id) + '</div>' +
        '<div class="char-card-info">' +
        '年龄：' + (n.年龄||'--') + '<br>' +
        '职业：' + (n.职业||'--') + '<br>' +
        '外貌：' + (n.外貌||'--') + '<br>' +
        '身材：' + (n.身材||'--') + '<br>' +
        '服装：' + (n.服装||'--') + '<br>' +
        '性格：' + (n.性格||'--') + '<br>' +
        '角色背景：' + (n.角色背景||'--') + '<br>' +
        '好感度：' + (n.好感度||0) + ' · 厌恶度：' + (n.厌恶度||0) + ' · 堕落度：' + (n.堕落度||0) + ' · 快感：' + (n.快感||0) + '<br>' +
        '情绪：' + (n.情绪状态||'平静') + '</div></div>';
      openPopup('角色信息：' + esc(n.名称||id), html);
    });

    // ========== WORLD MANAGER ==========
    function popupWorldMgr() {
      var w = getWorld();
      var html = '<div class="tabs">' +
        '<button class="tab active" data-tab="loc">地点信息</button>' +
        '<button class="tab" data-tab="rule">规则信息</button>' +
        '<button class="tab" data-tab="event">事件信息</button></div>' +
        '<div id="tabContent"></div>';
      openPopup('世界管理', html);
      showLocTab(w);
    }
    function showLocTab(w) {
      var locs = w.重要地点 || [];
      var html = '<div class="hint">当前地点列表</div>';
      if (locs.length === 0) html += '<div class="empty-state">暂无地点</div>';
      locs.forEach(function(l, i) {
        html += '<div class="inline-form"><div class="form-row"><label>地点名称</label><input class="form-input wm-loc-name" value="'+esc(l.名称||l.name||'')+'"></div>' +
          '<div class="form-row"><label>描述</label><input class="form-input wm-loc-desc" value="'+esc(l.描述||l.desc||'')+'"></div>' +
          '<div class="form-row"><label>距离</label><input class="form-input wm-loc-dist" value="'+esc(l.距离||l.distance||'')+'"></div>' +
          '<div style="display:flex;gap:6px;">' +
          '<button class="btn btn-primary btn-sm btn-upd-loc" data-idx="'+i+'">更新</button>' +
          '<button class="btn btn-sm btn-del-loc" data-idx="'+i+'">删除</button></div></div>';
      });
      html += '<div class="section-title">+ 添加地点</div><div class="inline-form">' +
        '<div class="form-row"><label>地点名称</label><input class="form-input" id="newLocName"></div>' +
        '<div class="form-row"><label>描述</label><input class="form-input" id="newLocDesc"></div>' +
        '<div class="form-row"><label>距离</label><input class="form-input" id="newLocDist"></div>' +
        '<button class="btn btn-primary btn-sm" id="btnAddLoc">添加地点</button></div>';
      $('#tabContent').html(html);
    }
    function showRuleTab(w) {
      var rules = w.用户自定义规则 || [];
      var html = '<div class="hint">当前规则列表</div>';
      if (rules.length === 0) html += '<div class="empty-state">暂无自定义规则</div>';
      rules.forEach(function(r, i) {
        html += '<div class="inline-form"><div class="form-row"><label>规则名称</label><input class="form-input wm-rule-name" value="'+esc(r.规则名||r.name||'')+'"></div>' +
          '<div class="form-row"><label>规则内容</label><textarea class="form-textarea wm-rule-content">'+esc(r.规则内容||r.content||'')+'</textarea></div>' +
          '<div style="display:flex;gap:6px;">' +
          '<button class="btn btn-primary btn-sm btn-upd-rule" data-idx="'+i+'">更新</button>' +
          '<button class="btn btn-sm btn-del-rule" data-idx="'+i+'">删除</button></div></div>';
      });
      html += '<div class="section-title">+ 添加规则</div><div class="inline-form">' +
        '<div class="form-row"><label>规则名称</label><input class="form-input" id="newRuleName"></div>' +
        '<div class="form-row"><label>规则内容</label><textarea class="form-textarea" id="newRuleContent"></textarea></div>' +
        '<button class="btn btn-primary btn-sm" id="btnAddRule">添加规则</button></div>';
      $('#tabContent').html(html);
    }
    function showEventTab(w) {
      // World events timeline
      var html = '<div class="hint">世界事件时间线（过往事件作为背景设定）</div>';
      html += '<div class="empty-state">暂无事件（请通过剧情编辑添加未来事件）</div>';
      $('#tabContent').html(html);
    }
    $(document).on('click', '.tab', function() {
      $('.tab').removeClass('active');
      $(this).addClass('active');
      var w = getWorld();
      if ($(this).data('tab') === 'loc') showLocTab(w);
      else if ($(this).data('tab') === 'rule') showRuleTab(w);
      else showEventTab(w);
    });
    $(document).on('click', '.btn-upd-loc', function() {
      var i = $(this).data('idx');
      var el = $(this).closest('.inline-form');
      sendCmd('【世界管理-地点】\n修改地点 #' + (i+1) + '\n- 名称：' + el.find('.wm-loc-name').val() + '\n- 描述：' + el.find('.wm-loc-desc').val() + '\n- 距离：' + el.find('.wm-loc-dist').val() + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '.btn-del-loc', function() {
      sendCmd('【世界管理-地点】\n删除地点 #' + ($(this).data('idx')+1) + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '#btnAddLoc', function() {
      sendCmd('【世界管理-地点】\n添加新地点\n- 名称：' + $('#newLocName').val() + '\n- 描述：' + $('#newLocDesc').val() + '\n- 距离：' + $('#newLocDist').val() + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '.btn-upd-rule', function() {
      var i = $(this).data('idx');
      var el = $(this).closest('.inline-form');
      sendCmd('【世界管理-规则】\n修改规则 #' + (i+1) + '\n- 名称：' + el.find('.wm-rule-name').val() + '\n- 内容：' + el.find('.wm-rule-content').val() + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '.btn-del-rule', function() {
      sendCmd('【世界管理-规则】\n删除规则 #' + ($(this).data('idx')+1) + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '#btnAddRule', function() {
      sendCmd('【世界管理-规则】\n添加新规则\n- 名称：' + $('#newRuleName').val() + '\n- 内容：' + $('#newRuleContent').val() + '\n请输出 JSON-Patch');
    });

    // ========== PLOT EDITOR ==========
    function popupPlot() {
      var plot = getPlot();
      var evs = plot.未来事件 || [];
      var html = '<div class="hint">未来剧情事件，发生后请删除对应条目</div>';
      if (evs.length === 0) html += '<div class="empty-state">暂无未来事件</div>';
      evs.forEach(function(e, i) {
        html += '<div class="inline-form"><div class="two-col">' +
          '<div class="form-row"><label>时间</label><input class="form-input pe-time" value="'+esc(e.时间||e.time||'')+'"></div>' +
          '<div class="form-row"><label>地点</label><input class="form-input pe-loc" value="'+esc(e.地点||e.location||'')+'"></div></div>' +
          '<div class="form-row"><label>相关人物</label><input class="form-input pe-char" value="'+esc(e.相关人物||e.characters||'')+'"></div>' +
          '<div class="form-row"><label>剧情内容</label><textarea class="form-textarea pe-content">'+esc(e.剧情内容||e.content||'')+'</textarea></div>' +
          '<div style="display:flex;gap:6px;">' +
          '<button class="btn btn-primary btn-sm btn-upd-event" data-idx="'+i+'">更新</button>' +
          '<button class="btn btn-sm btn-del-event" data-idx="'+i+'">删除</button></div></div>';
      });
      html += '<div class="section-title">+ 添加未来事件</div><div class="inline-form">' +
        '<div class="two-col">' +
        '<div class="form-row"><label>时间</label><input class="form-input" id="newEventTime"></div>' +
        '<div class="form-row"><label>地点</label><input class="form-input" id="newEventLoc"></div></div>' +
        '<div class="form-row"><label>相关人物</label><input class="form-input" id="newEventChar"></div>' +
        '<div class="form-row"><label>剧情内容</label><textarea class="form-textarea" id="newEventContent"></textarea></div>' +
        '<button class="btn btn-primary btn-sm" id="btnAddEvent">添加事件</button></div>';
      openPopup('剧情编辑', html);
    }
    $(document).on('click', '.btn-upd-event', function() {
      var i = $(this).data('idx');
      var el = $(this).closest('.inline-form');
      sendCmd('【剧情编辑】\n修改未来事件 #' + (i+1) + '\n- 时间：' + el.find('.pe-time').val() + '\n- 地点：' + el.find('.pe-loc').val() + '\n- 人物：' + el.find('.pe-char').val() + '\n- 内容：' + el.find('.pe-content').val() + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '.btn-del-event', function() {
      sendCmd('【剧情编辑】\n删除未来事件 #' + ($(this).data('idx')+1) + '\n请输出 JSON-Patch');
    });
    $(document).on('click', '#btnAddEvent', function() {
      sendCmd('【剧情编辑】\n添加未来事件\n- 时间：' + $('#newEventTime').val() + '\n- 地点：' + $('#newEventLoc').val() + '\n- 人物：' + $('#newEventChar').val() + '\n- 内容：' + $('#newEventContent').val() + '\n请输出 JSON-Patch');
    });

    // ========== BUTTON BINDINGS ==========
    $(document).on('click', '[data-cmd="edit-player"]', popupEditPlayer);
    $(document).on('click', '[data-cmd="edit-inv"]', popupEditInv);
    $(document).on('click', '[data-cmd="char-mgr"]', popupCharMgr);
    $(document).on('click', '[data-cmd="world-mgr"]', popupWorldMgr);
    $(document).on('click', '[data-cmd="plot"]', popupPlot);

    // Init render
    render();
  });
  </script>
</body>
</html>
