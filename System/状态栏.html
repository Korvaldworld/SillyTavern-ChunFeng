<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:transparent;color:#ccd6f6;font-size:11px;line-height:1.3;padding:2px}
.status-bar{background:linear-gradient(180deg,#0a192f 0%,#112240 100%);border:1px solid #233554;border-radius:4px;overflow:hidden}
.env-bar{background:rgba(15,52,96,0.3);padding:4px 8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;border-bottom:1px solid #233554;font-size:11px}
.env-item{color:#8892b0}.env-item strong{color:#64ffda;font-weight:normal}
.player-section{padding:6px 8px;border-bottom:1px solid #233554;display:flex;align-items:flex-start;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e94560,#0f3460);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.player-info{flex:1;min-width:0}.player-name{font-size:13px;color:#e94560;font-weight:bold;margin-bottom:2px}
.player-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:2px}.tag{background:rgba(15,52,96,0.4);padding:1px 5px;border-radius:2px;font-size:10px;color:#a8b2d1}
.player-desc{font-size:10px;color:#8892b0;line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.player-actions{display:flex;gap:3px;margin-top:4px}
.npc-section{padding:6px 8px;border-bottom:1px solid #233554}.npc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px;color:#64ffda}
.npc-card{background:rgba(15,52,96,0.15);border-radius:4px;padding:6px;margin-bottom:6px;border:1px solid rgba(35,53,84,0.4)}
.npc-top{display:flex;gap:8px;margin-bottom:4px}.npc-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#64ffda,#0f3460);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.npc-name{font-size:12px;color:#e94560;font-weight:bold}.npc-sub{font-size:10px;color:#8892b0}
.npc-details{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:4px}.npc-detail{font-size:10px;color:#a8b2d1}.npc-detail label{color:#64ffda;font-size:9px;display:block}
.affinity-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;background:rgba(10,25,47,0.4);padding:4px;border-radius:3px}
.affinity-item{text-align:center}.affinity-value{font-size:12px;font-weight:bold;color:#e94560}.affinity-label{font-size:9px;color:#8892b0}
.mood-badge{background:rgba(100,255,218,0.12);color:#64ffda;padding:1px 5px;border-radius:8px;font-size:9px}
.npc-actions{display:flex;gap:3px;flex-wrap:wrap}
.btn{background:rgba(233,69,96,0.12);border:1px solid rgba(233,69,96,0.25);color:#e94560;padding:3px 8px;border-radius:2px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .2s}
.btn:hover{background:rgba(233,69,96,0.25)}.btn-sm{padding:1px 5px;font-size:9px}.btn-primary{background:#e94560;color:white;border-color:#e94560}.btn-primary:hover{background:#c73e54}
.btn-secondary{background:rgba(15,52,96,0.3);border:1px solid #0f3460;color:#64ffda}.btn-secondary:hover{background:rgba(15,52,96,0.5);border-color:#64ffda}
.global-actions{padding:6px 8px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;background:rgba(10,25,47,0.3)}
.global-btn{background:rgba(15,52,96,0.3);border:1px solid #0f3460;color:#64ffda;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.global-btn:hover{background:rgba(15,52,96,0.5);border-color:#64ffda}
.empty-state{text-align:center;color:#8892b0;padding:8px;font-size:10px;font-style:italic}

/* popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:8px}
.popup-panel{background:#112240;border:1px solid #233554;border-radius:6px;width:100%;max-width:680px;max-height:95vh;display:flex;flex-direction:column}
.popup-header{padding:8px 12px;border-bottom:1px solid #233554;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.popup-title{color:#64ffda;font-size:13px;font-weight:bold}.popup-close{background:transparent;border:none;color:#e94560;font-size:18px;cursor:pointer}
.popup-content{padding:10px 12px;overflow:auto;flex:1}.popup-footer{padding:8px 12px;border-top:1px solid #233554;display:flex;justify-content:flex-end;gap:6px;flex-shrink:0}

/* forms */
.form-row{margin-bottom:5px}.form-row label{display:block;color:#64ffda;font-size:10px;margin-bottom:2px}
.form-input,.form-textarea{width:100%;padding:4px 6px;background:rgba(10,25,47,0.6);border:1px solid #0f3460;color:#ccd6f6;border-radius:3px;font-family:inherit;font-size:11px}
.form-textarea{min-height:40px;resize:vertical}.form-input:focus,.form-textarea:focus{outline:none;border-color:#64ffda}
.field-wrap{display:flex;gap:6px;align-items:center}.field-wrap .form-input{flex:1}.field-wrap .btn-update-field{padding:2px 6px;font-size:9px;white-space:nowrap}
.inline-form{background:rgba(10,25,47,0.5);border:1px solid #0f3460;padding:8px;margin-bottom:6px;border-radius:3px}
.item-card{background:rgba(15,52,96,0.3);border:1px solid #233554;padding:6px;margin-bottom:4px;border-radius:3px}
.item-card-title{color:#64ffda;font-weight:bold;font-size:11px;margin-bottom:2px}
.item-card-info{color:#a8b2d1;font-size:10px}
.list-item{background:rgba(15,52,96,0.25);border:1px solid #233554;padding:6px;margin-bottom:4px;border-radius:3px}
.list-item-title{color:#64ffda;font-weight:bold;font-size:11px}.list-item-desc{color:#a8b2d1;font-size:10px;margin-top:2px}
.section-title{color:#e94560;font-size:11px;font-weight:bold;margin:8px 0 4px;padding-bottom:3px;border-bottom:1px solid rgba(233,69,96,0.2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.char-card{background:rgba(15,52,96,0.3);border:1px solid #233554;padding:8px;margin-bottom:6px;border-radius:3px}
.char-card-title{color:#64ffda;font-weight:bold;font-size:12px;margin-bottom:3px}.char-card-info{color:#a8b2d1;font-size:10px;line-height:1.4}
.hint{color:#8892b0;font-size:10px;margin-bottom:6px}
.tabs{display:flex;gap:3px;margin-bottom:8px;border-bottom:1px solid #233554;padding-bottom:6px}
.tab{padding:4px 10px;background:transparent;border:1px solid #0f3460;color:#a8b2d1;cursor:pointer;border-radius:3px;font-family:inherit;font-size:11px}.tab.active{background:rgba(15,52,96,0.5);border-color:#64ffda;color:#64ffda}

/* scene editor */
.scene-list{flex:1;overflow:auto;margin-bottom:8px}
.scene-item{display:flex;align-items:center;gap:6px;padding:4px 6px;margin-bottom:3px;background:rgba(15,52,96,0.2);border:1px solid rgba(35,53,84,0.4);border-radius:3px;font-size:11px}
.scene-num{color:#e94560;font-size:11px;font-weight:bold;min-width:24px;text-align:right}
.scene-tag{color:#64ffda;font-size:10px;white-space:nowrap}
.scene-who{width:60px;padding:2px 4px;font-size:10px;background:rgba(10,25,47,0.6);border:1px solid #0f3460;color:#ccd6f6;border-radius:2px}
.scene-content{flex:1;padding:2px 4px;font-size:10px;background:rgba(10,25,47,0.6);border:1px solid #0f3460;color:#ccd6f6;border-radius:2px}
.scene-del{color:#e94560;background:transparent;border:none;cursor:pointer;font-size:12px;padding:0 4px}
.scene-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.scene-toolbar .btn{font-size:10px;padding:3px 8px}

/* mobile */
@media(max-width:600px){
.popup-panel{max-width:100%;max-height:100vh;border-radius:0;margin:0}
.popup-overlay{padding:0;align-items:flex-start}
.two-col{grid-template-columns:1fr}
.status-bar{font-size:10px}.player-section{padding:4px;gap:4px}
.env-bar{padding:3px 6px;font-size:10px}.npc-card{padding:6px}
.global-actions{padding:4px}.global-btn{padding:3px 6px;font-size:10px}
.npc-details{grid-template-columns:repeat(2,1fr)}
.scene-who{width:50px}.scene-content{font-size:9px}
}
</style>
</head>
<body>
<div class="status-bar">
<div class="env-bar">
<div class="env-item">📅<strong id="eDate">--</strong></div>
<div class="env-item">🕐<strong id="eTime">--</strong></div>
<div class="env-item">🌤<strong id="eWeather">--</strong></div>
<div class="env-item">📍<strong id="eLoc">--</strong></div>
<div class="env-item">👥<strong id="eChar">--</strong></div>
</div>
<div class="player-section">
<div class="avatar">👤</div>
<div class="player-info">
<div class="player-name" id="pName">加载中...</div>
<div class="player-tags">
<span class="tag" id="pAge">--</span>
<span class="tag" id="pMoney">--</span>
<span class="tag" id="pLoc">--</span>
</div>
<div class="player-desc" id="pDesc">加载中...</div>
<div class="player-actions">
<button class="btn" data-cmd="edit-player">✏️信息</button>
<button class="btn" data-cmd="edit-inv">🎒物品</button>
</div>
</div>
</div>
<div class="npc-section">
<div class="npc-header"><span>🎭交互角色</span></div>
<div id="npcContainer"><div class="empty-state">暂无交互中的主要角色</div></div>
</div>
<div class="global-actions">
<button class="global-btn" data-cmd="char-mgr">👥角色</button>
<button class="global-btn" data-cmd="world-mgr">🌍世界</button>
<button class="global-btn" data-cmd="plot">📖剧情</button>
<button class="global-btn" data-cmd="scene-edit">🎬情境</button>
</div>
</div>
<div id="popupOverlay" style="display:none"></div>

<script>
$(function(){
function readVar(){try{var c=window.SillyTavern.getContext(),r=c.chatMetadata.variables['stat_data'];if(r)return typeof r==='string'?JSON.parse(r):r}catch(e){}try{var m=getCurrentMessageId(),v=getVariables({type:'message',message_id:m}),r2=v['stat_data'];if(r2)return typeof r2==='string'?JSON.parse(r2):r2}catch(e){}return{}}
function getPlayer(){var d=readVar();return $.extend({名称:'',年龄:'',身高:'',外观:'',角色背景:'',性能力:'',性癖:'',持有金钱:0,当前地点:'',物品栏:[]},d.玩家||{})}
function getEnv(){var d=readVar();return $.extend({当前日期:'',当前时间:'',天气:'',地点:'',当前交互角色ID:''},d.环境||{})}
function getNPCs(){var d=readVar();return d.NPC||{}}
function getWorld(){var d=readVar();return $.extend({基础设定:{城市名:'',年代:'',默认规则:''},用户自定义规则:[],重要地点:[],过往事件:[]},d.世界观||{})}
function getPlot(){var d=readVar();return $.extend({未来事件:[]},d.剧情||{})}
function sendCmd(t){try{var c='';try{c=window.parent.$('#send_textarea').val()||''}catch(e){}var s=c.trim()?'\n\n---\n\n':'';triggerSlash('/setinput '+c+s+t);if(typeof toastr!=='undefined')toastr.success('已添加到输入框')}catch(e){var el=document.createElement('div');el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#112240;border:1px solid #233554;padding:16px;z-index:99999;max-width:90%;max-height:80%;overflow:auto;border-radius:8px;color:#ccd6f6;';el.innerHTML='<div style="color:#e94560;font-weight:bold;margin-bottom:8px">请复制以下命令并发送：</div><textarea readonly style="width:100%;min-height:100px;background:#0a192f;border:1px solid #233554;color:#ccd6f6;padding:8px;font-family:inherit;font-size:12px" onclick="this.select()">'+esc(t)+'</textarea><button class="btn btn-primary btn-sm" style="margin-top:8px" id="fbClose">关闭</button>';document.body.appendChild(el);$(document).one('click','#fbClose',function(){$(el).remove()})}}
function esc(t){return $('<div>').text(t||'').html()}
function trunc(t,l){l=l||20;return t?(t.length>l?t.substring(0,l)+'...':t):'--'}
function openPopup(tt,html){$('#popupOverlay').html('<div class="popup-overlay"><div class="popup-panel"><div class="popup-header"><span class="popup-title">'+esc(tt)+'</span><button class="popup-close" data-act="close">&times;</button></div><div class="popup-content">'+html+'</div></div></div>').show()}
function closePopup(){$('#popupOverlay').hide().empty()}
$(document).on('click','[data-act="close"]',closePopup)

function render(){
var p=getPlayer(),env=getEnv(),npcs=getNPCs();
$('#eDate').text(env.当前日期||'--');$('#eTime').text(env.当前时间||'--');$('#eWeather').text(env.天气||'--');$('#eLoc').text(env.地点||'--');
var cname='无',aid=env.当前交互角色ID;
if(aid&&npcs[aid]&&npcs[aid].名称)cname=npcs[aid].名称;
$('#eChar').text(cname);
$('#pName').text(p.名称||'未命名');$('#pAge').text((p.年龄||'--')+'岁');$('#pMoney').text('💰'+(p.持有金钱!==undefined?p.持有金钱:0));$('#pLoc').text('📍'+(p.当前地点||'--'));$('#pDesc').text(p.角色背景||'暂无描述');
renderNPCs(npcs,aid)
}
function renderNPCs(npcs,activeId){
var c=$('#npcContainer'),h='',has=false;
var mains={NPC1:'施美玉',NPC2:'梁惠',NPC3:'雪婉',NPC4:'雪柔',NPC5:'颜媚',NPC6:'茵曼'};
$.each(mains,function(k,dn){
var n=npcs[k];if(!n||!n.名称)return;if(k!==activeId||!n.是否在场)return;has=true;
h+='<div class="npc-card"><div class="npc-top"><div class="npc-avatar">👩</div><div class="player-info"><div class="npc-name">'+esc(n.名称)+'</div><div class="npc-sub">'+(n.年龄||'--')+'岁·'+(n.职业||'未知')+'</div></div></div>'+
'<div class="npc-details"><div class="npc-detail"><label>外貌</label>'+trunc(n.外貌)+'</div><div class="npc-detail"><label>身材</label>'+trunc(n.身材)+'</div><div class="npc-detail"><label>服装</label>'+trunc(n.服装)+'</div><div class="npc-detail"><label>性格</label>'+trunc(n.性格)+'</div></div>'+
'<div class="affinity-bar"><div class="affinity-item"><div class="affinity-value" style="color:#ff6b6b">'+(n.好感度||0)+'</div><div class="affinity-label">好感</div></div><div class="affinity-item"><div class="affinity-value" style="color:#ffd93d">'+(n.厌恶度||0)+'</div><div class="affinity-label">厌恶</div></div><div class="affinity-item"><div class="affinity-value" style="color:#c084fc">'+(n.堕落度||0)+'</div><div class="affinity-label">堕落</div></div><div class="affinity-item"><div class="affinity-value" style="color:#ff9f43">'+(n.快感||0)+'</div><div class="affinity-label">快感</div></div><div style="margin-left:auto"><span class="mood-badge">'+(n.情绪状态||'平静')+'</span></div><button class="btn btn-sm btn-edit-aff" data-npc="'+k+'">编辑</button></div>'+
'<div class="npc-actions"><button class="btn btn-secondary btn-sm btn-npc-info" data-npc="'+k+'">📋信息</button><button class="btn btn-secondary btn-sm btn-npc-cloth" data-npc="'+k+'">👗服装</button><button class="btn btn-secondary btn-sm btn-npc-event" data-npc="'+k+'">📜事件</button></div></div>'
});
c.html(has?h:'<div class="empty-state">暂无交互中的主要角色</div>')
}

// player edit - compact inline update buttons
function popupEditPlayer(){
var p=getPlayer();
var html='<div class="hint">修改后点击右侧「更新」</div>'+
'<div class="two-col">'+fRow2('名称','epName',p.名称)+fRow2('年龄','epAge',p.年龄)+'</div>'+
'<div class="two-col">'+fRow2('身高','epHeight',p.身高)+fRow2('持有金钱','epMoney',p.持有金钱)+'</div>'+
'<div class="two-col">'+fRow2('当前地点','epLoc',p.当前地点)+fRow2('外观','epApp',p.外观)+'</div>'+
fRow2('角色背景','epBg',p.角色背景,true)+
'<div class="two-col">'+fRow2('性能力','epAbi',p.性能力)+fRow2('性癖','epFet',p.性癖)+'</div>';
openPopup('编辑玩家信息',html)
}
function fRow2(lbl,id,val,ta){
var inp=ta?'<textarea class="form-textarea" id="'+id+'">'+esc(val)+'</textarea>':'<input class="form-input" id="'+id+'" value="'+esc(val)+'">';
return'<div class="form-row"><label>'+lbl+'</label><div class="field-wrap">'+inp+'<button class="btn btn-primary btn-update-field" data-field="'+lbl+'" data-id="'+id+'">更新</button></div></div>'
}
$(document).on('click','.btn-update-field',function(){
var f=$(this).data('field'),id=$(this).data('id'),v=$('#'+id).val();
sendCmd('【编辑玩家信息】\n修改玩家「'+f+'」为：'+v+'\n请输出更新该字段的JSON-Patch')
});

// inventory
function popupEditInv(){
var p=getPlayer(),items=p.物品栏||[];
var html='<div class="hint">点击「更新」或「删除」</div>';
if(items.length===0)html+='<div class="empty-state">物品栏为空</div>';
items.forEach(function(it,i){
html+='<div class="inline-form" data-idx="'+i+'"><div class="two-col"><div class="form-row"><label>名称</label><input class="form-input inv-name" value="'+esc(it.物品名||'')+'"></div><div class="form-row"><label>数量</label><input class="form-input inv-qty" type="number" value="'+esc(it.数量||1)+'"></div></div><div class="form-row"><label>描述</label><input class="form-input inv-desc" value="'+esc(it.描述||'')+'"></div><div style="display:flex;gap:4px;margin-top:4px"><button class="btn btn-primary btn-sm btn-upd-item" data-idx="'+i+'">更新</button><button class="btn btn-sm btn-del-item" data-idx="'+i+'">删除</button></div></div>'
});
html+='<div class="section-title">+添加新物品</div><div class="inline-form"><div class="two-col"><div class="form-row"><label>名称</label><input class="form-input" id="newItemName"></div><div class="form-row"><label>数量</label><input class="form-input" id="newItemQty" type="number" value="1"></div></div><div class="form-row"><label>描述</label><input class="form-input" id="newItemDesc"></div><button class="btn btn-primary btn-sm" id="btnAddItem">添加</button></div>';
openPopup('物品栏',html)
}
$(document).on('click','.btn-upd-item',function(){
var i=$(this).data('idx'),el=$(this).closest('.inline-form');
sendCmd('【编辑物品栏】\n修改物品#'+(i+1)+'\n-名称：'+el.find('.inv-name').val()+'\n-描述：'+el.find('.inv-desc').val()+'\n-数量：'+el.find('.inv-qty').val()+'\n请输出JSON-Patch')
});
$(document).on('click','.btn-del-item',function(){sendCmd('【编辑物品栏】\n删除物品#'+($(this).data('idx')+1)+'\n请输出JSON-Patch')});
$(document).on('click','#btnAddItem',function(){
var n=$('#newItemName').val().trim();if(!n){alert('请输入名称');return}
sendCmd('【编辑物品栏】\n添加新物品\n-名称：'+n+'\n-描述：'+$('#newItemDesc').val()+'\n-数量：'+$('#newItemQty').val()+'\n请输出JSON-Patch')
});

// character manager
function popupCharMgr(){
var p=getPlayer(),npcs=getNPCs();
var html='<div class="section-title">👤玩家</div><div class="char-card"><div class="char-card-title">'+esc(p.名称||'未命名')+'</div><div class="char-card-info">'+(p.年龄||'--')+'岁·'+(p.当前地点||'--')+'<br>'+trunc(p.角色背景,50)+'</div><button class="btn btn-primary btn-sm" data-cmd="edit-player" style="margin-top:4px">编辑</button></div>';
html+='<div class="section-title">🎭NPC角色</div>';
var hasNPC=false;
$.each(npcs,function(k,n){if(!n||!n.名称)return;hasNPC=true;
html+='<div class="char-card"><div class="char-card-title">'+esc(n.名称)+'<span style="color:#8892b0;font-size:10px">('+k+')</span></div><div class="char-card-info">'+(n.年龄||'--')+'岁·'+(n.职业||'未知')+'·好感'+(n.好感度||0)+'</div><div style="display:flex;gap:3px;margin-top:4px;flex-wrap:wrap"><button class="btn btn-sm btn-edit-npc" data-npc="'+k+'">编辑</button><button class="btn btn-sm btn-secondary btn-npc-info" data-npc="'+k+'">信息</button><button class="btn btn-sm btn-secondary btn-npc-cloth" data-npc="'+k+'">服装</button><button class="btn btn-sm btn-secondary btn-npc-event" data-npc="'+k+'">事件</button><button class="btn btn-sm btn-secondary btn-edit-aff" data-npc="'+k+'">好感</button></div></div>'
});
if(!hasNPC)html+='<div class="empty-state">暂无NPC</div>';

// scene editor
var sceneItems=[];
function popupSceneEdit(){
var html='<div class="scene-list" id="sceneList"></div><div class="scene-toolbar"><button class="btn btn-secondary btn-sm" data-scene="scene">+场景</button><button class="btn btn-secondary btn-sm" data-scene="dialog">+对白</button><button class="btn btn-secondary btn-sm" data-scene="action">+行动</button><button class="btn btn-secondary btn-sm" data-scene="reaction">+反应</button><div style="flex:1"></div><button class="btn btn-primary btn-sm" id="btnSendScene">确认发送</button></div>';
openPopup('情境场景编辑',html);renderSceneList()
}
function renderSceneList(){
var h='';
if(sceneItems.length===0){h='<div class="empty-state">点击上方按钮添加场景条目</div>'}
sceneItems.forEach(function(item,i){
var tag=item.type==='scene'?'场景事件':item.type==='dialog'?'对白':item.type==='action'?'行动':'反应';
var whoInput=item.type==='scene'?'':'<input class="scene-who" data-idx="'+i+'" placeholder="谁" value="'+esc(item.who)+'">';
h+='<div class="scene-item"><span class="scene-num">'+(i+1)+'</span><span class="scene-tag">'+tag+'</span>'+whoInput+(item.type==='scene'?'':'<span style="color:#8892b0">-</span>')+'<span style="color:#8892b0">('+tag+')</span><input class="scene-content" data-idx="'+i+'" placeholder="内容" value="'+esc(item.content)+'"><button class="scene-del" data-idx="'+i+'">&times;</button></div>'
});
$('#sceneList').html(h)
}
$(document).on('click','[data-scene]',function(){
var t=$(this).data('scene');sceneItems.push({type:t,who:'',content:''});renderSceneList()
});
$(document).on('click','.scene-del',function(){
var i=$(this).data('idx');sceneItems.splice(i,1);renderSceneList()
});
$(document).on('input','.scene-who',function(){sceneItems[$(this).data('idx')].who=$(this).val()});
$(document).on('input','.scene-content',function(){sceneItems[$(this).data('idx')].content=$(this).val()});
$(document).on('click','#btnSendScene',function(){
if(sceneItems.length===0){alert('请先添加场景条目');return}
var cmd='【情境场景编辑】\n请按以下顺序推进剧情：\n';
sceneItems.forEach(function(item,i){
var tag=item.type==='scene'?'场景事件':item.type==='dialog'?'对白':item.type==='action'?'行动':'反应';
if(item.type==='scene'){cmd+=(i+1)+'.['+tag+']'+item.content+'\n'}
else{cmd+=(i+1)+'.['+item.who+']-('+tag+')-'+item.content+'\n'}
});
sendCmd(cmd);closePopup()
});
