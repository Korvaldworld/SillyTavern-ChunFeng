<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      margin: 0;
      padding: 0;
      color: #ccd6f6;
    }
    .status-bar {
      background: linear-gradient(180deg, #0a192f 0%, #112240 100%);
      border: 1px solid #233554;
      border-radius: 8px;
      overflow: hidden;
      margin: 8px 0;
    }
    /* 环境栏 */
    .env-bar {
      background: rgba(15, 52, 96, 0.4);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid #233554;
    }
    .env-item {
      font-size: 13px;
      color: #8892b0;
    }
    .env-item strong {
      color: #64ffda;
      font-weight: normal;
    }
    /* 玩家栏 */
    .player-section {
      padding: 12px 16px;
      border-bottom: 1px solid #233554;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .player-info {
      flex: 1;
      min-width: 0;
    }
    .player-name {
      font-size: 16px;
      color: #e94560;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .player-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .tag {
      background: rgba(15, 52, 96, 0.5);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #a8b2d1;
    }
    .tag.highlight {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
    }
    .player-desc {
      font-size: 12px;
      color: #8892b0;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .player-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    /* NPC 栏 */
    .npc-section {
      padding: 12px 16px;
      border-bottom: 1px solid #233554;
    }
    .npc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .npc-title {
      font-size: 14px;
      color: #64ffda;
    }
    .npc-card {
      background: rgba(15, 52, 96, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(35, 53, 84, 0.5);
    }
    .npc-top {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }
    .npc-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #64ffda, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .npc-basic {
      flex: 1;
      min-width: 0;
    }
    .npc-name {
      font-size: 15px;
      color: #e94560;
      font-weight: bold;
      margin-bottom: 2px;
    }
    .npc-sub {
      font-size: 12px;
      color: #8892b0;
    }
    .npc-details {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px;
      margin-bottom: 10px;
    }
    .npc-detail {
      font-size: 12px;
      color: #a8b2d1;
    }
    .npc-detail label {
      color: #64ffda;
      font-size: 11px;
      display: block;
    }
    /* 好感度条 */
    .affinity-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      background: rgba(10, 25, 47, 0.5);
      padding: 8px;
      border-radius: 6px;
    }
    .affinity-item {
      text-align: center;
    }
    .affinity-value {
      font-size: 16px;
      font-weight: bold;
      color: #e94560;
    }
    .affinity-label {
      font-size: 10px;
      color: #8892b0;
    }
    .mood-badge {
      background: rgba(100, 255, 218, 0.15);
      color: #64ffda;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
    }
    .npc-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    /* 按钮 */
    .btn {
      background: rgba(233, 69, 96, 0.15);
      border: 1px solid rgba(233, 69, 96, 0.3);
      color: #e94560;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn:hover {
      background: rgba(233, 69, 96, 0.3);
    }
    .btn-sm {
      padding: 3px 8px;
      font-size: 11px;
    }
    /* 底部全局按钮 */
    .global-actions {
      padding: 10px 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(10, 25, 47, 0.5);
    }
    .global-btn {
      background: rgba(15, 52, 96, 0.5);
      border: 1px solid #0f3460;
      color: #64ffda;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .global-btn:hover {
      background: rgba(15, 52, 96, 0.8);
      border-color: #64ffda;
    }
    .empty-state {
      text-align: center;
      color: #8892b0;
      padding: 16px;
      font-size: 13px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <!-- 环境栏 -->
    <div class="env-bar" id="envBar">
      <div class="env-item">📅 <strong id="envDate">--</strong></div>
      <div class="env-item">🕐 <strong id="envTime">--</strong></div>
      <div class="env-item">🌤 <strong id="envWeather">--</strong></div>
      <div class="env-item">📍 <strong id="envLocation">--</strong></div>
      <div class="env-item">👥 <strong id="envCharacter">--</strong></div>
    </div>

    <!-- 玩家栏 -->
    <div class="player-section" id="playerSection">
      <div class="avatar">👤</div>
      <div class="player-info">
        <div class="player-name" id="playerName">加载中...</div>
        <div class="player-tags">
          <span class="tag" id="playerAge">--岁</span>
          <span class="tag highlight" id="playerMoney">💰 --</span>
          <span class="tag" id="playerLocation">📍 --</span>
        </div>
        <div class="player-desc" id="playerDesc">加载中...</div>
        <div class="player-actions">
          <button class="btn" onclick="openEditInfo()">✏️ 编辑信息</button>
          <button class="btn" onclick="openInventory()">🎒 物品栏</button>
        </div>
      </div>
    </div>

    <!-- NPC 栏 -->
    <div class="npc-section" id="npcSection">
      <div class="npc-header">
        <span class="npc-title">🎭 交互角色</span>
      </div>
      <div id="npcContainer">
        <div class="empty-state">暂无交互中的角色</div>
      </div>
    </div>

    <!-- 底部全局按钮 -->
    <div class="global-actions">
      <button class="global-btn" onclick="openCharManage()">👥 角色管理</button>
      <button class="global-btn" onclick="openWorldManage()">🌍 世界管理</button>
      <button class="global-btn" onclick="openPlotEdit()">📖 剧情编辑</button>
    </div>
  </div>

  <script>
    const CDN_BASE = 'https://testingcf.jsdelivr.net/gh/korvaldworld/SillyTavern-ChunFeng@refs/heads/main/System/';

    function getStatData() {
      try {
        const ctx = window.SillyTavern.getContext();
        const raw = ctx.chatMetadata.variables['stat_data'];
        return typeof raw === 'string' ? JSON.parse(raw) : (raw || {});
      } catch(e) { return {}; }
    }

    function renderStatusBar() {
      const data = getStatData();
      const env = data.环境 || {};
      const player = data.玩家 || {};
      const npcs = data.NPC || {};

      // 环境栏
      document.getElementById('envDate').textContent = env.当前日期 || '--';
      document.getElementById('envTime').textContent = env.当前时间 || '--';
      document.getElementById('envWeather').textContent = env.天气 || '--';
      document.getElementById('envLocation').textContent = env.地点 || '--';

      // 查找当前交互角色名称
      let charName = '无';
      const activeId = env.当前交互角色ID;
      if (activeId && npcs[activeId] && npcs[activeId].名称) {
        charName = npcs[activeId].名称;
      }
      document.getElementById('envCharacter').textContent = charName;

      // 玩家栏
      document.getElementById('playerName').textContent = player.名称 || '未命名';
      document.getElementById('playerAge').textContent = (player.年龄 || '--') + '岁';
      document.getElementById('playerMoney').textContent = '💰 ' + (player.持有金钱 || 0);
      document.getElementById('playerLocation').textContent = '📍 ' + (player.当前地点 || '未知');
      document.getElementById('playerDesc').textContent = player.角色背景 || '暂无背景描述';

      // NPC 栏 - 只渲染当前交互且在场的主要角色
      renderNPCs(npcs, activeId);
    }

    function renderNPCs(npcs, activeId) {
      const container = document.getElementById('npcContainer');
      let hasNPC = false;
      let html = '';

      // 主要角色对应的 NPC 槽位
      const mainChars = { 'NPC1': '施美玉', 'NPC2': '梁惠', 'NPC3': '雪婉', 'NPC4': '雪柔', 'NPC5': '颜媚', 'NPC6': '茵曼' };

      Object.keys(mainChars).forEach(key => {
        const npc = npcs[key];
        if (!npc || !npc.名称) return;
        // 只显示当前交互角色ID匹配且在场的
        if (key !== activeId || !npc.是否在场) return;
        hasNPC = true;

        html += `
          <div class="npc-card">
            <div class="npc-top">
              <div class="npc-avatar">👩</div>
              <div class="npc-basic">
                <div class="npc-name">${escapeHtml(npc.名称)}</div>
                <div class="npc-sub">${npc.年龄 || '--'}岁 · ${npc.职业 || '未知职业'}</div>
              </div>
            </div>
            <div class="npc-details">
              <div class="npc-detail"><label>外貌</label>${npc.外貌 ? escapeHtml(npc.外貌.substring(0, 20) + (npc.外貌.length > 20 ? '...' : '')) : '--'}</div>
              <div class="npc-detail"><label>身材</label>${npc.身材 ? escapeHtml(npc.身材.substring(0, 20) + (npc.身材.length > 20 ? '...' : '')) : '--'}</div>
              <div class="npc-detail"><label>服装</label>${npc.服装 ? escapeHtml(npc.服装.substring(0, 20) + (npc.服装.length > 20 ? '...' : '')) : '--'}</div>
              <div class="npc-detail"><label>性格</label>${npc.性格 ? escapeHtml(npc.性格.substring(0, 20) + (npc.性格.length > 20 ? '...' : '')) : '--'}</div>
            </div>
            <div class="affinity-bar">
              <div class="affinity-item">
                <div class="affinity-value" style="color:#ff6b6b">${npc.好感度 || 0}</div>
                <div class="affinity-label">好感</div>
              </div>
              <div class="affinity-item">
                <div class="affinity-value" style="color:#ffd93d">${npc.厌恶度 || 0}</div>
                <div class="affinity-label">厌恶</div>
              </div>
              <div class="affinity-item">
                <div class="affinity-value" style="color:#c084fc">${npc.堕落度 || 0}</div>
                <div class="affinity-label">堕落</div>
              </div>
              <div class="affinity-item">
                <div class="affinity-value" style="color:#ff9f43">${npc.快感 || 0}</div>
                <div class="affinity-label">快感</div>
              </div>
              <div style="margin-left:auto;">
                <span class="mood-badge">${npc.情绪状态 || '平静'}</span>
              </div>
              <button class="btn btn-sm" onclick="editAffinity('${key}')">编辑</button>
            </div>
            <div class="npc-actions">
              <button class="btn" onclick="openCharInfo('${key}')">📋 角色信息</button>
              <button class="btn" onclick="openClothing('${key}')">👗 当前服装</button>
              <button class="btn" onclick="openEvents('${key}')">📜 事件记录</button>
            </div>
          </div>
        `;
      });

      container.innerHTML = hasNPC ? html : '<div class="empty-state">暂无交互中的主要角色</div>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 按钮操作
    function openEditInfo() { loadSubPage('编辑信息.html'); }
    function openInventory() { loadSubPage('物品栏.html'); }
    function openCharManage() { loadSubPage('角色管理.html'); }
    function openWorldManage() { loadSubPage('世界管理.html'); }
    function openPlotEdit() { loadSubPage('剧情编辑.html'); }
    function openCharInfo(npcId) { loadSubPage('角色信息.html?npc=' + npcId); }
    function openClothing(npcId) { loadSubPage('当前服装.html?npc=' + npcId); }
    function openEvents(npcId) { loadSubPage('事件记录.html?npc=' + npcId); }
    function editAffinity(npcId) { loadSubPage('好感度编辑.html?npc=' + npcId); }

    function loadSubPage(filename) {
      const url = CDN_BASE + filename;
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,25,47,0.95);z-index:9999;overflow:auto;';
      document.body.appendChild(container);

      fetch(url)
        .then(r => r.text())
        .then(html => {
          container.innerHTML = html;
          // 注入关闭按钮
          const closeBtn = document.createElement('button');
          closeBtn.textContent = '✕ 关闭';
          closeBtn.style.cssText = 'position:fixed;top:10px;right:10px;background:#e94560;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;z-index:10000;font-family:inherit;';
          closeBtn.onclick = () => container.remove();
          container.appendChild(closeBtn);
        })
        .catch(() => {
          container.innerHTML = '<div style="text-align:center;padding:40px;color:#e94560;">加载失败，请检查网络连接</div>';
        });
    }

    // 初始化渲染
    renderStatusBar();
  </script>
</body>
</html>
